<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Savorly</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#000;
color:white;
overflow:hidden;
}

/* HOME */

#home{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
overflow-y:auto;
padding-top:100px;
display:flex;
flex-direction:column;
align-items:center;
}

.logo{
width:220px;
margin-bottom:30px;
}

.cat{
width:80%;
max-width:420px;
padding:18px;
margin:10px;
border-radius:20px;
background:#111;
border:1px solid #333;
text-align:center;
font-size:22px;
}

.favoriteItem{
padding:14px;
margin:6px 0;
border-radius:14px;
background:#111;
border:1px solid #333;
}

.hidden{display:none}

/* CARD STACK */

#deck{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:none;
justify-content:center;
align-items:center;
}

.card{
position:absolute;
width:95%;
height:92%;
border-radius:26px;
overflow:hidden;
background:black;
touch-action:none;
transition:transform .35s ease;
}

.card.next{
transform:scale(.96) translateY(10px);
opacity:.55;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* bottom gradient */

.card::after{
content:"";
position:absolute;
left:0;
right:0;
bottom:0;
top:65%;
background:linear-gradient(to bottom,rgba(0,0,0,0),rgba(0,0,0,0.45),rgba(0,0,0,0.9));
pointer-events:none;
}

/* gradient for name */

.nameGradient{
position:absolute;
left:0;
right:0;
bottom:140px;
height:200px;
background:linear-gradient(to top,rgba(0,0,0,0.85),rgba(0,0,0,0.4),rgba(0,0,0,0));
}

/* dots */

.photoDots{
position:absolute;
top:16px;
left:0;
right:0;
text-align:center;
}

.dot{
display:inline-block;
width:26px;
height:4px;
margin:3px;
border-radius:10px;
background:rgba(255,255,255,.4);
}

.dot.active{
background:white;
}

/* top buttons */

.topLeft,.topRight{
position:absolute;
top:24px;
font-size:24px;
color:black;
background:rgba(255,255,255,0.9);
border-radius:14px;
padding:10px 12px;
}

.topLeft{ left:20px; }
.topRight{ right:20px; }

/* info */

.info{
position:absolute;
bottom:180px;
left:24px;
}

.name{
font-family:'Playfair Display', serif;
font-size:36px;
}

.rating{
font-size:18px;
color:#E6C27A;
}

/* buttons */

.buttons{
position:absolute;
bottom:30px;
left:20px;
right:20px;

display:flex;
justify-content:space-around;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);

border-radius:26px;
padding:18px 10px;
}

.buttons div{
background:rgba(255,255,255,0.9);
border-radius:16px;
padding:14px 18px;
font-size:28px;
color:black;
}

</style>
</head>

<body>

<div id="home">

<img src="logo.png" class="logo">

<div class="cat" onclick="openCategory('restaurants')">Restaurant</div>
<div class="cat" onclick="openCategory('winebars')">Vinbar</div>
<div class="cat" onclick="openCategory('cocktailbars')">Cocktailbar</div>

<div style="margin-top:40px;width:80%;max-width:420px">

<div class="cat" onclick="toggleFav('restaurants')">Favoritt restaurant</div>
<div id="fav-restaurants" class="hidden"></div>

<div class="cat" onclick="toggleFav('winebars')">Favoritt vinbar</div>
<div id="fav-winebars" class="hidden"></div>

<div class="cat" onclick="toggleFav('cocktailbars')">Favoritt cocktailbar</div>
<div id="fav-cocktailbars" class="hidden"></div>

</div>

</div>

<div id="deck"></div>
<div id="map" style="display:none"></div>

<script>

let data
let list=[]
let index=0
let history=[]
let currentType=""
let placesService
let imageCache={}

let favorites={
restaurants:JSON.parse(localStorage.getItem("fav-restaurants")||"[]"),
winebars:JSON.parse(localStorage.getItem("fav-winebars")||"[]"),
cocktailbars:JSON.parse(localStorage.getItem("fav-cocktailbars")||"[]")
}

const deck=document.getElementById("deck")

async function loadData(){
const res=await fetch("data/places.json")
data=await res.json()
renderFavorites()
}

loadData()

function initMap(){
const map=new google.maps.Map(document.getElementById("map"),{
center:{lat:59.91,lng:10.75},
zoom:13
})
placesService=new google.maps.places.PlacesService(map)
}

/* shuffle */

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5)
}

/* open category */

function openCategory(type){

currentType=type
list=[...data[type]]

shuffle(list)

index=0

document.getElementById("home").style.display="none"
deck.style.display="flex"

buildDeck()

}

/* build deck */

function buildDeck(){

deck.innerHTML=""

if(index>=list.length){
shuffle(list)
index=0
}

createCard(list[index],false)

if(list[index+1]){
createCard(list[index+1],true)
}

}

/* create card */

function createCard(name,isNext){

const card=document.createElement("div")
card.className="card"

if(isNext) card.classList.add("next")

card.innerHTML=`

<img>

<div class="photoDots">
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

<div class="topLeft">←</div>
<div class="topRight">↺</div>

<div class="nameGradient"></div>

<div class="info">
<div class="name">${name}</div>
<div class="rating">⭐</div>
</div>

<div class="buttons">
<div onclick="btnDislike(event)">✕</div>
<div onclick="navigate('${name}',event)">📍</div>
<div onclick="book('${name}',event)">📅</div>
<div onclick="btnLike(event)">♥</div>
</div>

`

deck.appendChild(card)

card.querySelector(".topLeft").onclick=goHome
card.querySelector(".topRight").onclick=undo

enableSwipe(card)
enablePhotoNav(card)

loadPlace(name).then(place=>{

const img=card.querySelector("img")

img.src=place.photos[0]

card.dataset.photos=JSON.stringify(place.photos)
card.dataset.photoIndex=0

card.querySelector(".rating").innerText=
"⭐ "+(place.rating||"")+" · Google"

})

}

/* swipe */

function enableSwipe(card){

let startX=0
let currentX=0

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.addEventListener("touchmove",e=>{

currentX=e.touches[0].clientX
const diff=currentX-startX

card.style.transform=`translateX(${diff}px) rotate(${diff/10}deg)`

})

card.addEventListener("touchend",()=>{

const diff=currentX-startX

if(diff>120){
card.style.transform="translateX(120vw)"
setTimeout(like,200)
return
}

if(diff<-120){
card.style.transform="translateX(-120vw)"
setTimeout(dislike,200)
return
}

card.style.transform="translateX(0)"

})

}

/* photo navigation */

function enablePhotoNav(card){

card.addEventListener("click",e=>{

if(e.target.closest(".buttons")) return

const rect=card.getBoundingClientRect()
const x=e.clientX-rect.left

let photos=JSON.parse(card.dataset.photos)
let i=parseInt(card.dataset.photoIndex)

if(x<rect.width/2){
i=(i-1+photos.length)%photos.length
}else{
i=(i+1)%photos.length
}

card.dataset.photoIndex=i

card.querySelector("img").src=photos[i]

})

}

/* like dislike */

function btnLike(e){
e.stopPropagation()
document.querySelector(".card").style.transform="translateX(120vw)"
setTimeout(like,200)
}

function btnDislike(e){
e.stopPropagation()
document.querySelector(".card").style.transform="translateX(-120vw)"
setTimeout(dislike,200)
}

function like(){

let name=list[index]

history.push(index)

if(!favorites[currentType].includes(name)){
favorites[currentType].push(name)
localStorage.setItem("fav-"+currentType,JSON.stringify(favorites[currentType]))
renderFavorites()
}

index++
buildDeck()

}

function dislike(){
history.push(index)
index++
buildDeck()
}

/* undo */

function undo(){

if(history.length===0) return

index=history.pop()

buildDeck()

}

/* navigation */

function navigate(name,e){
e.stopPropagation()
window.open("https://maps.google.com/?q="+encodeURIComponent(name+" Oslo"))
}

/* booking */

function book(name,e){
e.stopPropagation()
window.open("https://www.google.com/search?q="+encodeURIComponent(name+" booking"))
}

/* load place */

function loadPlace(name){

return new Promise(resolve=>{

if(imageCache[name]){
resolve(imageCache[name])
return
}

if(!placesService){
resolve(fallback(name))
return
}

placesService.findPlaceFromQuery({
query:name+" Oslo",
fields:["place_id"]
},(results,status)=>{

if(status!==google.maps.places.PlacesServiceStatus.OK){
resolve(fallback(name))
return
}

placesService.getDetails({
placeId:results[0].place_id,
fields:["name","rating","photos"]
},(place,status)=>{

let photos=[]

if(place.photos){
for(let i=0;i<Math.min(3,place.photos.length);i++){
photos.push(place.photos[i].getUrl({maxWidth:1200}))
}
}

while(photos.length<3){
photos.push("https://source.unsplash.com/featured/?restaurant")
}

let result={
name:place?.name||name,
rating:place?.rating||"",
photos:photos
}

imageCache[name]=result

resolve(result)

})

})

})

}

/* fallback */

function fallback(name){
return{
name:name,
rating:"",
photos:[
"https://source.unsplash.com/featured/?restaurant",
"https://source.unsplash.com/featured/?food",
"https://source.unsplash.com/featured/?wine"
]
}
}

/* favorites */

function toggleFav(type){
document.getElementById("fav-"+type).classList.toggle("hidden")
}

function renderFavorites(){

["restaurants","winebars","cocktailbars"].forEach(type=>{

const box=document.getElementById("fav-"+type)
box.innerHTML=""

favorites[type].forEach(name=>{

const el=document.createElement("div")
el.className="favoriteItem"
el.innerText=name

el.onclick=()=>openFavorite(type,name)

box.appendChild(el)

})

})

}

function openFavorite(type,name){

currentType=type
list=[...data[type]]

index=list.indexOf(name)

document.getElementById("home").style.display="none"
deck.style.display="flex"

buildDeck()

}

/* go home */

function goHome(){

deck.style.display="none"
document.getElementById("home").style.display="flex"

}

</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places&callback=initMap">
</script>

</body>
</html>
