<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
}

/* HOME */

#home{
height:100vh;
overflow-y:auto;
text-align:center;
padding-top:40px;
}

.logo{
width:260px;
margin-bottom:30px;
}

.categories{
display:flex;
flex-direction:column;
gap:16px;
padding:0 30px;
}

.category-btn{
background:#111;
border:1px solid #333;
padding:16px;
border-radius:14px;
font-size:18px;
color:white;
}

.divider{
height:1px;
background:#333;
margin:40px;
}

/* FAVORITES */

.fav-header{
background:#111;
border:1px solid #333;
padding:14px;
border-radius:12px;
margin:10px 30px;
text-align:left;
}

.fav-list{
display:none;
padding:0 30px;
}

.fav-item{
background:#1a1a1a;
padding:10px;
margin:5px 0;
border-radius:8px;
text-align:left;
}

/* SWIPE */

#swipe{
display:none;
height:100vh;
width:100%;
}

#card{
position:absolute;
width:100%;
height:100%;
}

#card img{
width:100%;
height:100%;
object-fit:cover;
}

/* INFO */

.place-info{
position:absolute;
bottom:140px;
left:20px;
text-align:left;
}

.place-name{
font-size:32px;
font-weight:bold;
}

.rating{
font-size:20px;
color:gold;
}

/* BUTTONS */

.buttons{
position:absolute;
bottom:40px;
width:100%;
display:flex;
justify-content:space-evenly;
font-size:34px;
}

/* TOP BUTTONS */

.back{
position:absolute;
top:40px;
left:20px;
font-size:28px;
}

.undo{
position:absolute;
top:40px;
right:20px;
font-size:28px;
}

</style>
</head>

<body>

<!-- HOME -->

<div id="home">

<img src="logo.png" class="logo">

<div class="categories">

<button class="category-btn" onclick="start()">Restaurant</button>
<button class="category-btn" onclick="start()">Vinbar</button>
<button class="category-btn" onclick="start()">Cocktailbar</button>

</div>

<div class="divider"></div>

<div class="fav-header" onclick="toggleFav('fav-list')">
Favoritter
</div>

<div id="fav-list" class="fav-list"></div>

</div>

<!-- SWIPE -->

<div id="swipe">

<div id="card">

<div class="back" onclick="goHome()">⬅️</div>
<div class="undo" onclick="undo()">↩️</div>

<img id="image">

<div class="place-info">
<div class="place-name" id="name"></div>
<div class="rating" id="rating"></div>
</div>

<div class="buttons">

<div onclick="dislike()">❌</div>
<div onclick="navigate()">📍</div>
<div onclick="book()">📅</div>
<div onclick="like()">❤️</div>

</div>

</div>

</div>

<script>

let places=[]
let index=0
let history=[]
let imageIndex=0

async function loadPlaces(){

try{

let res=await fetch("./data/places.json")
places=await res.json()

if(!Array.isArray(places)){
alert("places.json må starte med [ ]")
return
}

}catch(e){

alert("Kunne ikke laste places.json")

}

}

function start(){

document.getElementById("home").style.display="none"
document.getElementById("swipe").style.display="block"

if(places.length===0){
loadPlaces().then(showPlace)
}else{
showPlace()
}

}

function showPlace(){

let p=places[index]

if(!p){
index=0
p=places[index]
}

imageIndex=0

document.getElementById("name").innerText=p.name
document.getElementById("rating").innerText="⭐ "+p.rating
document.getElementById("image").src=p.images[0]

}

function nextImage(){

let p=places[index]

imageIndex++

if(imageIndex>=p.images.length){
imageIndex=0
}

document.getElementById("image").src=p.images[imageIndex]

}

document.getElementById("card").onclick=nextImage

function dislike(){

history.push(index)

index++

showPlace()

}

function like(){

let fav=JSON.parse(localStorage.getItem("fav")||"[]")

if(!fav.includes(places[index].name)){
fav.push(places[index].name)
localStorage.setItem("fav",JSON.stringify(fav))
}

dislike()

}

function undo(){

if(history.length>0){
index=history.pop()
showPlace()
}

}

function navigate(){

let p=places[index]

window.open(
"https://www.google.com/maps/search/?api=1&query="+
encodeURIComponent(p.name+" Oslo")
)

}

function book(){

let p=places[index]

window.open(
"https://www.google.com/search?q="+
encodeURIComponent(p.name+" booking")
)

}

function goHome(){

document.getElementById("swipe").style.display="none"
document.getElementById("home").style.display="block"

}

function toggleFav(id){

let el=document.getElementById(id)

if(el.style.display==="block"){
el.style.display="none"
}else{
el.style.display="block"
}

}

loadPlaces()

/* SWIPE */

let card=document.getElementById("card")

let startX=0
let currentX=0
let dragging=false

card.addEventListener("touchstart",e=>{
dragging=true
startX=e.touches[0].clientX
})

card.addEventListener("touchmove",e=>{

if(!dragging)return

currentX=e.touches[0].clientX
let diff=currentX-startX

card.style.transform="translateX("+diff+"px) rotate("+(diff/20)+"deg)"

})

card.addEventListener("touchend",()=>{

dragging=false

let diff=currentX-startX

if(diff>120){
like()
}
else if(diff<-120){
dislike()
}

card.style.transform="translateX(0)"

})

</script>

</body>
</html>
