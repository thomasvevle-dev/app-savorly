<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Savorly</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#000;
color:white;
}

#home{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
overflow-y:auto;
padding-top:120px;
display:flex;
flex-direction:column;
align-items:center;
}

.logo{
width:220px;
margin-bottom:40px;
}

.cat{
width:80%;
max-width:420px;
padding:18px;
margin:10px;
border-radius:20px;
background:#111;
border:1px solid #333;
text-align:center;
font-size:22px;
}

#deck{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:none;
justify-content:center;
align-items:center;
}

.card{
position:absolute;
width:95%;
height:92%;
border-radius:26px;
overflow:hidden;
background:black;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.photoDots{
position:absolute;
top:16px;
left:0;
right:0;
text-align:center;
}

.dot{
display:inline-block;
width:26px;
height:4px;
margin:3px;
border-radius:10px;
background:rgba(255,255,255,.4);
}

.dot.active{
background:white;
}

.info{
position:absolute;
bottom:130px;
left:24px;
}

.name{
font-size:32px;
font-weight:600;
}

.rating{
font-size:20px;
color:#FFD54F;
}

.buttons{
position:absolute;
bottom:30px;
left:0;
right:0;
display:flex;
justify-content:space-evenly;
font-size:34px;
}

.topLeft{
position:absolute;
top:20px;
left:20px;
font-size:30px;
z-index:20;
}

.topRight{
position:absolute;
top:20px;
right:20px;
font-size:30px;
z-index:20;
}

</style>
</head>

<body>

<div id="home">

<img src="logo.png" class="logo">

<div class="cat" onclick="openCategory('restaurants')">Restaurant</div>
<div class="cat" onclick="openCategory('winebars')">Vinbar</div>
<div class="cat" onclick="openCategory('cocktailbars')">Cocktailbar</div>

</div>

<div id="deck"></div>

<div id="map" style="display:none"></div>

<script>

let data
let list=[]
let index=0
let history=[]
let currentType=""
let placesService
const imageCache={}

const deck=document.getElementById("deck")

async function loadData(){

const res=await fetch("data/places.json")
data=await res.json()

}

loadData()

function initMap(){
const map=new google.maps.Map(document.getElementById("map"),{
center:{lat:59.91,lng:10.75},
zoom:13
})
placesService=new google.maps.places.PlacesService(map)
}

function shuffle(array){
return array.sort(()=>Math.random()-0.5)
}

function openCategory(type){

currentType=type
list=[...data[type]]

shuffle(list)

index=0

document.getElementById("home").style.display="none"
deck.style.display="flex"

buildDeck()

}

function buildDeck(){

deck.innerHTML=""

if(index>=list.length){

shuffle(list)
index=0

}

createCard(list[index])

}

function createCard(name){

const card=document.createElement("div")
card.className="card"

loadPlace(name).then(place=>{

let photos=[...place.photos]

while(photos.length<3){
photos.push("https://source.unsplash.com/featured/?restaurant")
}

let photoIndex=0

card.innerHTML=`

<img id="photo" src="${photos[0]}">

<div class="photoDots">
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

<div class="topLeft">←</div>
<div class="topRight">↩</div>

<div class="info">
<div class="name">${place.name}</div>
<div class="rating">⭐ ${place.rating||""}</div>
</div>

<div class="buttons">
<div onclick="dislike()">❌</div>
<div onclick="navigate('${place.name}')">📍</div>
<div onclick="book('${place.name}')">📅</div>
<div onclick="like('${place.name}')">❤️</div>
</div>
`

const img=card.querySelector("#photo")

card.addEventListener("click",e=>{

if(e.target.classList.contains("topLeft")||e.target.classList.contains("topRight")) return

photoIndex=(photoIndex+1)%photos.length
img.src=photos[photoIndex]

const dots=card.querySelectorAll(".dot")
dots.forEach((d,i)=>d.classList.toggle("active",i===photoIndex))

})

card.querySelector(".topLeft").onclick=goHome
card.querySelector(".topRight").onclick=undo

enableSwipe(card)

deck.appendChild(card)

})

}

function loadPlace(name){

return new Promise(resolve=>{

if(imageCache[name]){
resolve(imageCache[name])
return
}

placesService.findPlaceFromQuery({
query:name+" Oslo",
fields:["name","rating","photos"]
},(results,status)=>{

let photos=[]

if(status===google.maps.places.PlacesServiceStatus.OK){

let p=results[0]

if(p.photos){
p.photos.forEach(photo=>{
photos.push(photo.getUrl({maxWidth:1200}))
})
}

imageCache[name]={
name:p.name,
rating:p.rating,
photos:photos
}

resolve(imageCache[name])

}else{

resolve({
name:name,
photos:["https://source.unsplash.com/featured/?restaurant"]
})

}

})

})

}

function enableSwipe(card){

let startX

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.addEventListener("touchmove",e=>{
const diff=e.touches[0].clientX-startX
card.style.transform=`translateX(${diff}px) rotate(${diff/20}deg)`
})

card.addEventListener("touchend",e=>{
const diff=e.changedTouches[0].clientX-startX

if(diff>120) like()
else if(diff<-120) dislike()
else card.style.transform=""

})

}

function like(){
history.push(index)
index++
buildDeck()
}

function dislike(){
history.push(index)
index++
buildDeck()
}

function undo(){

if(history.length===0)return

index=history.pop()

buildDeck()

}

function goHome(){

deck.style.display="none"
document.getElementById("home").style.display="flex"

}

function navigate(name){
window.open(`https://maps.google.com/?q=${encodeURIComponent(name+" Oslo")}`)
}

function book(name){
window.open(`https://www.google.com/search?q=${encodeURIComponent(name+" booking")}`)
}

</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places&callback=initMap">
</script>

</body>
</html>
