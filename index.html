<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

/* hidden map */

#map{
height:1px;
width:1px;
opacity:0;
}

/* START */

#start-screen{
margin-top:120px;
text-align:center;
}

.category{
background:#222;
padding:14px 24px;
border-radius:20px;
margin:10px;
cursor:pointer;
display:inline-block;
font-size:18px;
}

.category:hover{
background:#4CAF50;
}

/* CARD */

#card-stack{
position:relative;
width:360px;
height:560px;
margin-top:20px;
display:none;
}

.card{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
overflow:hidden;
background:black;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT */

.overlay{
position:absolute;
bottom:110px;
left:20px;
}

.title-row{
display:flex;
gap:10px;
align-items:center;
}

.place-name{
font-size:24px;
font-weight:bold;
}

.rating{
color:#FFD700;
}

/* ICONS */

.icon-row{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:space-evenly;
}

.icon-btn{
width:50px;
height:50px;
border-radius:50%;
border:none;
font-size:20px;
background:#333;
color:white;
}

</style>

</head>

<body>

<div id="map"></div>

<div id="start-screen">

<h2>Hva vil du utforske?</h2>

<div class="category" onclick="loadCategory('restaurant')">Restaurant</div>

<div class="category" onclick="loadCategory('wine')">Vinbar</div>

<div class="category" onclick="loadCategory('cocktail')">Cocktailbar</div>

</div>

<div id="card-stack"></div>

<script>

const restaurants=[
"Libertine",
"Skaal Matbar",
"Arakataka",
"Le Benjamin",
"Hyde",
"Kverneriet",
"Kolonialen"
]

const wineBars=[
"Territoriet",
"Nektar Vinbar",
"Radegast",
"Vinoteket",
"Andre til Høyre"
]

const cocktailBars=[
"Himkok",
"Bettola",
"Svanen",
"Torggata Botaniske",
"Fuglen"
]

let service
let places=[]
let index=0

/* INIT GOOGLE */

function initMap(){

const map=new google.maps.Map(document.getElementById("map"),{
center:{lat:59.9139,lng:10.7522},
zoom:13
})

service=new google.maps.places.PlacesService(map)

}

window.initMap=initMap

/* LOAD CATEGORY */

function loadCategory(type){

let list=[]

if(type==="restaurant") list=restaurants

if(type==="wine") list=wineBars

if(type==="cocktail") list=cocktailBars

places=[]
index=0

let loaded=0

list.forEach(name=>{

service.findPlaceFromQuery({

query:name+" oslo",
fields:["name","rating","photos"]

},(results,status)=>{

loaded++

if(status===google.maps.places.PlacesServiceStatus.OK){

places.push(results[0])

}

if(loaded===list.length){

document.getElementById("start-screen").style.display="none"

document.getElementById("card-stack").style.display="block"

renderCards()

}

})

})

}

/* STARS */

function stars(r){

if(!r) return ""

let full=Math.floor(r)

let empty=5-full

return "⭐".repeat(full)+"✩".repeat(empty)

}

/* RENDER */

function renderCards(){

const stack=document.getElementById("card-stack")

stack.innerHTML=""

let place=places[index]

if(!place) return

let photos=[]

if(place.photos){

for(let i=0;i<3 && i<place.photos.length;i++){

photos.push(place.photos[i].getUrl({maxWidth:800}))

}

}

let current=0

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img id="place-img" src="${photos[0]}">

<div class="overlay">

<div class="title-row">

<div class="place-name">${place.name}</div>

<div class="rating">${stars(place.rating)} ${place.rating||""}</div>

</div>

</div>

<div class="icon-row">

<button class="icon-btn" onclick="next()">❌</button>

<button class="icon-btn" onclick="window.open('https://maps.google.com/?q=${place.name}')">📍</button>

<button class="icon-btn" onclick="window.open('https://maps.google.com/?q=${place.name}')">📅</button>

<button class="icon-btn" onclick="next()">❤️</button>

</div>

`

card.addEventListener("click",()=>{

current++

if(current>=photos.length){
current=0
}

card.querySelector("#place-img").src=photos[current]

})

stack.appendChild(card)

}

/* NEXT */

function next(){

index++

if(index>=places.length){
index=0
}

renderCards()

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=DIN_GOOGLE_API_KEY&libraries=places&callback=initMap"></script>

</body>
</html>
