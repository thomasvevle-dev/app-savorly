<!DOCTYPE html>
<html lang="no">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

h2{
margin-bottom:10px;
}

#filter{
margin-bottom:10px;
padding:8px;
border-radius:6px;
}

#card-stack{
position:relative;
width:340px;
height:420px;
}

.card{

position:absolute;
width:100%;
height:100%;
background:#222;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
touch-action:none;

}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.info{
padding:15px;
}

.buttons{

display:flex;
justify-content:space-between;
margin-top:10px;

}

button{

border:none;
border-radius:50%;
width:60px;
height:60px;
font-size:20px;
cursor:pointer;

}

.left{
background:#ff4d4d;
}

.right{
background:#4CAF50;
}

.map-btn{
margin-top:10px;
background:#2196F3;
padding:10px;
border-radius:10px;
border:none;
width:100%;
color:white;
}

</style>

</head>

<body>

<h2>Savorly 🍷</h2>

<select id="filter" onchange="applyFilter()">

<option value="all">Alle steder</option>
<option value="bar">Bar / Vinbar</option>
<option value="restaurant">Restaurant</option>

</select>

<div id="card-stack"></div>

<p id="favorites"></p>

<script>

let places=[]
let filtered=[]
let favorites=JSON.parse(localStorage.getItem("favorites"))||[]

async function loadPlaces(){

let query=`
[out:json];
(
node["amenity"="bar"](59.9,10.7,59.95,10.8);
node["amenity"="restaurant"](59.9,10.7,59.95,10.8);
);
out;
`

let res=await fetch(
"https://overpass-api.de/api/interpreter",
{
method:"POST",
body:query
}
)

let data=await res.json()

places=data.elements.map(p=>({

name:p.tags.name||"Ukjent sted",

type:p.tags.amenity,

lat:p.lat,

lon:p.lon,

image:getImage(p.tags.amenity)

}))

filtered=places

renderCards()

}

function getImage(type){

if(type==="bar")
return "https://images.unsplash.com/photo-1514361892635-cebb3a9c8d75"

if(type==="restaurant")
return "https://images.unsplash.com/photo-1552566626-52f8b828add9"

return "https://images.unsplash.com/photo-1504674900247-0877df9cc836"

}

function renderCards(){

const stack=document.getElementById("card-stack")

stack.innerHTML=""

filtered.slice(0,5).forEach((place,i)=>{

const card=document.createElement("div")

card.className="card"

card.style.zIndex=100-i

card.innerHTML=`

<img src="${place.image}">

<div class="info">

<h3>${place.name}</h3>

<p>${place.type}</p>

<div class="buttons">

<button class="left">←</button>

<button class="right">→</button>

</div>

<button class="map-btn">📍 Veibeskrivelse</button>

</div>
`

addSwipe(card,place)

stack.appendChild(card)

})

showFavorites()

}

function addSwipe(card,place){

let startX=0

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.addEventListener("touchmove",e=>{

let moveX=e.touches[0].clientX-startX

card.style.transform=
`translateX(${moveX}px) rotate(${moveX*0.05}deg)`

})

card.addEventListener("touchend",e=>{

let moveX=e.changedTouches[0].clientX-startX

if(moveX>120){

favorites.push(place.name)

localStorage.setItem(
"favorites",
JSON.stringify(favorites)
)

card.remove()

}

else if(moveX<-120){

card.remove()

}

else{

card.style.transform="translateX(0)"

}

showFavorites()

})

card.querySelector(".map-btn")
.onclick=()=>{

window.open(
`https://www.google.com/maps/dir/?api=1&destination=${place.lat},${place.lon}`
)

}

}

function applyFilter(){

let f=document.getElementById("filter").value

if(f==="all"){
filtered=places
}

else{
filtered=places.filter(p=>p.type===f)
}

renderCards()

}

function showFavorites(){

document.getElementById("favorites")
.innerText="Favoritter: "+favorites.join(", ")

}

loadPlaces()

</script>

</body>

</html>
