<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

/* START */

#start-screen{
margin-top:120px;
text-align:center;
}

.category{
background:#222;
padding:12px 20px;
border-radius:20px;
margin:10px;
cursor:pointer;
display:inline-block;
}

.category.active{
background:#4CAF50;
}

.start-btn{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:20px;
background:#4CAF50;
color:white;
}

/* CARD */

#card-stack{
position:relative;
width:360px;
height:560px;
margin-top:20px;
}

.card{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
overflow:hidden;
background:black;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT */

.overlay{
position:absolute;
bottom:110px;
left:20px;
}

.title-row{
display:flex;
gap:10px;
align-items:center;
}

.place-name{
font-size:24px;
font-weight:bold;
}

.rating{
color:#FFD700;
}

/* ICONS */

.icon-row{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:space-evenly;
}

.icon-btn{
width:50px;
height:50px;
border-radius:50%;
border:none;
font-size:20px;
background:#333;
color:white;
}

</style>

</head>

<body>

<div id="start-screen">

<h2>Hva vil du utforske?</h2>

<div class="category" data-type="restaurant">Restaurant</div>
<div class="category" data-type="wine">Vinbar</div>
<div class="category" data-type="cocktail">Cocktailbar</div>

<br>

<button class="start-btn" onclick="start()">Start</button>

</div>

<div id="card-stack" style="display:none"></div>

<script>

const API_KEY="DIN_GOOGLE_API_KEY"

const restaurants=[
"Libertine",
"Skaal Matbar",
"Arakataka",
"Le Benjamin",
"Hyde",
"Kverneriet",
"Kolonialen"
]

const wineBars=[
"Territoriet",
"Nektar Vinbar",
"Radegast",
"Vinoteket",
"Andre til Høyre"
]

const cocktailBars=[
"Himkok",
"Bettola",
"Svanen",
"Torggata Botaniske",
"Fuglen"
]

let selectedType=null
let places=[]
let index=0

document.querySelectorAll(".category").forEach(el=>{

el.onclick=()=>{

document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"))

el.classList.add("active")

selectedType=el.dataset.type

}

})

async function start(){

if(!selectedType){
alert("Velg kategori")
return
}

let list=[]

if(selectedType==="restaurant") list=restaurants
if(selectedType==="wine") list=wineBars
if(selectedType==="cocktail") list=cocktailBars

places=[]

for(const name of list){

let url=`https://maps.googleapis.com/maps/api/place/findplacefromtext/json?input=${name}+oslo&inputtype=textquery&fields=name,place_id,photos,rating&key=${API_KEY}`

try{

let res=await fetch(url)
let data=await res.json()

if(data.candidates.length>0){

places.push(data.candidates[0])

}

}catch{}

}

document.getElementById("start-screen").style.display="none"
document.getElementById("card-stack").style.display="block"

renderCards()

}

function stars(r){

let full=Math.floor(r)
let empty=5-full

return "⭐".repeat(full)+"✩".repeat(empty)

}

function renderCards(){

const stack=document.getElementById("card-stack")

stack.innerHTML=""

places.slice(index,index+1).forEach(place=>{

let photos=[]

if(place.photos){

for(let i=0;i<3 && i<place.photos.length;i++){

photos.push(
`https://maps.googleapis.com/maps/api/place/photo?maxwidth=800&photoreference=${place.photos[i].photo_reference}&key=${API_KEY}`
)

}

}

let current=0

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img id="place-img" src="${photos[0]}">

<div class="overlay">

<div class="title-row">

<div class="place-name">${place.name}</div>

<div class="rating">${stars(place.rating)} ${place.rating}</div>

</div>

</div>

<div class="icon-row">

<button class="icon-btn" onclick="next()">❌</button>

<button class="icon-btn" onclick="window.open('https://maps.google.com/?q=${place.name}')">📍</button>

<button class="icon-btn" onclick="window.open('https://maps.google.com/?q=${place.name}')">📅</button>

<button class="icon-btn" onclick="next()">❤️</button>

</div>

`

card.addEventListener("click",()=>{

current++

if(current>=photos.length){
current=0
}

card.querySelector("#place-img").src=photos[current]

})

stack.appendChild(card)

})

}

function next(){

index++

if(index>=places.length){
index=0
}

renderCards()

}

</script>

</body>
</html>
