<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Savorly</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#000;
color:white;
}

/* ---------- HOME ---------- */

#home{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
overflow-y:auto;
padding-top:100px;
display:flex;
flex-direction:column;
align-items:center;
}

.logo{
width:220px;
margin-bottom:30px;
}

.cat{
width:80%;
max-width:420px;
padding:18px;
margin:10px;
border-radius:20px;
background:#111;
border:1px solid #333;
text-align:center;
font-size:22px;
cursor:pointer;
}

.favoriteItem{
padding:14px;
margin:6px 0;
border-radius:14px;
background:#111;
border:1px solid #333;
}

.hidden{display:none}

/* ---------- DECK ---------- */

#deck{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:none;
justify-content:center;
align-items:center;
}

/* ---------- CARD ---------- */

.card{
position:absolute;
width:95%;
height:92%;
border-radius:26px;
overflow:hidden;
background:black;
transition:transform .35s ease;
will-change:transform;
z-index:2;
touch-action:none;
}

.card.next{
transform:scale(.96) translateY(10px);
opacity:.55;
z-index:1;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* gradient nederste del */

.card::after{
content:"";
position:absolute;
left:0;
right:0;
bottom:0;
top:55%;
background:linear-gradient(
to bottom,
rgba(0,0,0,0),
rgba(0,0,0,.45),
rgba(0,0,0,.9)
);
pointer-events:none;
}

/* ---------- DOTS ---------- */

.photoDots{
position:absolute;
top:16px;
left:0;
right:0;
text-align:center;
}

.dot{
display:inline-block;
width:26px;
height:4px;
margin:3px;
border-radius:10px;
background:rgba(255,255,255,.4);
}

.dot.active{
background:white;
}

/* ---------- TOP BUTTONS ---------- */

.topLeft,
.topRight{
position:absolute;
top:24px;
font-size:26px;
background:rgba(255,255,255,0.85);
border-radius:14px;
padding:10px 14px;
color:black;
cursor:pointer;
}

.topLeft{ left:20px }
.topRight{ right:20px }

/* ---------- INFO ---------- */

.info{
position:absolute;
bottom:170px;
left:24px;
}

.name{
font-family:'Playfair Display',serif;
font-size:36px;
}

.rating{
font-size:18px;
color:#E6C27A;
}

/* ---------- BUTTONS ---------- */

.buttons{
position:absolute;
bottom:30px;
left:20px;
right:20px;
display:flex;
justify-content:space-around;
background:linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.4));
backdrop-filter:blur(20px);
border-radius:26px;
padding:18px;
}

.buttons div{
font-size:28px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="home">

<img src="logo.png" class="logo">

<div class="cat" onclick="openCategory('restaurants')">Restaurant</div>
<div class="cat" onclick="openCategory('winebars')">Vinbar</div>
<div class="cat" onclick="openCategory('cocktailbars')">Cocktailbar</div>

<div style="margin-top:40px;width:80%;max-width:420px">

<div class="cat" onclick="toggleFav('restaurants')">Favoritt restaurant</div>
<div id="fav-restaurants" class="hidden"></div>

<div class="cat" onclick="toggleFav('winebars')">Favoritt vinbar</div>
<div id="fav-winebars" class="hidden"></div>

<div class="cat" onclick="toggleFav('cocktailbars')">Favoritt cocktailbar</div>
<div id="fav-cocktailbars" class="hidden"></div>

</div>

</div>

<div id="deck"></div>
<div id="map" style="display:none"></div>

<script>

/* ---------- STATE ---------- */

let data=null
let list=[]
let index=0
let history=[]
let currentType=""

let placesService
let imageCache={}

const deck=document.getElementById("deck")

let favorites={
restaurants:JSON.parse(localStorage.getItem("fav-restaurants")||"[]"),
winebars:JSON.parse(localStorage.getItem("fav-winebars")||"[]"),
cocktailbars:JSON.parse(localStorage.getItem("fav-cocktailbars")||"[]")
}

/* ---------- LOAD DATA ---------- */

async function loadData(){

try{
const res=await fetch("data/places.json")
data=await res.json()
}catch(e){

data={
restaurants:[],
winebars:[],
cocktailbars:[]
}

}

renderFavorites()

}

loadData()

/* ---------- MAP ---------- */

function initMap(){

const map=new google.maps.Map(document.getElementById("map"),{
center:{lat:59.91,lng:10.75},
zoom:13
})

placesService=new google.maps.places.PlacesService(map)

}

/* ---------- CATEGORY ---------- */

function openCategory(type){

currentType=type
list=[...data[type]]

shuffle(list)

index=0
history=[]

document.getElementById("home").style.display="none"
deck.style.display="flex"

buildDeck()

}

/* ---------- SHUFFLE ---------- */

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5)
}

/* ---------- BUILD DECK ---------- */

function buildDeck(){

deck.innerHTML=""

if(index>=list.length){
shuffle(list)
index=0
}

createCard(list[index],false)

if(list[index+1]){
createCard(list[index+1],true)
}

}

/* ---------- CREATE CARD ---------- */

function createCard(name,isNext){

const card=document.createElement("div")
card.className="card"

if(isNext) card.classList.add("next")

card.innerHTML=`

<img class="photo">

<div class="photoDots">
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

<div class="topLeft">←</div>
<div class="topRight">↺</div>

<div class="info">
<div class="name">${name}</div>
<div class="rating">⭐</div>
</div>

<div class="buttons">
<div onclick="dislike()">❌</div>
<div onclick="navigate('${name}')">📍</div>
<div onclick="book('${name}')">📅</div>
<div onclick="like()">❤️</div>
</div>
`

deck.appendChild(card)

card.querySelector(".topLeft").onclick=goHome
card.querySelector(".topRight").onclick=undo

enableSwipe(card)

loadPlace(name).then(place=>{
renderPlace(card,place)
setupGallery(card,place.photos)
})

}

/* ---------- RENDER PLACE ---------- */

function renderPlace(card,place){

card.querySelector(".photo").src=place.photos[0]
card.querySelector(".name").innerText=place.name
card.querySelector(".rating").innerText="⭐ "+(place.rating||"")+" · Google"

}

/* ---------- PHOTO NAV ---------- */

function setupGallery(card,photos){

let photoIndex=0
const img=card.querySelector(".photo")

card.addEventListener("click",e=>{

if(e.target.closest(".buttons")||
e.target.closest(".topLeft")||
e.target.closest(".topRight")) return

const rect=card.getBoundingClientRect()
const x=e.clientX-rect.left

if(x>rect.width/2){
photoIndex=(photoIndex+1)%photos.length
}else{
photoIndex=(photoIndex-1+photos.length)%photos.length
}

img.src=photos[photoIndex]

const dots=card.querySelectorAll(".dot")
dots.forEach((d,i)=>d.classList.toggle("active",i===photoIndex))

})

}

/* ---------- SWIPE ---------- */

function enableSwipe(card){

let startX
let currentX=0
let dragging=false

card.addEventListener("pointerdown",e=>{
dragging=true
startX=e.clientX
currentX=e.clientX
})

card.addEventListener("pointermove",e=>{

if(!dragging)return

currentX=e.clientX
const diff=currentX-startX

card.style.transition="none"
card.style.transform="translate3d("+diff+"px,0,0) rotate("+(diff/12)+"deg)"

})

card.addEventListener("pointerup",()=>{

dragging=false

const diff=currentX-startX

card.style.transition="transform .35s ease"

if(diff>120){
card.style.transform="translate3d(120vw,0,0)"
setTimeout(like,250)
}
else if(diff<-120){
card.style.transform="translate3d(-120vw,0,0)"
setTimeout(dislike,250)
}
else{
card.style.transform="translate3d(0,0,0)"
}

})

}

/* ---------- ACTIONS ---------- */

function like(){

let name=list[index]

if(!favorites[currentType].includes(name)){
favorites[currentType].push(name)
localStorage.setItem("fav-"+currentType,JSON.stringify(favorites[currentType]))
renderFavorites()
}

history.push(index)
index++

buildDeck()

}

function dislike(){

history.push(index)
index++

buildDeck()

}

function undo(){

if(history.length===0)return

index=history.pop()

buildDeck()

}

/* ---------- FAVORITES ---------- */

function toggleFav(type){
document.getElementById("fav-"+type).classList.toggle("hidden")
}

function renderFavorites(){

["restaurants","winebars","cocktailbars"].forEach(type=>{

const box=document.getElementById("fav-"+type)
box.innerHTML=""

favorites[type].forEach(name=>{

const el=document.createElement("div")
el.className="favoriteItem"
el.innerText=name

el.onclick=()=>openFavorite(type,name)

box.appendChild(el)

})

})

}

function openFavorite(type,name){

currentType=type
list=[...data[type]]

index=list.indexOf(name)

document.getElementById("home").style.display="none"
deck.style.display="flex"

buildDeck()

}

/* ---------- LINKS ---------- */

function navigate(name){
window.open("https://maps.google.com/?q="+encodeURIComponent(name+" Oslo"))
}

function book(name){
window.open("https://www.google.com/search?q="+encodeURIComponent(name+" booking"))
}

/* ---------- GOOGLE PLACE ---------- */

function loadPlace(name){

return new Promise(resolve=>{

if(!placesService){
resolve(fallback(name))
return
}

placesService.findPlaceFromQuery({
query:name+" Oslo",
fields:["place_id"]
},(results,status)=>{

if(status!==google.maps.places.PlacesServiceStatus.OK){
resolve(fallback(name))
return
}

placesService.getDetails({
placeId:results[0].place_id,
fields:["name","rating","photos"]
},(place)=>{

let photos=[]

if(place.photos){
for(let i=0;i<Math.min(3,place.photos.length);i++){
photos.push(place.photos[i].getUrl({maxWidth:1200}))
}
}

while(photos.length<3){
photos.push("https://source.unsplash.com/featured/?restaurant")
}

resolve({
name:place?.name||name,
rating:place?.rating||"",
photos:photos
})

})

})

})

}

/* ---------- FALLBACK ---------- */

function fallback(name){
return{
name:name,
rating:"",
photos:[
"https://source.unsplash.com/featured/?restaurant",
"https://source.unsplash.com/featured/?food",
"https://source.unsplash.com/featured/?wine"
]
}
}

/* ---------- HOME ---------- */

function goHome(){
deck.style.display="none"
document.getElementById("home").style.display="flex"
}

</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places&callback=initMap">
</script>

</body>
</html>
