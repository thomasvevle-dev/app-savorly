<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
text-align:center;
overflow-x:hidden;
}

#home{
padding-top:40px;
padding-bottom:120px;
overflow-y:auto;
height:100vh;
}

.logo{
width:160px;
margin:auto;
margin-bottom:30px;
}

.categories{
display:flex;
flex-direction:column;
gap:16px;
padding:0 30px;
}

.category-btn{
background:#111;
border:1px solid #333;
padding:16px;
border-radius:14px;
font-size:18px;
color:white;
cursor:pointer;
}

.category-btn:hover{
background:#1a1a1a;
}

.divider{
height:1px;
background:#333;
margin:40px 40px;
}

.favorites-section{
padding:0 30px;
}

.fav-title{
font-size:20px;
margin-bottom:20px;
text-align:left;
}

.fav-category{
margin-bottom:20px;
}

.fav-header{
background:#111;
border:1px solid #333;
padding:14px;
border-radius:12px;
cursor:pointer;
text-align:left;
}

.fav-list{
display:none;
margin-top:10px;
}

.fav-item{
background:#1a1a1a;
padding:10px;
margin-bottom:6px;
border-radius:8px;
cursor:pointer;
text-align:left;
}

</style>
</head>

<body>

<div id="home">

<img class="logo" src="logo.png">

<div class="categories">

<button class="category-btn" onclick="startCategory('restaurant')">
Restaurant
</button>

<button class="category-btn" onclick="startCategory('winebar')">
Vinbar
</button>

<button class="category-btn" onclick="startCategory('cocktailbar')">
Cocktailbar
</button>

</div>

<div class="divider"></div>

<div class="favorites-section">

<div class="fav-category">

<div class="fav-header" onclick="toggleFav('fav-restaurants')">
Favoritt restaurant
</div>

<div class="fav-list" id="fav-restaurants"></div>

</div>

<div class="fav-category">

<div class="fav-header" onclick="toggleFav('fav-winebars')">
Favoritt vinbar
</div>

<div class="fav-list" id="fav-winebars"></div>

</div>

<div class="fav-category">

<div class="fav-header" onclick="toggleFav('fav-cocktails')">
Favoritt cocktailbar
</div>

<div class="fav-list" id="fav-cocktails"></div>

</div>

</div>

</div>

<script>

function toggleFav(id){

let el=document.getElementById(id)

if(el.style.display==="block"){
el.style.display="none"
}else{
el.style.display="block"
}

}

function startCategory(type){

localStorage.setItem("category",type)

window.location.href="swipe.html"

}

</script>

</body>
</html>
