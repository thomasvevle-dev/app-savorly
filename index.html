<!DOCTYPE html>
<html lang="no">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
}

#map{
height:200px;
width:90%;
margin:10px;
border-radius:10px;
}

#card-stack{
position:relative;
width:340px;
height:470px;
}

.card{
position:absolute;
width:100%;
height:100%;
background:#222;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
touch-action:none;
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.info{
padding:15px;
}

.place-name{
font-size:20px;
font-weight:bold;
margin-bottom:4px;
}

.rating{
color:#FFD700;
margin-bottom:8px;
}

.buttons{
display:flex;
justify-content:space-between;
margin-top:10px;
}

button{
border:none;
border-radius:50%;
width:60px;
height:60px;
font-size:22px;
cursor:pointer;
}

.dislike{
background:#ff4d4d;
}

.like{
background:#4CAF50;
}

.map-btn{
margin-top:8px;
background:#2196F3;
padding:8px;
border-radius:8px;
border:none;
width:100%;
color:white;
}

#favorites{
margin:15px;
width:90%;
}

.favorite-item{
background:#222;
padding:8px;
margin:4px 0;
border-radius:6px;
}

</style>

</head>

<body>

<div id="map"></div>

<div id="card-stack"></div>

<div id="favorites">
<h3>Favoritter ❤️</h3>
<div id="fav-list"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map=L.map('map').setView([59.9139,10.7522],13)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map)

let places=[]
let favorites=[]
let index=0

async function loadPlaces(){

let query=`
[out:json];
(
node["amenity"="restaurant"](59.9,10.7,59.95,10.8);
node["amenity"="bar"](59.9,10.7,59.95,10.8);
node["amenity"="pub"](59.9,10.7,59.95,10.8);
);
out;
`

let res=await fetch(
"https://overpass-api.de/api/interpreter",
{
method:"POST",
body:query
}
)

let data=await res.json()

places=data.elements
.filter(p=>p.tags && p.tags.name)
.map(p=>{

let rating=generateRating()

return{

name:p.tags.name,
lat:p.lat,
lon:p.lon,
rating:rating,
image:getImage()

}

})
.filter(p=>parseFloat(p.rating)>=4.2)

shufflePlaces()

renderCards()

renderMap()

}

function generateRating(){

return (Math.random()*1.3+3.7).toFixed(1)

}

function getImage(){

const imgs=[
"https://images.unsplash.com/photo-1514361892635-cebb3a9c8d75",
"https://images.unsplash.com/photo-1470337458703-46ad1756a187",
"https://images.unsplash.com/photo-1521017432531-fbd92d768814",
"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085",
"https://images.unsplash.com/photo-1552566626-52f8b828add9"
]

return imgs[Math.floor(Math.random()*imgs.length)]

}

function shufflePlaces(){

places.sort(()=>Math.random()-0.5)

}

function renderMap(){

places.slice(0,30).forEach(p=>{

L.marker([p.lat,p.lon])
.addTo(map)
.bindPopup(p.name)

})

}

function renderCards(){

const stack=document.getElementById("card-stack")

stack.innerHTML=""

places.slice(index,index+5).forEach((place,i)=>{

const card=document.createElement("div")

card.className="card"
card.style.zIndex=100-i

card.innerHTML=`

<img src="${place.image}">

<div class="info">

<div class="place-name">${place.name}</div>

<div class="rating">⭐ ${place.rating}</div>

<button class="map-btn">📍 Naviger hit</button>

<div class="buttons">

<button class="dislike">❌</button>
<button class="like">❤️</button>

</div>

</div>
`

addSwipe(card,place)

stack.appendChild(card)

})

}

function addSwipe(card,place){

let startX=0

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.addEventListener("touchmove",e=>{
let moveX=e.touches[0].clientX-startX
card.style.transform=`translateX(${moveX}px) rotate(${moveX*0.05}deg)`
})

card.addEventListener("touchend",e=>{

let moveX=e.changedTouches[0].clientX-startX

if(moveX>120){
like(place)
card.remove()
next()
}

else if(moveX<-120){
card.remove()
next()
}

else{
card.style.transform="translateX(0)"
}

})

card.querySelector(".map-btn").onclick=()=>{

window.open(
`https://www.google.com/maps/dir/?api=1&destination=${place.lat},${place.lon}`
)

}

card.querySelector(".like").onclick=()=>{
like(place)
card.remove()
next()
}

card.querySelector(".dislike").onclick=()=>{
card.remove()
next()
}

}

function like(place){

favorites.push(place.name)

updateFavorites()

}

function updateFavorites(){

let favList=document.getElementById("fav-list")

favList.innerHTML=""

favorites.forEach(f=>{

let div=document.createElement("div")

div.className="favorite-item"

div.innerText=f

favList.appendChild(div)

})

}

function next(){

index++

if(index>=places.length){

shufflePlaces()

index=0

}

renderCards()

}

loadPlaces()

</script>

</body>

</html>
