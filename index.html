<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:"DIN Round","DINRoundPro","Arial";
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

/* TOP BUTTONS */

.top-left{
position:absolute;
left:15px;
top:15px;
background:none;
border:none;
font-size:22px;
color:white;
cursor:pointer;
}

.top-right{
position:absolute;
right:15px;
top:15px;
background:none;
border:none;
font-size:18px;
color:white;
cursor:pointer;
}

/* FAVORITTER */

#favorites-page{
display:none;
width:360px;
}

.favorite-item{
background:#222;
padding:14px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

/* START SCREEN */

#start-screen{
margin-top:120px;
text-align:center;
}

.category{
background:#222;
padding:12px 20px;
border-radius:20px;
margin:10px;
display:inline-block;
cursor:pointer;
}

.category.active{
background:#4CAF50;
}

.start-btn{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:20px;
background:#4CAF50;
color:white;
cursor:pointer;
}

/* CARD */

#card-stack{
position:relative;
width:360px;
height:520px;
margin-top:10px;
}

.card{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
overflow:hidden;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* OVERLAY */

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:20px;
background:linear-gradient(transparent,rgba(0,0,0,0.8));
}

.place-name{
font-size:22px;
font-weight:bold;
}

.rating{
color:#FFD700;
margin-top:4px;
}

/* NAV BOOK */

.bottom-buttons{
display:flex;
justify-content:center;
gap:15px;
margin-top:10px;
}

.icon-btn{
background:#2196F3;
border:none;
width:45px;
height:45px;
border-radius:50%;
font-size:18px;
color:white;
cursor:pointer;
}

/* LIKE DISLIKE */

.x-btn{
position:absolute;
left:15px;
bottom:15px;
width:45px;
height:45px;
border-radius:50%;
border:none;
font-size:20px;
background:#ff4d4d;
cursor:pointer;
}

.like-btn{
position:absolute;
right:15px;
bottom:15px;
width:45px;
height:45px;
border-radius:50%;
border:none;
font-size:20px;
background:#4CAF50;
cursor:pointer;
}

</style>

</head>

<body>

<div id="favorites-page"></div>

<div id="start-screen">

<h2>Hva vil du utforske?</h2>

<div class="category" data-type="restaurant">Restaurant</div>
<div class="category" data-type="bar">Vinbar</div>
<div class="category" data-type="night_club">Cocktailbar</div>

<br>

<button class="start-btn" onclick="start()">Start</button>

</div>

<div id="card-stack" style="display:none"></div>

<script>

const curatedPlaces=[
"Libertine",
"Territoriet",
"Skaal Matbar",
"F6 Cocktailbar",
"Bettola",
"Himkok",
"Svanen",
"Torggata Botaniske",
"Andre til Høyre",
"Nektar Vinbar",
"Radegast",
"Vinoteket",
"Fuglen",
"Arakataka",
"Le Benjamin",
"Hyde",
"Brasserie France"
]

let places=[]
let favorites=[]
let index=0
let selectedType=null

document.querySelectorAll(".category").forEach(el=>{

el.onclick=()=>{

document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"))

el.classList.add("active")

selectedType=el.dataset.type

}

})

function start(){

if(!selectedType){
alert("Velg kategori")
return
}

document.getElementById("start-screen").style.display="none"
document.getElementById("card-stack").style.display="block"

initMap()

}

function goBack(){

document.getElementById("card-stack").style.display="none"
document.getElementById("start-screen").style.display="block"

}

function showFavorites(){

document.getElementById("favorites-page").style.display="block"
document.getElementById("card-stack").style.display="none"

}

function initMap(){

const map=new google.maps.Map(document.createElement("div"))

const service=new google.maps.places.PlacesService(map)

let loaded=0

curatedPlaces.forEach(name=>{

service.findPlaceFromQuery({

query:name+" oslo",
fields:["place_id"]

},(results,status)=>{

if(status==="OK"){

service.getDetails({

placeId:results[0].place_id,
fields:["name","rating","photos","types"]

},(place,status)=>{

if(status==="OK" && place.rating>=4){

if(place.types.includes(selectedType)){
places.push(place)
}

}

loaded++

if(loaded===curatedPlaces.length){
renderCards()
}

})

}else{
loaded++
}

})

})

}

function renderCards(){

const stack=document.getElementById("card-stack")

stack.innerHTML=""

places.slice(index,index+3).forEach((place,i)=>{

let photo="https://via.placeholder.com/400"

if(place.photos){
photo=place.photos[0].getUrl({maxWidth:600})
}

const card=document.createElement("div")

card.className="card"
card.style.zIndex=100-i

card.innerHTML=`

<img src="${photo}">

<button class="top-left" onclick="goBack()">⬅</button>
<button class="top-right" onclick="showFavorites()">⭐</button>

<div class="overlay">

<div class="place-name">${place.name}</div>
<div class="rating">⭐ ${place.rating}</div>

<div class="bottom-buttons">

<button class="icon-btn nav">📍</button>
<button class="icon-btn book">📅</button>

</div>

</div>

<button class="x-btn">❌</button>
<button class="like-btn">❤️</button>

`

card.querySelector(".nav").onclick=()=>{

window.open(`https://www.google.com/maps/search/?api=1&query=${place.name}`)

}

card.querySelector(".book").onclick=()=>{

window.open(`https://www.google.com/maps/search/?api=1&query=${place.name}`)

}

card.querySelector(".like-btn").onclick=()=>{

favorites.push(place)
updateFavorites()
card.remove()
next()

}

card.querySelector(".x-btn").onclick=()=>{

card.remove()
next()

}

stack.appendChild(card)

})

}

function next(){

index++

if(index>=places.length){
index=0
}

renderCards()

}

function updateFavorites(){

const list=document.getElementById("favorites-page")

list.innerHTML=""

favorites.forEach(place=>{

let div=document.createElement("div")

div.className="favorite-item"

div.innerText=place.name

div.onclick=()=>{

index=places.findIndex(p=>p.name===place.name)

document.getElementById("favorites-page").style.display="none"
document.getElementById("card-stack").style.display="block"

renderCards()

}

list.appendChild(div)

})

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places&callback=initMap" async defer></script>

</body>
</html>
