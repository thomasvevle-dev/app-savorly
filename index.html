<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
overflow:hidden;
}

#map{
width:1px;
height:1px;
opacity:0;
}

/* START */

#start{
margin-top:120px;
text-align:center;
}

.category{
background:#222;
padding:18px 26px;
border-radius:22px;
margin:10px;
cursor:pointer;
font-size:18px;
}

/* CARD STACK */

#cardStack{
position:relative;
width:360px;
height:580px;
display:none;
}

.card{
position:absolute;
width:100%;
height:100%;
border-radius:26px;
overflow:hidden;
background:#000;
}

.card.top{
z-index:3;
}

.card.middle{
z-index:2;
transform:scale(0.96) translateY(10px);
}

.card.bottom{
z-index:1;
transform:scale(0.92) translateY(20px);
}

.photo{
width:100%;
height:100%;
object-fit:cover;
}

/* TOP BAR */

.topbar{
position:absolute;
top:18px;
left:0;
width:100%;
display:flex;
justify-content:space-between;
padding:0 28px;
z-index:10;
}

.icon{
font-size:22px;
text-shadow:0 0 12px rgba(0,0,0,0.9);
cursor:pointer;
}

/* PHOTO INDICATOR */

.photo-indicator{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
z-index:10;
}

.photo-bar{
width:32px;
height:4px;
border-radius:3px;
background:rgba(255,255,255,0.3);
}

.photo-bar.active{
background:white;
}

/* TEXT */

.overlay{
position:absolute;
bottom:110px;
left:22px;
z-index:10;
}

.name{
font-size:30px;
font-weight:600;
}

.rating{
color:#FFD54F;
font-size:18px;
margin-top:6px;
}

/* BUTTONS */

.buttons{
position:absolute;
bottom:25px;
width:100%;
display:flex;
justify-content:space-evenly;
z-index:10;
}

.action{
font-size:28px;
text-shadow:0 0 12px rgba(0,0,0,0.8);
cursor:pointer;
}

/* FAVORITES */

#favoritesPage{
display:none;
width:90%;
max-width:400px;
}

.favorite-item{
background:#222;
padding:16px;
margin:10px 0;
border-radius:12px;
cursor:pointer;
}

.back-button{
margin-top:20px;
background:#333;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
text-align:center;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="start">

<h2>Hva vil du utforske?</h2>

<div class="category" onclick="loadCategory('restaurant')">Restaurant</div>
<div class="category" onclick="loadCategory('wine')">Vinbar</div>
<div class="category" onclick="loadCategory('cocktail')">Cocktailbar</div>

</div>

<div id="cardStack">

<div class="card bottom"></div>

<div class="card middle"></div>

<div class="card top" id="card">

<div class="topbar">

<div class="icon" onclick="back()">⬅</div>
<div class="icon" onclick="openFavorites()">⭐</div>

</div>

<div class="photo-indicator" id="indicator"></div>

<img class="photo" id="photo">

<div class="overlay">

<div class="name" id="name"></div>
<div class="rating" id="rating"></div>

</div>

<div class="buttons">

<div class="action" onclick="skip()">❌</div>
<div class="action" onclick="maps()">📍</div>
<div class="action" onclick="maps()">📅</div>
<div class="action" onclick="like()">❤️</div>

</div>

</div>

</div>

<div id="favoritesPage">

<h2>Favoritter</h2>

<div id="favoritesList"></div>

<div class="back-button" onclick="backToCards()">Tilbake til kort</div>

</div>

<script>

let service
let places=[]
let index=0
let photos=[]
let photoIndex=0
let favorites=[]

function initMap(){

const map=new google.maps.Map(
document.getElementById("map"),
{center:{lat:59.91,lng:10.75},zoom:13}
)

service=new google.maps.places.PlacesService(map)

}

/* LOAD CATEGORY */

async function loadCategory(type){

let res=await fetch("data/places.json")
let data=await res.json()

let list=[]

if(type==="restaurant") list=data.restaurants
if(type==="wine") list=data.winebars
if(type==="cocktail") list=data.cocktailbars

places=[]
index=0

let loaded=0

list.forEach(name=>{

service.findPlaceFromQuery({

query:name+" oslo",
fields:["name","rating","photos"]

},(results,status)=>{

loaded++

if(status==="OK") places.push(results[0])

if(loaded===list.length){

document.getElementById("start").style.display="none"
document.getElementById("cardStack").style.display="block"

show()

}

})

})

}

/* SHOW CARD */

function show(){

let p=places[index]

document.getElementById("name").innerText=p.name
document.getElementById("rating").innerText="⭐ "+(p.rating||"")

photos=[]

if(p.photos){

for(let i=0;i<3 && i<p.photos.length;i++){

photos.push(p.photos[i].getUrl({maxWidth:1200}))

}

}

photoIndex=0

document.getElementById("photo").src=photos[0]

renderIndicator()

}

/* PHOTO INDICATOR */

function renderIndicator(){

const container=document.getElementById("indicator")

container.innerHTML=""

photos.forEach((p,i)=>{

let bar=document.createElement("div")

bar.className="photo-bar"

if(i===photoIndex) bar.classList.add("active")

container.appendChild(bar)

})

}

/* IMAGE SWIPE */

let startX=0

document.getElementById("photo").addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.getElementById("photo").addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(endX-startX>50) prevPhoto()
if(startX-endX>50) nextPhoto()

})

function nextPhoto(){

photoIndex++

if(photoIndex>=photos.length) photoIndex=0

document.getElementById("photo").src=photos[photoIndex]

renderIndicator()

}

function prevPhoto(){

photoIndex--

if(photoIndex<0) photoIndex=photos.length-1

document.getElementById("photo").src=photos[photoIndex]

renderIndicator()

}

/* SWIPE CARD */

let card=document.getElementById("card")

let start=0

card.addEventListener("touchstart",e=>{
start=e.touches[0].clientX
})

card.addEventListener("touchend",e=>{

let end=e.changedTouches[0].clientX

if(end-start>120) like()
if(start-end>120) skip()

})

function animate(direction){

card.style.transition="transform 0.4s"

if(direction==="right"){

card.style.transform="translateX(600px) rotate(30deg)"

}else{

card.style.transform="translateX(-600px) rotate(-30deg)"

}

setTimeout(()=>{

card.style.transition="none"
card.style.transform="translateX(0)"

next()

},400)

}

function like(){

favorites.push(index)

animate("right")

}

function skip(){

animate("left")

}

function next(){

index++

if(index>=places.length) index=0

show()

}

function maps(){

let p=places[index]

window.open("https://maps.google.com/?q="+p.name)

}

/* FAVORITES */

function openFavorites(){

document.getElementById("cardStack").style.display="none"

document.getElementById("favoritesPage").style.display="block"

const list=document.getElementById("favoritesList")

list.innerHTML=""

favorites.forEach(i=>{

let item=document.createElement("div")

item.className="favorite-item"

item.innerText=places[i].name

item.onclick=function(){

index=i

document.getElementById("favoritesPage").style.display="none"

document.getElementById("cardStack").style.display="block"

show()

}

list.appendChild(item)

})

}

function backToCards(){

document.getElementById("favoritesPage").style.display="none"

document.getElementById("cardStack").style.display="block"

}

function back(){

document.getElementById("cardStack").style.display="none"

document.getElementById("favoritesPage").style.display="none"

document.getElementById("start").style.display="block"

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places&callback=initMap"></script>

</body>
</html>
