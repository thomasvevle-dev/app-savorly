<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

/* top bar */

.topbar{
width:100%;
display:flex;
justify-content:space-between;
padding:12px 20px;
box-sizing:border-box;
}

.top-btn{
background:#222;
border:none;
padding:8px 15px;
border-radius:20px;
color:white;
cursor:pointer;
}

/* favorites page */

#favorites-page{
display:none;
width:100%;
max-width:420px;
}

.favorite-item{
background:#222;
padding:15px;
margin:10px;
border-radius:10px;
cursor:pointer;
}

/* category */

#start-screen{
margin-top:100px;
text-align:center;
}

.category{
background:#222;
padding:12px 20px;
border-radius:20px;
margin:10px;
display:inline-block;
cursor:pointer;
}

.category.active{
background:#4CAF50;
}

/* cards */

#card-stack{
position:relative;
width:360px;
height:520px;
margin-top:20px;
}

.card{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* overlay */

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:20px;
background:linear-gradient(transparent, rgba(0,0,0,0.8));
}

.place-name{
font-size:24px;
font-weight:bold;
}

.rating{
color:#FFD700;
margin-top:4px;
}

.buttons{
display:flex;
gap:10px;
margin-top:10px;
}

.small-btn{
background:#2196F3;
border:none;
padding:6px 10px;
border-radius:6px;
color:white;
font-size:12px;
cursor:pointer;
}

/* swipe buttons */

.swipe-buttons{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:25px;
}

.swipe-buttons button{
width:60px;
height:60px;
border-radius:50%;
border:none;
font-size:22px;
cursor:pointer;
}

.dislike{background:#ff4d4d}
.like{background:#4CAF50}

</style>

</head>

<body>

<div class="topbar">

<button class="top-btn" onclick="showFavorites()">⭐ Favoritter</button>

</div>

<div id="favorites-page"></div>

<div id="start-screen">

<h2>Velg kategori</h2>

<div class="category" data-type="restaurant">Restaurant</div>
<div class="category" data-type="bar">Vinbar</div>
<div class="category" data-type="night_club">Cocktailbar</div>

<br><br>

<button onclick="start()">Start</button>

</div>

<div id="card-stack" style="display:none"></div>

<script>

const curatedPlaces=[

"Libertine",
"Territoriet",
"Skaal Matbar",
"F6 Cocktailbar",
"Bettola",
"Himkok",
"Svanen",
"Torggata Botaniske",
"Andre til Høyre",
"Nektar Vinbar",
"Radegast",
"Vinoteket",
"Fuglen",
"Arakataka",
"Le Benjamin",
"Hyde",
"Brasserie France"

]

let places=[]
let favorites=[]
let index=0
let selectedType=null

document.querySelectorAll(".category").forEach(el=>{

el.onclick=()=>{

document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"))

el.classList.add("active")

selectedType=el.dataset.type

}

})

function start(){

if(!selectedType){
alert("Velg kategori")
return
}

document.getElementById("start-screen").style.display="none"
document.getElementById("card-stack").style.display="block"

initMap()

}

function initMap(){

const map=new google.maps.Map(document.createElement("div"))

const service=new google.maps.places.PlacesService(map)

curatedPlaces.forEach(name=>{

service.findPlaceFromQuery({

query:name+" oslo",
fields:["place_id"]

},(results,status)=>{

if(status!=="OK") return

service.getDetails({

placeId:results[0].place_id,
fields:["name","rating","photos","types"]

},(place,status)=>{

if(status!=="OK") return

if(!place.rating || place.rating<4) return

if(!place.types.includes(selectedType)) return

places.push(place)

renderCards()

})

})

})

}

function renderCards(){

const stack=document.getElementById("card-stack")

stack.innerHTML=""

places.slice(index,index+3).forEach((place,i)=>{

let photo="https://via.placeholder.com/400"

if(place.photos){
photo=place.photos[0].getUrl({maxWidth:600})
}

const card=document.createElement("div")

card.className="card"
card.style.zIndex=100-i

card.innerHTML=`

<img src="${photo}">

<div class="overlay">

<div class="place-name">${place.name}</div>
<div class="rating">⭐ ${place.rating}</div>

<div class="buttons">

<button class="small-btn nav">Naviger</button>
<button class="small-btn book">Book</button>

</div>

</div>

<div class="swipe-buttons">

<button class="dislike">❌</button>
<button class="like">❤️</button>

</div>

`

card.querySelector(".nav").onclick=()=>{

window.open(`https://www.google.com/maps/search/?api=1&query=${place.name}`)

}

card.querySelector(".book").onclick=()=>{

window.open(`https://www.google.com/maps/search/?api=1&query=${place.name}`)

}

card.querySelector(".like").onclick=()=>{

favorites.push(place)

updateFavorites()

card.remove()

next()

}

card.querySelector(".dislike").onclick=()=>{

card.remove()

next()

}

stack.appendChild(card)

})

}

function next(){

index++

if(index>=places.length){
index=0
}

renderCards()

}

function updateFavorites(){

const list=document.getElementById("favorites-page")

list.innerHTML=""

favorites.forEach((place,i)=>{

let div=document.createElement("div")

div.className="favorite-item"

div.innerText=place.name

div.onclick=()=>{

index=i

list.style.display="none"

renderCards()

}

list.appendChild(div)

})

}

function showFavorites(){

const page=document.getElementById("favorites-page")

page.style.display="block"

document.getElementById("card-stack").style.display="none"

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places"></script>

</body>
</html>
