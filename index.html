<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savorly</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:black;
color:white;
}

#home{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:flex;
flex-direction:column;
align-items:center;
padding-top:120px;
overflow-y:auto;
}

.logo{
width:220px;
margin-bottom:40px;
}

.cat{
width:80%;
max-width:420px;
padding:18px;
margin:12px;
border-radius:20px;
background:#111;
border:1px solid #333;
text-align:center;
font-size:22px;
}

.section{
width:80%;
max-width:420px;
margin-top:40px;
}

.favoriteItem{
padding:14px;
border-bottom:1px solid #333;
}

#deck{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:none;
justify-content:center;
align-items:center;
}

.card{
position:absolute;
width:95%;
height:92%;
border-radius:26px;
overflow:hidden;
background:black;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.info{
position:absolute;
bottom:130px;
left:24px;
}

.name{
font-size:34px;
font-weight:600;
}

.buttons{
position:absolute;
bottom:30px;
left:0;
right:0;
display:flex;
justify-content:space-evenly;
font-size:34px;
}

.topbtn{
position:absolute;
top:30px;
font-size:28px;
}

.back{ left:20px; }
.undo{ right:20px; }

.photoDots{
position:absolute;
top:16px;
left:0;
right:0;
text-align:center;
}

.dot{
display:inline-block;
width:22px;
height:4px;
background:rgba(255,255,255,.4);
margin:3px;
border-radius:10px;
}

.dot.active{
background:white;
}

</style>
</head>

<body>

<div id="home">

<img src="logo.png" class="logo">

<div class="cat" onclick="openCategory('restaurants')">Restaurant</div>
<div class="cat" onclick="openCategory('winebars')">Vinbar</div>
<div class="cat" onclick="openCategory('cocktailbars')">Cocktailbar</div>

<div class="section">
<h3>Favoritter</h3>
<div id="favorites"></div>
</div>

</div>

<div id="deck"></div>

<script>

let data;
let list=[];
let index=0;
let history=[];
let favorites=JSON.parse(localStorage.getItem("favorites")||"[]");

const deck=document.getElementById("deck");

async function loadData(){

const res=await fetch("data/places.json");
data=await res.json();

renderFavorites();

}

loadData();

function openCategory(type){

list=data[type];

if(!list || list.length===0){
alert("Ingen steder funnet i "+type);
return;
}

index=0;

document.getElementById("home").style.display="none";
deck.style.display="flex";

buildDeck();

}

function buildDeck(){

deck.innerHTML="";

for(let i=index;i<index+3;i++){

if(!list[i]) continue;

createCard(list[i]);

}

}

function createCard(name){

const card=document.createElement("div");
card.className="card";

let photos=[
"https://source.unsplash.com/featured/?restaurant",
"https://source.unsplash.com/featured/?food",
"https://source.unsplash.com/featured/?cocktail"
];

let photoIndex=0;

card.innerHTML=`

<img src="${photos[0]}">

<div class="photoDots">
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

<div class="topbtn back" onclick="goHome()">←</div>
<div class="topbtn undo" onclick="undo()">↩</div>

<div class="info">
<div class="name">${name}</div>
</div>

<div class="buttons">
<div onclick="dislike()">❌</div>
<div onclick="navigate('${name}')">📍</div>
<div onclick="book('${name}')">📅</div>
<div onclick="like('${name}')">❤️</div>
</div>

`;

card.onclick=()=>{

photoIndex=(photoIndex+1)%3;

card.querySelector("img").src=photos[photoIndex];

const dots=card.querySelectorAll(".dot");

dots.forEach((d,x)=>d.classList.toggle("active",x===photoIndex));

};

enableSwipe(card);

deck.appendChild(card);

}

function enableSwipe(card){

let startX;

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

card.addEventListener("touchmove",e=>{

const diff=e.touches[0].clientX-startX;

card.style.transform=`translateX(${diff}px) rotate(${diff/20}deg)`;

});

card.addEventListener("touchend",e=>{

const diff=e.changedTouches[0].clientX-startX;

if(diff>120) like();
else if(diff<-120) dislike();
else card.style.transform="";

});

}

function like(name){

if(name && !favorites.includes(name)){
favorites.push(name);
localStorage.setItem("favorites",JSON.stringify(favorites));
renderFavorites();
}

next();

}

function dislike(){
next();
}

function next(){

history.push(index);
index++;
buildDeck();

}

function undo(){

if(history.length===0) return;

index=history.pop();
buildDeck();

}

function goHome(){

deck.style.display="none";
document.getElementById("home").style.display="flex";

}

function renderFavorites(){

const box=document.getElementById("favorites");

box.innerHTML="";

favorites.forEach(f=>{

const el=document.createElement("div");
el.className="favoriteItem";
el.innerText=f;

el.onclick=()=>openFromFavorite(f);

box.appendChild(el);

});

}

function openFromFavorite(name){

const pos=list.indexOf(name);

if(pos>=0){

index=pos;

document.getElementById("home").style.display="none";
deck.style.display="flex";

buildDeck();

}

}

function navigate(name){

window.open(`https://maps.google.com/?q=${encodeURIComponent(name+" Oslo")}`);

}

function book(name){

window.open(`https://www.google.com/search?q=${encodeURIComponent(name+" booking")}`);

}

</script>

</body>
</html>
