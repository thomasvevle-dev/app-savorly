<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
}

#card-stack{
position:relative;
width:340px;
height:500px;
margin-top:30px;
}

.card{
position:absolute;
width:100%;
height:100%;
background:#222;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.image-container{
position:relative;
width:100%;
height:260px;
overflow:hidden;
}

.image-container img{
width:100%;
height:100%;
object-fit:cover;
}

.photo-dots{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#aaa;
}

.dot.active{
background:white;
}

.info{
padding:15px;
}

.place-name{
font-size:20px;
font-weight:bold;
}

.rating{
color:#FFD700;
margin:5px 0;
}

.small-buttons{
display:flex;
gap:8px;
margin:8px 0;
}

.small-buttons button{
font-size:12px;
padding:6px 10px;
border-radius:6px;
border:none;
cursor:pointer;
background:#2196F3;
color:white;
}

.buttons{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.buttons button{
border:none;
border-radius:50%;
width:60px;
height:60px;
font-size:22px;
cursor:pointer;
}

.dislike{
background:#ff4d4d;
}

.like{
background:#4CAF50;
}

#favorites{
margin:20px;
width:90%;
}

.favorite-item{
background:#222;
padding:10px;
margin:6px 0;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="card-stack"></div>

<div id="favorites">
<h3>Favoritter ❤️</h3>
<div id="fav-list"></div>
</div>

<script>

let places=[]
let favorites=[]
let index=0

function initMap(){

const map = new google.maps.Map(document.createElement("div"), {
center:{lat:59.9139,lng:10.7522},
zoom:13
})

const service = new google.maps.places.PlacesService(map)

let types=["restaurant","bar","night_club"]

types.forEach(type=>{

service.nearbySearch({

location:{lat:59.9139,lng:10.7522},
radius:3500,
type:type

},(results,status)=>{

if(status===google.maps.places.PlacesServiceStatus.OK){

let filtered = results.filter(place => {

if(!place.rating) return false
if(place.rating < 4) return false

let name = place.name.toLowerCase()

if(name.includes("hotel")) return false
if(name.includes("hostel")) return false

return true

})

places=[...places,...filtered]

shufflePlaces()

renderCards()

}

})

})

}

function shufflePlaces(){
places.sort(()=>Math.random()-0.5)
}

function renderCards(){

const stack=document.getElementById("card-stack")

stack.innerHTML=""

places.slice(index,index+5).forEach((place,i)=>{

let photos=[]

if(place.photos){

place.photos.slice(0,5).forEach(p=>{
photos.push(p.getUrl({maxWidth:500}))
})

}

if(photos.length===0){
photos=["https://via.placeholder.com/400x260"]
}

let photoIndex=0

const card=document.createElement("div")

card.className="card"
card.style.zIndex=100-i

card.innerHTML=`

<div class="image-container">

<img src="${photos[0]}" class="photo">

<div class="photo-dots">
${photos.map((_,i)=>`<div class="dot ${i==0?"active":""}"></div>`).join("")}
</div>

</div>

<div class="info">

<div class="place-name">${place.name}</div>

<div class="rating">⭐ ${place.rating}</div>

<div class="small-buttons">
<button class="nav">📍 Naviger</button>
<button class="book">📅 Book</button>
</div>

<div class="buttons">
<button class="dislike">❌</button>
<button class="like">❤️</button>
</div>

</div>
`

const img=card.querySelector(".photo")
const dots=card.querySelectorAll(".dot")

let startX=0

card.querySelector(".image-container").addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.querySelector(".image-container").addEventListener("touchend",e=>{

let diff=e.changedTouches[0].clientX-startX

if(diff<-50 && photoIndex<photos.length-1){
photoIndex++
}

if(diff>50 && photoIndex>0){
photoIndex--
}

img.src=photos[photoIndex]

dots.forEach((d,i)=>{
d.classList.toggle("active",i===photoIndex)
})

})

card.querySelector(".nav").onclick=()=>{

window.open(
`https://www.google.com/maps/search/?api=1&query=${place.name}`
)

}

card.querySelector(".book").onclick=()=>{

window.open(
`https://www.google.com/maps/search/?api=1&query=${place.name}`
)

}

card.querySelector(".like").onclick=()=>{
like(place)
card.remove()
next()
}

card.querySelector(".dislike").onclick=()=>{
card.remove()
next()
}

stack.appendChild(card)

})

}

function like(place){

favorites.push(place)

updateFavorites()

}

function updateFavorites(){

let favList=document.getElementById("fav-list")

favList.innerHTML=""

favorites.forEach(f=>{

let div=document.createElement("div")

div.className="favorite-item"

div.innerText=f.name

div.onclick=()=>{

index=places.findIndex(p=>p.name===f.name)

renderCards()

}

favList.appendChild(div)

})

}

function next(){

index++

if(index>=places.length){

shufflePlaces()

index=0

}

renderCards()

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places&callback=initMap" async defer></script>

</body>
</html>
