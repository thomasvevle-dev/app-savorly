<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
overflow:hidden;
}

#map{
width:1px;
height:1px;
opacity:0;
}

#start{
margin-top:120px;
text-align:center;
}

.category{
background:#222;
padding:18px 26px;
border-radius:22px;
margin:10px;
cursor:pointer;
font-size:18px;
}

/* CARD */

#cardStack{
position:relative;
width:360px;
height:580px;
display:none;
}

.card{
position:absolute;
width:100%;
height:100%;
border-radius:26px;
overflow:hidden;
background:#000;
}

.photo{
width:100%;
height:100%;
object-fit:cover;
}

/* TOP ICONS */

.back{
position:absolute;
top:18px;
left:20px;
font-size:24px;
text-shadow:0 0 12px black;
cursor:pointer;
z-index:10;
}

.favorite{
position:absolute;
top:18px;
right:28px;
font-size:24px;
text-shadow:0 0 12px black;
cursor:pointer;
z-index:10;
}

/* PHOTO INDICATOR */

.photo-indicator{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
z-index:10;
}

.photo-bar{
width:32px;
height:4px;
border-radius:3px;
background:rgba(255,255,255,0.3);
}

.photo-bar.active{
background:white;
}

/* TEXT */

.overlay{
position:absolute;
bottom:110px;
left:22px;
z-index:10;
}

.name{
font-size:30px;
font-weight:600;
}

.rating{
color:#FFD54F;
font-size:18px;
margin-top:6px;
}

/* BUTTONS */

.buttons{
position:absolute;
bottom:25px;
width:100%;
display:flex;
justify-content:space-evenly;
z-index:10;
}

.action{
font-size:28px;
text-shadow:0 0 12px black;
cursor:pointer;
}

/* FAVORITES */

#favoritesPage{
display:none;
width:90%;
max-width:400px;
}

.favorite-item{
background:#222;
padding:16px;
margin:10px 0;
border-radius:12px;
cursor:pointer;
}

.back-button{
margin-top:20px;
background:#333;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
text-align:center;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="start">

<h2>Hva vil du utforske?</h2>

<div class="category" onclick="loadCategory('restaurant')">Restaurant</div>
<div class="category" onclick="loadCategory('wine')">Vinbar</div>
<div class="category" onclick="loadCategory('cocktail')">Cocktailbar</div>

</div>

<div id="cardStack">

<div class="card" id="card">

<div class="back" onclick="back()">⬅</div>

<div class="favorite" id="favIcon" onclick="toggleFavorite()">☆</div>

<div class="photo-indicator" id="indicator"></div>

<img class="photo" id="photo">

<div class="overlay">

<div class="name" id="name"></div>

<div class="rating" id="rating"></div>

</div>

<div class="buttons">

<div class="action" onclick="skip()">❌</div>
<div class="action" onclick="maps()">📍</div>
<div class="action" onclick="maps()">📅</div>
<div class="action" onclick="like()">❤️</div>

</div>

</div>

</div>

<div id="favoritesPage">

<h2>Favoritter</h2>

<div id="favoritesList"></div>

<div class="back-button" onclick="backToCards()">Tilbake</div>

</div>

<script>

let service
let places=[]
let index=0
let photos=[]
let photoIndex=0
let favorites=[]

function initMap(){

const map=new google.maps.Map(
document.getElementById("map"),
{center:{lat:59.91,lng:10.75},zoom:13}
)

service=new google.maps.places.PlacesService(map)

}

/* LOAD CATEGORY */

async function loadCategory(type){

let res=await fetch("data/places.json")

let data=await res.json()

let list=[]

if(type==="restaurant") list=data.restaurants
if(type==="wine") list=data.winebars
if(type==="cocktail") list=data.cocktailbars

places=[]
index=0

for(let name of list){

await new Promise(resolve=>{

service.findPlaceFromQuery({

query:name+" oslo",
fields:["place_id"]

},(results,status)=>{

if(status==="OK"){

service.getDetails({

placeId:results[0].place_id,
fields:["name","rating","photos"]

},(place)=>{

places.push(place)

resolve()

})

}else resolve()

})

})

}

document.getElementById("start").style.display="none"

document.getElementById("cardStack").style.display="block"

show()

}

/* SHOW CARD */

function show(){

let p=places[index]

document.getElementById("name").innerText=p.name

document.getElementById("rating").innerText="⭐ "+(p.rating||"")

photos=[]

if(p.photos){

for(let i=0;i<Math.min(3,p.photos.length);i++){

photos.push(p.photos[i].getUrl({maxWidth:1200}))

}

}

photoIndex=0

if(photos.length>0){

document.getElementById("photo").src=photos[0]

}

renderIndicator()

updateFavIcon()

}

/* INDICATOR */

function renderIndicator(){

const container=document.getElementById("indicator")

container.innerHTML=""

photos.forEach((p,i)=>{

let bar=document.createElement("div")

bar.className="photo-bar"

if(i===photoIndex) bar.classList.add("active")

container.appendChild(bar)

})

}

/* IMAGE SWIPE */

let startX=0

photo.addEventListener("pointerdown",e=>{
startX=e.clientX
})

photo.addEventListener("pointerup",e=>{

let endX=e.clientX

if(endX-startX>50) prevPhoto()

if(startX-endX>50) nextPhoto()

})

function nextPhoto(){

photoIndex++

if(photoIndex>=photos.length) photoIndex=0

photo.src=photos[photoIndex]

renderIndicator()

}

function prevPhoto(){

photoIndex--

if(photoIndex<0) photoIndex=photos.length-1

photo.src=photos[photoIndex]

renderIndicator()

}

/* SWIPE CARD */

let card=document.getElementById("card")

let dragStart=0

card.addEventListener("pointerdown",e=>{
dragStart=e.clientX
})

card.addEventListener("pointerup",e=>{

let delta=e.clientX-dragStart

if(delta>120) like()

if(delta<-120) skip()

})

function animate(dir){

card.style.transition="transform 0.35s"

if(dir==="right"){

card.style.transform="translateX(600px) rotate(25deg)"

}else{

card.style.transform="translateX(-600px) rotate(-25deg)"

}

setTimeout(()=>{

card.style.transition=""

card.style.transform=""

next()

},350)

}

function like(){

favorites.push(index)

animate("right")

}

function skip(){

animate("left")

}

function next(){

index++

if(index>=places.length) index=0

show()

}

function maps(){

let p=places[index]

window.open("https://maps.google.com/?q="+p.name)

}

/* FAVORITES */

function toggleFavorite(){

if(favorites.includes(index)){

favorites=favorites.filter(f=>f!==index)

}else{

favorites.push(index)

}

updateFavIcon()

}

function updateFavIcon(){

let icon=document.getElementById("favIcon")

if(favorites.includes(index)){

icon.innerText="⭐"

}else{

icon.innerText="☆"

}

}

function back(){

document.getElementById("cardStack").style.display="none"

document.getElementById("start").style.display="block"

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places&callback=initMap"></script>

</body>
</html>
