<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:#000;
overflow:hidden;
}

/* MAP */

#map{width:1px;height:1px;opacity:0}

/* START SCREEN */

#start{
position:absolute;
top:80px;
width:100%;
text-align:center;
z-index:20;
color:white;
}

.category{
background:#222;
padding:18px;
border-radius:22px;
margin:10px auto;
width:260px;
cursor:pointer;
}

/* CARD STACK */

#cardStack{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
display:none;
}

.card{
position:absolute;
width:100%;
height:100%;
border-radius:24px;
overflow:hidden;
transition:transform .3s ease;
background:#000;
}

.card.next{
transform:scale(.96) translateY(12px);
}

.card.third{
transform:scale(.92) translateY(24px);
}

/* IMAGE */

.photo{
width:100%;
height:100%;
object-fit:cover;
}

/* ICONS */

.back{
position:absolute;
top:20px;
left:20px;
font-size:26px;
z-index:10;
cursor:pointer;
color:white;
}

.prev{
position:absolute;
top:20px;
right:20px;
font-size:26px;
z-index:10;
cursor:pointer;
color:white;
}

/* TEXT */

.overlay{
position:absolute;
bottom:120px;
left:24px;
color:white;
z-index:10;
}

.name{
font-size:32px;
font-weight:600;
}

.rating{
color:#FFD54F;
font-size:18px;
}

/* PHOTO INDICATOR */

.photo-indicator{
position:absolute;
top:16px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
z-index:10;
}

.photo-bar{
width:32px;
height:4px;
border-radius:3px;
background:rgba(255,255,255,.3);
}

.photo-bar.active{
background:white;
}

/* BUTTONS */

.buttons{
position:absolute;
bottom:40px;
width:100%;
display:flex;
justify-content:space-evenly;
z-index:10;
color:white;
}

.action{
font-size:32px;
cursor:pointer;
}

/* SWIPE OVERLAY */

.swipeLike{
position:absolute;
top:100px;
right:40px;
font-size:80px;
color:#00ff88;
opacity:0;
transform:rotate(20deg);
}

.swipeNope{
position:absolute;
top:100px;
left:40px;
font-size:80px;
color:#ff3b3b;
opacity:0;
transform:rotate(-20deg);
}

</style>
</head>

<body>

<div id="map"></div>

<div id="start">

<h2>Savorly</h2>

<div class="category" onclick="openCategory('restaurant')">Restaurant</div>
<div class="category" onclick="openCategory('wine')">Vinbar</div>
<div class="category" onclick="openCategory('cocktail')">Cocktailbar</div>

</div>

<div id="cardStack">

<div class="card" id="card1"></div>
<div class="card next" id="card2"></div>
<div class="card third" id="card3"></div>

</div>

<script>

let service
let places=[]
let index=0

let startX=0
let currentX=0
let dragging=false

function initMap(){

const map=new google.maps.Map(
document.getElementById("map"),
{center:{lat:59.91,lng:10.75},zoom:13}
)

service=new google.maps.places.PlacesService(map)

}

/* CATEGORY */

async function openCategory(type){

let data=await fetch("data/places.json").then(r=>r.json())

let list=[]

if(type==="restaurant")list=data.restaurants
if(type==="wine")list=data.winebars
if(type==="cocktail")list=data.cocktailbars

const requests=list.map(name=>{

return new Promise(resolve=>{

service.findPlaceFromQuery({
query:name+" oslo",
fields:["place_id"]
},(results,status)=>{

if(status==="OK"){

service.getDetails({
placeId:results[0].place_id,
fields:["rating","photos"]
},(place)=>{

resolve({
name:name,
rating:place.rating,
photos:place.photos
})

})

}else resolve({name:name})

})

})

})

places=(await Promise.all(requests)).filter(p=>p)

index=0

start.style.display="none"
cardStack.style.display="block"

renderStack()

}

/* RENDER STACK */

function renderStack(){

renderCard(card1,places[index])
renderCard(card2,places[index+1])
renderCard(card3,places[index+2])

}

/* CARD */

function renderCard(card,data){

if(!data)return

let imgs=[]

if(data.photos){

for(let i=0;i<Math.min(3,data.photos.length);i++){
imgs.push(data.photos[i].getUrl({maxWidth:1200}))
}

}

if(imgs.length===0){
imgs=["https://images.unsplash.com/photo-1414235077428-338989a2e8c0"]
}

/* PRELOAD */

imgs.forEach(src=>{
let img=new Image()
img.src=src
})

let photoIndex=0

card.innerHTML=`

<div class="back" onclick="back()">⬅</div>
<div class="prev" onclick="prevCard()">↩</div>

<div class="swipeLike">❤️</div>
<div class="swipeNope">❌</div>

<div class="photo-indicator"></div>

<img class="photo">

<div class="overlay">

<div class="name">${data.name}</div>
<div class="rating">${data.rating?"⭐ "+data.rating:""}</div>

</div>

<div class="buttons">

<div class="action" onclick="skip()">❌</div>
<div class="action" onclick="maps()">📍</div>
<div class="action" onclick="maps()">📅</div>
<div class="action" onclick="like()">❤️</div>

</div>
`

let img=card.querySelector(".photo")
let indicator=card.querySelector(".photo-indicator")
let likeOverlay=card.querySelector(".swipeLike")
let nopeOverlay=card.querySelector(".swipeNope")

function renderIndicator(){

indicator.innerHTML=""

imgs.forEach((p,i)=>{

let bar=document.createElement("div")
bar.className="photo-bar"

if(i===photoIndex)bar.classList.add("active")

indicator.appendChild(bar)

})

}

renderIndicator()

img.src=imgs[0]

img.onclick=()=>{

photoIndex++

if(photoIndex>=imgs.length)photoIndex=0

img.src=imgs[photoIndex]

renderIndicator()

}

card.likeOverlay=likeOverlay
card.nopeOverlay=nopeOverlay

}

/* SWIPE */

function swipe(dir){

card1.style.transform=
dir==="right"
?"translateX(600px) rotate(20deg)"
:"translateX(-600px) rotate(-20deg)"

setTimeout(()=>{

index++

card1.style.transform=""
card1.likeOverlay.style.opacity=0
card1.nopeOverlay.style.opacity=0

renderStack()

},250)

}

function like(){swipe("right")}
function skip(){swipe("left")}

/* DRAG SWIPE */

cardStack.addEventListener("pointerdown",e=>{
dragging=true
startX=e.clientX
})

cardStack.addEventListener("pointermove",e=>{

if(!dragging)return

currentX=e.clientX-startX

card1.style.transform=
`translateX(${currentX}px) rotate(${currentX/10}deg)`

let percent=Math.abs(currentX)/150

if(currentX>0){

card1.likeOverlay.style.opacity=percent
card1.nopeOverlay.style.opacity=0

}else{

card1.nopeOverlay.style.opacity=percent
card1.likeOverlay.style.opacity=0

}

})

cardStack.addEventListener("pointerup",()=>{

if(!dragging)return

dragging=false

if(currentX>120)swipe("right")
else if(currentX<-120)swipe("left")
else{

card1.style.transform=""
card1.likeOverlay.style.opacity=0
card1.nopeOverlay.style.opacity=0

}

currentX=0

})

/* MAP */

function maps(){

let p=places[index]

window.open("https://maps.google.com/?q="+p.name)

}

function back(){

cardStack.style.display="none"
start.style.display="block"

}

function prevCard(){

if(index===0)return

index--

renderStack()

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places&callback=initMap"></script>

</body>
</html>
