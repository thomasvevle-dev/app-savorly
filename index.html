<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:"DIN Round","DINRoundPro",Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
overflow:hidden;
}

/* START */

#start-screen{
margin-top:120px;
text-align:center;
}

.category{
background:#222;
padding:12px 20px;
border-radius:20px;
margin:10px;
display:inline-block;
cursor:pointer;
}

.category.active{
background:#4CAF50;
}

.start-btn{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:20px;
background:#4CAF50;
color:white;
cursor:pointer;
}

/* CARD */

#card-stack{
position:relative;
width:360px;
height:540px;
margin-top:10px;
}

.card{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
overflow:hidden;
touch-action:none;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* TOP */

.back-btn{
position:absolute;
left:15px;
top:15px;
font-size:22px;
background:none;
border:none;
color:white;
cursor:pointer;
}

.fav-btn{
position:absolute;
right:15px;
top:15px;
font-size:20px;
background:none;
border:none;
color:white;
cursor:pointer;
}

/* INFO */

.overlay{
position:absolute;
bottom:80px;
left:20px;
}

.place-name{
font-size:24px;
font-weight:bold;
}

.rating{
color:#FFD700;
}

/* ICON ROW */

.icon-row{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:space-evenly;
}

.icon-btn{
width:50px;
height:50px;
border-radius:50%;
border:none;
font-size:20px;
cursor:pointer;
background:#333;
color:white;
}

/* FAVORITTER */

#favorites-page{
display:none;
width:360px;
margin-top:40px;
}

.favorite-item{
background:#222;
padding:14px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="start-screen">

<h2>Hva vil du utforske?</h2>

<div class="category" data-type="restaurant">Restaurant</div>
<div class="category" data-type="wine">Vinbar</div>
<div class="category" data-type="cocktail">Cocktailbar</div>

<br>

<button class="start-btn" onclick="start()">Start</button>

</div>

<div id="favorites-page"></div>

<div id="card-stack" style="display:none"></div>

<script>

let userLocation=null

navigator.geolocation.getCurrentPosition(pos=>{
userLocation={
lat:pos.coords.latitude,
lng:pos.coords.longitude
}
})

const restaurants=[/* dine 67 restauranter */]
const wineBars=[/* dine 30 vinbarer */]
const cocktailBars=[/* dine 30 cocktailbarer */]

let places=[]
let favorites=[]
let index=0
let selectedType=null

document.querySelectorAll(".category").forEach(el=>{

el.onclick=()=>{

document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"))

el.classList.add("active")

selectedType=el.dataset.type

}

})

function start(){

if(!selectedType){
alert("Velg kategori")
return
}

if(selectedType==="restaurant") places=[...restaurants]
if(selectedType==="wine") places=[...wineBars]
if(selectedType==="cocktail") places=[...cocktailBars]

document.getElementById("start-screen").style.display="none"
document.getElementById("card-stack").style.display="block"

shuffle()

renderCards()

}

function shuffle(){
places.sort(()=>Math.random()-0.5)
}

function renderCards(){

const stack=document.getElementById("card-stack")

stack.innerHTML=""

places.slice(index,index+3).forEach((name,i)=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="https://source.unsplash.com/600x800/?restaurant">

<button class="back-btn" onclick="goBack()">⬅</button>
<button class="fav-btn" onclick="showFavorites()">⭐</button>

<div class="overlay">

<div class="place-name">${name}</div>
<div class="rating">⭐ 4.2</div>

</div>

<div class="icon-row">

<button class="icon-btn skip">❌</button>
<button class="icon-btn nav">📍</button>
<button class="icon-btn book">📅</button>
<button class="icon-btn like">❤️</button>

</div>

`

addSwipe(card,name)

card.querySelector(".like").onclick=()=>{
favorites.push(name)
updateFavorites()
next()
}

card.querySelector(".skip").onclick=()=>{
next()
}

card.querySelector(".nav").onclick=()=>{
window.open("https://maps.google.com/search/"+name)
}

card.querySelector(".book").onclick=()=>{
window.open("https://maps.google.com/search/"+name)
}

stack.appendChild(card)

})

}

function addSwipe(card,name){

let startX=0

card.addEventListener("pointerdown",e=>{
startX=e.clientX
})

card.addEventListener("pointermove",e=>{

if(!startX) return

let diff=e.clientX-startX

card.style.transform=`translateX(${diff}px) rotate(${diff/10}deg)`

})

card.addEventListener("pointerup",e=>{

let diff=e.clientX-startX

if(diff>120){
favorites.push(name)
updateFavorites()
next()
}

else if(diff<-120){
next()
}

else{
card.style.transform=""
}

startX=0

})

}

function next(){

index++

if(index>=places.length){
index=0
shuffle()
}

renderCards()

}

function goBack(){

document.getElementById("card-stack").style.display="none"
document.getElementById("start-screen").style.display="block"

}

function showFavorites(){

const list=document.getElementById("favorites-page")

list.innerHTML=""

favorites.forEach(place=>{

let div=document.createElement("div")

div.className="favorite-item"

div.innerText=place

div.onclick=()=>{

index=places.indexOf(place)

document.getElementById("favorites-page").style.display="none"
document.getElementById("card-stack").style.display="block"

renderCards()

}

list.appendChild(div)

})

document.getElementById("favorites-page").style.display="block"
document.getElementById("card-stack").style.display="none"

}

function updateFavorites(){}

</script>

</body>
</html>
