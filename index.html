<!DOCTYPE html>
<html lang="no">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
}

#card-stack{
position:relative;
width:340px;
height:470px;
margin-top:20px;
}

.card{
position:absolute;
width:100%;
height:100%;
background:#222;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
touch-action:none;
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.info{
padding:15px;
}

.place-name{
font-size:20px;
font-weight:bold;
margin-bottom:4px;
}

.rating{
color:#FFD700;
margin-bottom:8px;
}

.buttons{
display:flex;
justify-content:space-between;
margin-top:10px;
}

button{
border:none;
border-radius:50%;
width:60px;
height:60px;
font-size:22px;
cursor:pointer;
}

.dislike{
background:#ff4d4d;
}

.like{
background:#4CAF50;
}

.map-btn{
margin-top:8px;
background:#2196F3;
padding:8px;
border-radius:8px;
border:none;
width:100%;
color:white;
}

#favorites{
margin:20px;
width:90%;
}

.favorite-item{
background:#222;
padding:10px;
margin:6px 0;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="card-stack"></div>

<div id="favorites">

<h3>Favoritter ❤️</h3>

<div id="fav-list"></div>

</div>

<script>

let places=[]
let favorites=[]
let index=0

async function loadPlaces(){

let query=`
[out:json];
(
node["amenity"="restaurant"](59.9,10.7,59.95,10.8);
node["amenity"="bar"](59.9,10.7,59.95,10.8);
node["amenity"="pub"](59.9,10.7,59.95,10.8);
);
out;
`

let res=await fetch(
"https://overpass-api.de/api/interpreter",
{
method:"POST",
body:query
}
)

let data=await res.json()

places=data.elements
.filter(p=>p.tags && p.tags.name)
.map(p=>{

let rating=generateRating()

return{

name:p.tags.name,
type:p.tags.amenity,
lat:p.lat,
lon:p.lon,
rating:rating,
image:getImage(p.tags.amenity)

}

})
.filter(p=>parseFloat(p.rating)>=4.2)

shufflePlaces()

renderCards()

}

function generateRating(){
return (Math.random()*1.3+3.7).toFixed(1)
}

function getImage(type){

const wine="https://images.unsplash.com/photo-1510812431401-41d2bd2722f3"
const food="https://images.unsplash.com/photo-1552566626-52f8b828add9"
const cocktail="https://images.unsplash.com/photo-1514361892635-cebb3a9c8d75"

if(type==="restaurant") return food

if(type==="bar"||type==="pub") return cocktail

return wine

}

function shufflePlaces(){
places.sort(()=>Math.random()-0.5)
}

function renderCards(){

const stack=document.getElementById("card-stack")

stack.innerHTML=""

places.slice(index,index+5).forEach((place,i)=>{

const card=document.createElement("div")

card.className="card"
card.style.zIndex=100-i

card.innerHTML=`

<img src="${place.image}">

<div class="info">

<div class="place-name">${place.name}</div>

<div class="rating">⭐ ${place.rating}</div>

<button class="map-btn">📍 Naviger hit</button>

<div class="buttons">

<button class="dislike">❌</button>
<button class="like">❤️</button>

</div>

</div>
`

addEvents(card,place)

stack.appendChild(card)

})

}

function addEvents(card,place){

card.querySelector(".map-btn").onclick=()=>{

window.open(
`https://www.google.com/maps/dir/?api=1&destination=${place.lat},${place.lon}`
)

}

card.querySelector(".like").onclick=()=>{
like(place)
card.remove()
next()
}

card.querySelector(".dislike").onclick=()=>{
card.remove()
next()
}

}

function like(place){

favorites.push(place)

updateFavorites()

}

function updateFavorites(){

let favList=document.getElementById("fav-list")

favList.innerHTML=""

favorites.forEach(f=>{

let div=document.createElement("div")

div.className="favorite-item"

div.innerText=f.name

div.onclick=()=>{

openFavorite(f)

}

favList.appendChild(div)

})

}

function openFavorite(place){

index=places.findIndex(p=>p.name===place.name)

renderCards()

}

function next(){

index++

if(index>=places.length){

shufflePlaces()

index=0

}

renderCards()

}

loadPlaces()

</script>

</body>

</html>
