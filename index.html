<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#000;
color:white;
}

#home{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
overflow-y:auto;
padding-top:120px;
display:flex;
flex-direction:column;
align-items:center;
}

.logo{
width:220px;
margin-bottom:40px;
}

.cat{
width:80%;
max-width:420px;
padding:18px;
margin:10px;
border-radius:20px;
background:#111;
border:1px solid #333;
text-align:center;
font-size:22px;
}

.section{
width:80%;
max-width:420px;
margin-top:40px;
}

.favoriteItem{
padding:14px;
border-bottom:1px solid #333;
background:#111;
}

#deck{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:none;
justify-content:center;
align-items:center;
}

.card{
position:absolute;
width:95%;
height:92%;
border-radius:26px;
overflow:hidden;
background:black;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.info{
position:absolute;
bottom:130px;
left:24px;
}

.name{
font-size:34px;
font-weight:600;
}

.buttons{
position:absolute;
bottom:30px;
left:0;
right:0;
display:flex;
justify-content:space-evenly;
font-size:34px;
}

.topbtn{
position:absolute;
top:30px;
font-size:28px;
}

.back{left:20px}
.undo{right:20px}

.photoDots{
position:absolute;
top:16px;
left:0;
right:0;
text-align:center;
}

.dot{
display:inline-block;
width:22px;
height:4px;
background:rgba(255,255,255,.4);
margin:3px;
border-radius:10px;
}

.dot.active{
background:white;
}

</style>
</head>

<body>

<div id="home">

<img src="logo.png" class="logo">

<div class="cat" onclick="openCategory('restaurants')">Restaurant</div>
<div class="cat" onclick="openCategory('winebars')">Vinbar</div>
<div class="cat" onclick="openCategory('cocktailbars')">Cocktailbar</div>

<div class="section">

<h3>Favoritt restaurant</h3>
<div id="fav-restaurants"></div>

<h3>Favoritt vinbar</h3>
<div id="fav-winebars"></div>

<h3>Favoritt cocktailbar</h3>
<div id="fav-cocktailbars"></div>

</div>

</div>

<div id="deck"></div>

<script>

let data
let list=[]
let index=0
let history=[]

let favorites={
restaurants:JSON.parse(localStorage.getItem("fav-restaurants")||"[]"),
winebars:JSON.parse(localStorage.getItem("fav-winebars")||"[]"),
cocktailbars:JSON.parse(localStorage.getItem("fav-cocktailbars")||"[]")
}

const deck=document.getElementById("deck")

async function loadData(){

const res=await fetch("data/places.json")
data=await res.json()

renderFavorites()

}

loadData()

function openCategory(type){

list=data[type]
currentType=type

index=0

document.getElementById("home").style.display="none"
deck.style.display="flex"

buildDeck()

}

function buildDeck(){

deck.innerHTML=""

for(let i=index;i<index+3;i++){

if(!list[i])continue

createCard(list[i])

}

}

function createCard(name){

const card=document.createElement("div")
card.className="card"

let photos=[
"https://source.unsplash.com/featured/?restaurant",
"https://source.unsplash.com/featured/?food",
"https://source.unsplash.com/featured/?wine"
]

let photoIndex=0

card.innerHTML=`

<img src="${photos[0]}">

<div class="photoDots">
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

<div class="topbtn back" onclick="goHome()">←</div>
<div class="topbtn undo" onclick="undo()">↩</div>

<div class="info">
<div class="name">${name}</div>
</div>

<div class="buttons">
<div onclick="dislike()">❌</div>
<div onclick="navigate('${name}')">📍</div>
<div onclick="book('${name}')">📅</div>
<div onclick="like('${name}')">❤️</div>
</div>
`

card.onclick=()=>{

photoIndex=(photoIndex+1)%3

card.querySelector("img").src=photos[photoIndex]

const dots=card.querySelectorAll(".dot")

dots.forEach((d,x)=>d.classList.toggle("active",x===photoIndex))

}

enableSwipe(card)

deck.appendChild(card)

}

function enableSwipe(card){

let startX

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.addEventListener("touchmove",e=>{

const diff=e.touches[0].clientX-startX

card.style.transform=`translateX(${diff}px) rotate(${diff/20}deg)`

})

card.addEventListener("touchend",e=>{

const diff=e.changedTouches[0].clientX-startX

if(diff>120) like()
else if(diff<-120) dislike()
else card.style.transform=""

})

}

function like(name){

let arr=favorites[currentType]

if(!arr.includes(name)){

arr.push(name)

localStorage.setItem("fav-"+currentType,JSON.stringify(arr))

renderFavorites()

}

next()

}

function dislike(){
next()
}

function next(){

history.push(index)

index++

buildDeck()

}

function undo(){

if(history.length===0)return

index=history.pop()

buildDeck()

}

function goHome(){

deck.style.display="none"

document.getElementById("home").style.display="flex"

}

function renderFavorites(){

renderFavCategory("restaurants")
renderFavCategory("winebars")
renderFavCategory("cocktailbars")

}

function renderFavCategory(type){

const box=document.getElementById("fav-"+type)

box.innerHTML=""

favorites[type].forEach(name=>{

const el=document.createElement("div")

el.className="favoriteItem"

el.innerText=name

enableFavSwipe(el,type,name)

el.onclick=()=>openFromFavorite(type,name)

box.appendChild(el)

})

}

function enableFavSwipe(el,type,name){

let startX

el.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

el.addEventListener("touchend",e=>{

let diff=e.changedTouches[0].clientX-startX

if(Math.abs(diff)>120){

favorites[type]=favorites[type].filter(x=>x!==name)

localStorage.setItem("fav-"+type,JSON.stringify(favorites[type]))

renderFavorites()

}

})

}

function openFromFavorite(type,name){

list=data[type]

index=list.indexOf(name)

document.getElementById("home").style.display="none"

deck.style.display="flex"

buildDeck()

}

function navigate(name){

window.open(`https://maps.google.com/?q=${encodeURIComponent(name+" Oslo")}`)

}

function book(name){

window.open(`https://www.google.com/search?q=${encodeURIComponent(name+" booking")}`)

}

</script>

</body>
</html>
