<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

#map{
width:1px;
height:1px;
opacity:0;
}

#start{
margin-top:80px;
text-align:center;
width:90%;
max-width:380px;
}

.category{
background:#222;
padding:18px 26px;
border-radius:22px;
margin:10px;
cursor:pointer;
font-size:18px;
}

.fav-list{
display:none;
margin-bottom:10px;
}

.fav-item{
background:#333;
padding:12px;
margin-top:4px;
border-radius:10px;
cursor:pointer;
}

/* CARD */

#cardStack{
position:relative;
width:360px;
height:580px;
display:none;
}

.card{
position:absolute;
width:100%;
height:100%;
border-radius:26px;
overflow:hidden;
background:#000;
}

.photo{
width:100%;
height:100%;
object-fit:cover;
}

.back{
position:absolute;
top:18px;
left:20px;
font-size:24px;
text-shadow:0 0 12px black;
cursor:pointer;
z-index:10;
}

.favorite{
position:absolute;
top:18px;
right:30px;
font-size:24px;
text-shadow:0 0 12px black;
cursor:pointer;
z-index:10;
}

/* PHOTO INDICATOR */

.photo-indicator{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
z-index:10;
}

.photo-bar{
width:32px;
height:4px;
border-radius:3px;
background:rgba(255,255,255,0.3);
}

.photo-bar.active{
background:white;
}

.overlay{
position:absolute;
bottom:110px;
left:22px;
z-index:10;
}

.name{
font-size:30px;
font-weight:600;
}

.rating{
color:#FFD54F;
font-size:18px;
margin-top:6px;
}

.buttons{
position:absolute;
bottom:25px;
width:100%;
display:flex;
justify-content:space-evenly;
z-index:10;
}

.action{
font-size:28px;
text-shadow:0 0 12px black;
cursor:pointer;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="start">

<h2>Savorly</h2>

<div class="category" onclick="loadCategory('restaurant')">Restaurant</div>
<div class="category" onclick="loadCategory('wine')">Vinbar</div>
<div class="category" onclick="loadCategory('cocktail')">Cocktailbar</div>

<div class="category" onclick="toggleFav('restaurant')">Favoritt restaurant</div>
<div class="fav-list" id="fav-restaurant"></div>

<div class="category" onclick="toggleFav('wine')">Favoritt vinbar</div>
<div class="fav-list" id="fav-wine"></div>

<div class="category" onclick="toggleFav('cocktail')">Favoritt cocktailbar</div>
<div class="fav-list" id="fav-cocktail"></div>

</div>

<div id="cardStack">

<div class="card" id="card">

<div class="back" onclick="back()">⬅</div>

<div class="favorite" onclick="favoriteSwipe()">⭐</div>

<div class="photo-indicator" id="indicator"></div>

<img class="photo" id="photo">

<div class="overlay">

<div class="name" id="name"></div>
<div class="rating" id="rating"></div>

</div>

<div class="buttons">

<div class="action" onclick="skip()">❌</div>
<div class="action" onclick="maps()">📍</div>
<div class="action" onclick="maps()">📅</div>
<div class="action" onclick="like()">❤️</div>

</div>

</div>

</div>

<script>

let service
let places=[]
let index=0
let photos=[]
let photoIndex=0
let currentCategory=""

/* LOAD FAVORITES FROM STORAGE */

let favorites=JSON.parse(localStorage.getItem("savorlyFavorites"))||{
restaurant:[],
wine:[],
cocktail:[]
}

function saveFavorites(){

localStorage.setItem("savorlyFavorites",JSON.stringify(favorites))

}

/* INIT MAP */

function initMap(){

const map=new google.maps.Map(
document.getElementById("map"),
{center:{lat:59.91,lng:10.75},zoom:13}
)

service=new google.maps.places.PlacesService(map)

updateFavorites()

}

/* LOAD CATEGORY */

async function loadCategory(type){

currentCategory=type

let res=await fetch("data/places.json")
let data=await res.json()

let list=data[type+"s"]

places=[]
index=0

for(let name of list){

await new Promise(resolve=>{

service.findPlaceFromQuery({

query:name+" oslo",
fields:["place_id"]

},(results,status)=>{

if(status==="OK"){

service.getDetails({

placeId:results[0].place_id,
fields:["name","rating","photos"]

},(place)=>{

places.push(place)

resolve()

})

}else resolve()

})

})

}

start.style.display="none"
cardStack.style.display="block"

show()

}

/* SHOW CARD */

function show(){

let p=places[index]

name.innerText=p.name
rating.innerText="⭐ "+(p.rating||"")

photos=[]

if(p.photos){

for(let i=0;i<Math.min(3,p.photos.length);i++){

photos.push(p.photos[i].getUrl({maxWidth:1200}))

}

}

photoIndex=0

photo.src=photos[0]

renderIndicator()

}

/* TAP IMAGE */

photo.onclick=function(){

photoIndex++

if(photoIndex>=photos.length) photoIndex=0

photo.src=photos[photoIndex]

renderIndicator()

}

/* INDICATOR */

function renderIndicator(){

indicator.innerHTML=""

photos.forEach((p,i)=>{

let bar=document.createElement("div")
bar.className="photo-bar"

if(i===photoIndex) bar.classList.add("active")

indicator.appendChild(bar)

})

}

/* SWIPE */

function animate(dir){

card.style.transition="transform 0.35s"

if(dir==="right"){
card.style.transform="translateX(600px) rotate(25deg)"
}else{
card.style.transform="translateX(-600px) rotate(-25deg)"
}

setTimeout(()=>{
card.style.transition=""
card.style.transform=""
next()
},350)

}

function like(){animate("right")}
function skip(){animate("left")}

function next(){

index++

if(index>=places.length) index=0

show()

}

/* FAVORITE */

function favoriteSwipe(){

let p=places[index]

favorites[currentCategory].push(p)

saveFavorites()

updateFavorites()

animate("right")

}

/* UPDATE FAVORITES */

function updateFavorites(){

["restaurant","wine","cocktail"].forEach(type=>{

let container=document.getElementById("fav-"+type)

container.innerHTML=""

favorites[type].forEach(place=>{

let div=document.createElement("div")
div.className="fav-item"
div.innerText=place.name

div.onclick=function(){

places=[place]
index=0

start.style.display="none"
cardStack.style.display="block"

show()

}

container.appendChild(div)

})

})

}

/* TOGGLE LIST */

function toggleFav(type){

let list=document.getElementById("fav-"+type)

if(list.style.display==="block"){
list.style.display="none"
}else{
list.style.display="block"
}

}

function maps(){

let p=places[index]

window.open("https://maps.google.com/?q="+p.name)

}

function back(){

cardStack.style.display="none"
start.style.display="block"

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places&callback=initMap"></script>

</body>
</html>
