<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

#map{width:1px;height:1px;opacity:0;}

#start{
margin-top:80px;
text-align:center;
width:90%;
max-width:380px;
}

.category{
background:#222;
padding:18px 26px;
border-radius:22px;
margin:10px;
cursor:pointer;
font-size:18px;
}

/* CARD STACK */

#cardStack{
position:relative;
width:360px;
height:580px;
display:none;
}

.card{
position:absolute;
width:100%;
height:100%;
border-radius:26px;
overflow:hidden;
background:#000;
transition:transform .35s ease;
}

.card:nth-child(1){transform:scale(1)}
.card:nth-child(2){transform:scale(.96) translateY(12px)}
.card:nth-child(3){transform:scale(.92) translateY(24px)}

.photo{
width:100%;
height:100%;
object-fit:cover;
}

/* ICONS */

.back{
position:absolute;
top:18px;
left:20px;
font-size:24px;
text-shadow:0 0 12px black;
cursor:pointer;
z-index:10;
}

.favorite{
position:absolute;
top:18px;
right:30px;
font-size:24px;
text-shadow:0 0 12px black;
cursor:pointer;
z-index:10;
}

/* TEXT */

.overlay{
position:absolute;
bottom:110px;
left:22px;
z-index:10;
}

.name{
font-size:30px;
font-weight:600;
}

.rating{
color:#FFD54F;
font-size:18px;
margin-top:6px;
}

/* PHOTO INDICATOR */

.photo-indicator{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
z-index:10;
}

.photo-bar{
width:32px;
height:4px;
border-radius:3px;
background:rgba(255,255,255,0.3);
}

.photo-bar.active{background:white}

/* BUTTONS */

.buttons{
position:absolute;
bottom:25px;
width:100%;
display:flex;
justify-content:space-evenly;
z-index:10;
}

.action{
font-size:28px;
text-shadow:0 0 12px black;
cursor:pointer;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="start">

<h2>Savorly</h2>

<div class="category" onclick="openCategory('restaurant')">Restaurant</div>
<div class="category" onclick="openCategory('wine')">Vinbar</div>
<div class="category" onclick="openCategory('cocktail')">Cocktailbar</div>

</div>

<div id="cardStack">

<div class="card" id="card1"></div>
<div class="card" id="card2"></div>
<div class="card" id="card3"></div>

</div>

<script>

let service
let places=[]
let index=0

let photos=[]
let photoIndex=0

let favorites=JSON.parse(localStorage.getItem("savorlyFavorites"))||{
restaurant:[],
wine:[],
cocktail:[]
}

let placesCache=JSON.parse(localStorage.getItem("savorlyPlacesCache"))||{}
let cacheVersion=localStorage.getItem("savorlyPlacesVersion")||""

function saveFavorites(){
localStorage.setItem("savorlyFavorites",JSON.stringify(favorites))
}

/* MAP */

function initMap(){

const map=new google.maps.Map(
document.getElementById("map"),
{center:{lat:59.91,lng:10.75},zoom:13}
)

service=new google.maps.places.PlacesService(map)

}

/* CATEGORY */

async function openCategory(type){

let res=await fetch("data/places.json")

let text=await res.text()

let version=text.length

if(version!==cacheVersion){

placesCache={}
localStorage.setItem("savorlyPlacesCache","{}")
localStorage.setItem("savorlyPlacesVersion",version)

}

let data=JSON.parse(text)

let list=[]

if(type==="restaurant") list=data.restaurants
if(type==="wine") list=data.winebars
if(type==="cocktail") list=data.cocktailbars

if(placesCache[type]){

places=placesCache[type]

}else{

const requests=list.map(name=>{

return new Promise(resolve=>{

service.findPlaceFromQuery({
query:name+" oslo",
fields:["place_id"]
},(results,status)=>{

if(status==="OK"){

service.getDetails({
placeId:results[0].place_id,
fields:["rating","photos"]
},(place)=>{

resolve({
name:name,
rating:place.rating,
photos:place.photos
})

})

}else resolve({name:name})

})

})

})

places=(await Promise.all(requests)).filter(p=>p)

placesCache[type]=places

localStorage.setItem("savorlyPlacesCache",JSON.stringify(placesCache))

}

index=0

document.getElementById("start").style.display="none"
document.getElementById("cardStack").style.display="block"

renderStack()

}

/* RENDER STACK */

function renderStack(){

renderCard("card1",places[index])

renderCard("card2",places[index+1])

renderCard("card3",places[index+2])

}

/* RENDER CARD */

function renderCard(id,data){

if(!data)return

let card=document.getElementById(id)

let image="https://images.unsplash.com/photo-1414235077428-338989a2e8c0"

let imgs=[]

if(data.photos){

for(let i=0;i<Math.min(3,data.photos.length);i++){
imgs.push(data.photos[i].getUrl({maxWidth:1200}))
}

}

if(imgs.length>0)image=imgs[0]

card.innerHTML=`

<div class="back" onclick="back()">⬅</div>

<div class="favorite" onclick="favoriteSwipe()">⭐</div>

<img class="photo" src="${image}" onclick="nextPhoto(${id})">

<div class="overlay">

<div class="name">${data.name}</div>

<div class="rating">${data.rating?"⭐ "+data.rating:""}</div>

</div>

<div class="buttons">

<div class="action" onclick="skip()">❌</div>
<div class="action" onclick="maps()">📍</div>
<div class="action" onclick="maps()">📅</div>
<div class="action" onclick="like()">❤️</div>

</div>

`

}

/* SWIPE */

function like(){
swipe("right")
}

function skip(){
swipe("left")
}

function swipe(dir){

let card=document.getElementById("card1")

card.style.transform=
dir==="right"
?"translateX(500px) rotate(20deg)"
:"translateX(-500px) rotate(-20deg)"

setTimeout(()=>{

index++

if(index>=places.length)index=0

renderStack()

card.style.transform=""

},300)

}

/* FAVORITE */

function favoriteSwipe(){

favorites.restaurant.push(places[index])

saveFavorites()

swipe("right")

}

/* MAP */

function maps(){

let p=places[index]

window.open("https://maps.google.com/?q="+p.name)

}

function back(){

document.getElementById("cardStack").style.display="none"
document.getElementById("start").style.display="block"

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places&callback=initMap"></script>

</body>
</html>
