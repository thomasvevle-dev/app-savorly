<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Savorly</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#000;
color:white;
}

#home{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
overflow-y:auto;
padding-top:100px;
display:flex;
flex-direction:column;
align-items:center;
}

.logo{
width:220px;
margin-bottom:30px;
}

.cat{
width:80%;
max-width:420px;
padding:18px;
margin:10px;
border-radius:20px;
background:#111;
border:1px solid #333;
text-align:center;
font-size:22px;
}

.favoriteItem{
padding:14px;
margin:6px 0;
border-radius:14px;
background:#111;
border:1px solid #333;
}

.hidden{display:none}

#deck{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:none;
justify-content:center;
align-items:center;
}

.card{
position:absolute;
width:95%;
height:92%;
border-radius:26px;
overflow:hidden;
background:black;
transition:transform .35s ease;
z-index:2;
}

.card.next{
transform:scale(.96) translateY(10px);
opacity:.55;
z-index:1;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.card::after{
content:"";
position:absolute;
left:0;
right:0;
bottom:0;
top:65%;

background:linear-gradient(
to bottom,
rgba(0,0,0,0) 0%,
rgba(0,0,0,0.35) 40%,
rgba(0,0,0,0.65) 70%,
rgba(0,0,0,0.9) 100%
);

pointer-events:none;
}

.photoDots{
position:absolute;
top:16px;
left:0;
right:0;
text-align:center;
}

.dot{
display:inline-block;
width:26px;
height:4px;
margin:3px;
border-radius:10px;
background:rgba(255,255,255,.4);
}

.dot.active{
background:white;
}

.topLeft,
.topRight{
position:absolute;
top:24px;
font-size:24px;
color:black;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(12px);
border-radius:14px;
padding:10px 12px;
}

.topLeft{ left:20px; }
.topRight{ right:20px; }

.info{
position:absolute;
bottom:180px;
left:24px;
}

.name{
font-family:'Playfair Display', serif;
font-size:36px;
font-weight:500;
}

.rating{
font-size:18px;
color:#E6C27A;
}

.buttons{
position:absolute;
bottom:30px;
left:20px;
right:20px;

display:flex;
justify-content:space-around;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);

border-radius:26px;
padding:18px 10px;

border:1px solid rgba(255,255,255,0.25);
}

.buttons div{
background:rgba(255,255,255,0.85);
border-radius:16px;
padding:14px 18px;
font-size:28px;
color:black;
}

</style>
</head>

<body>

<div id="home">

<img src="logo.png" class="logo">

<div class="cat" onclick="openCategory('restaurants')">Restaurant</div>
<div class="cat" onclick="openCategory('winebars')">Vinbar</div>
<div class="cat" onclick="openCategory('cocktailbars')">Cocktailbar</div>

<div style="margin-top:40px;width:80%;max-width:420px">

<div class="cat" onclick="toggleFav('restaurants')">Favoritt restaurant</div>
<div id="fav-restaurants" class="hidden"></div>

<div class="cat" onclick="toggleFav('winebars')">Favoritt vinbar</div>
<div id="fav-winebars" class="hidden"></div>

<div class="cat" onclick="toggleFav('cocktailbars')">Favoritt cocktailbar</div>
<div id="fav
