<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
}

/* start screen */

#start-screen{
margin-top:120px;
text-align:center;
}

.category{
background:#222;
border-radius:30px;
padding:15px 25px;
margin:10px;
display:inline-block;
cursor:pointer;
}

.category.active{
background:#4CAF50;
}

#start-btn{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:20px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
}

/* swipe cards */

#card-stack{
position:relative;
width:360px;
height:520px;
margin-top:30px;
}

.card{
position:absolute;
width:100%;
height:100%;
background:#222;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.info{
padding:15px;
}

.place-name{
font-size:22px;
font-weight:bold;
}

.rating{
color:#FFD700;
margin-top:5px;
}

.type{
color:#ccc;
font-size:14px;
}

.buttons{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.small-btn{
background:#2196F3;
border:none;
padding:8px 12px;
border-radius:6px;
color:white;
cursor:pointer;
font-size:12px;
}

.swipe-buttons{
display:flex;
justify-content:center;
gap:20px;
margin-top:15px;
}

.swipe-buttons button{
width:60px;
height:60px;
border-radius:50%;
border:none;
font-size:22px;
cursor:pointer;
}

.dislike{background:#ff4d4d}
.like{background:#4CAF50}

</style>

</head>

<body>

<div id="start-screen">

<h2>Hva vil du utforske?</h2>

<div class="category" data-type="restaurant">Restaurant</div>
<div class="category" data-type="bar">Vinbar</div>
<div class="category" data-type="night_club">Cocktailbar</div>

<br>

<button id="start-btn">Start</button>

</div>


<div id="card-stack" style="display:none"></div>

<script>

const curatedPlaces=[

"Libertine",
"Territoriet",
"Skaal Matbar",
"F6 Cocktailbar",
"Bettola",
"Himkok",
"Svanen",
"Torggata Botaniske",
"Andre til Høyre",
"Nektar Vinbar",
"Radegast",
"Vinoteket",
"Fuglen",
"Arakataka",
"Le Benjamin",
"Hyde",
"Brasserie France"

]

let selectedType=null
let places=[]
let index=0

document.querySelectorAll(".category").forEach(el=>{

el.onclick=()=>{

document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"))

el.classList.add("active")

selectedType=el.dataset.type

}

})

document.getElementById("start-btn").onclick=()=>{

if(!selectedType){
alert("Velg kategori først")
return
}

document.getElementById("start-screen").style.display="none"
document.getElementById("card-stack").style.display="block"

initMap()

}

function initMap(){

const map=new google.maps.Map(document.createElement("div"))

const service=new google.maps.places.PlacesService(map)

curatedPlaces.forEach(name=>{

service.findPlaceFromQuery({

query:name+" oslo",
fields:["name","photos","rating","types"]

},(results,status)=>{

if(status==="OK"){

let place=results[0]

if(!place.rating || place.rating<4) return

if(!place.types.includes(selectedType)) return

places.push(place)

renderCards()

}

})

})

}

function renderCards(){

const stack=document.getElementById("card-stack")

stack.innerHTML=""

places.slice(index,index+3).forEach((place,i)=>{

let photo="https://via.placeholder.com/400"

if(place.photos){
photo=place.photos[0].getUrl({maxWidth:500})
}

const card=document.createElement("div")

card.className="card"
card.style.zIndex=100-i

card.innerHTML=`

<img src="${photo}">

<div class="info">

<div class="place-name">${place.name}</div>

<div class="rating">⭐ ${place.rating}</div>

<div class="type">${selectedType}</div>

<div class="buttons">

<button class="small-btn nav">Naviger</button>
<button class="small-btn book">Book</button>

</div>

<div class="swipe-buttons">

<button class="dislike">❌</button>
<button class="like">❤️</button>

</div>

</div>
`

card.querySelector(".nav").onclick=()=>{

window.open(`https://www.google.com/maps/search/?api=1&query=${place.name}`)

}

card.querySelector(".book").onclick=()=>{

window.open(`https://www.google.com/maps/search/?api=1&query=${place.name}`)

}

card.querySelector(".like").onclick=()=>{

card.remove()
next()

}

card.querySelector(".dislike").onclick=()=>{

card.remove()
next()

}

stack.appendChild(card)

})

}

function next(){

index++

if(index>=places.length){
index=0
}

renderCards()

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places"></script>

</body>
</html>
