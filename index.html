<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savorly</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
background:#000;
color:white;
}

/* HOME */

#home{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
overflow-y:auto;
padding-top:90px;
display:flex;
flex-direction:column;
align-items:center;
}

.logo{
width:230px;
margin-bottom:35px;
}

.cat{
width:80%;
max-width:420px;
padding:18px;
margin:10px;
border-radius:20px;
background:#111;
border:1px solid #333;
text-align:center;
font-size:22px;
}

.favoriteItem{
padding:14px;
margin:6px 0;
border-radius:14px;
background:#111;
border:1px solid #333;
}

.hidden{display:none}

/* CARD STACK */

#deck{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:none;
justify-content:center;
align-items:center;
}

/* CARD */

.card{
position:absolute;
width:95%;
height:92%;
border-radius:30px;
overflow:hidden;
background:black;
transition:transform .35s ease;

box-shadow:
0 25px 60px rgba(0,0,0,0.7),
0 6px 16px rgba(0,0,0,0.5);
}

.card.next{
transform:scale(.96) translateY(12px);
opacity:.55;
z-index:1;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* GRADIENT FOR PREMIUM LOOK */

.card::after{
content:"";
position:absolute;
left:0;
right:0;
bottom:0;
height:45%;
background:linear-gradient(to top,
rgba(0,0,0,0.85),
rgba(0,0,0,0.35),
rgba(0,0,0,0));
pointer-events:none;
}

/* PHOTO INDICATOR */

.photoDots{
position:absolute;
top:16px;
left:0;
right:0;
text-align:center;
}

.dot{
display:inline-block;
width:26px;
height:4px;
margin:3px;
border-radius:10px;
background:rgba(255,255,255,.4);
}

.dot.active{
background:white;
}

/* INFO TEXT */

.info{
position:absolute;
bottom:160px;
left:24px;
}

.name{
font-size:36px;
font-weight:600;
letter-spacing:-0.5px;
}

.rating{
font-size:20px;
color:#FFD54F;
margin-top:6px;
}

/* BUTTONS */

.buttons{
position:absolute;
bottom:30px;
left:0;
right:0;
display:flex;
justify-content:space-evenly;
font-size:34px;
}

/* GLASS EFFECT ICONS */

.buttons div{
background:rgba(0,0,0,0.35);
backdrop-filter:blur(6px);
padding:10px 14px;
border-radius:14px;
}

/* TOP NAV */

.topLeft{
position:absolute;
top:20px;
left:20px;
font-size:30px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(6px);
padding:8px 12px;
border-radius:12px;
}

.topRight{
position:absolute;
top:20px;
right:20px;
font-size:30px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(6px);
padding:8px 12px;
border-radius:12px;
}

</style>
</head>

<body>

<div id="home">

<img src="logo.png" class="logo">

<div class="cat" onclick="openCategory('restaurants')">Restaurant</div>
<div class="cat" onclick="openCategory('winebars')">Vinbar</div>
<div class="cat" onclick="openCategory('cocktailbars')">Cocktailbar</div>

<div style="margin-top:40px;width:80%;max-width:420px">

<div class="cat" onclick="toggleFav('restaurants')">Favoritt restaurant</div>
<div id="fav-restaurants" class="hidden"></div>

<div class="cat" onclick="toggleFav('winebars')">Favoritt vinbar</div>
<div id="fav-winebars" class="hidden"></div>

<div class="cat" onclick="toggleFav('cocktailbars')">Favoritt cocktailbar</div>
<div id="fav-cocktailbars" class="hidden"></div>

</div>

</div>

<div id="deck"></div>
<div id="map" style="display:none"></div>

</html>
