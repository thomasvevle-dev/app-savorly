<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

/* hidden map */

#map{
width:1px;
height:1px;
opacity:0;
}

/* START */

#start{
margin-top:120px;
text-align:center;
}

.category{
background:#222;
padding:18px 26px;
border-radius:22px;
margin:10px;
cursor:pointer;
font-size:18px;
}

/* CARD */

#card{
width:360px;
height:580px;
border-radius:26px;
overflow:hidden;
position:relative;
display:none;
}

#photo{
width:100%;
height:100%;
object-fit:cover;
}

/* GLASS ICONS */

.glass{

color:white;
font-size:22px;

backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);

text-shadow:
0 0 6px rgba(0,0,0,0.6),
0 0 14px rgba(0,0,0,0.4);

cursor:pointer;
}

/* TOP BAR */

.topbar{
position:absolute;
top:18px;
left:0;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
z-index:5;
}

/* TEXT */

.overlay{
position:absolute;
bottom:110px;
left:22px;
}

.name{
font-size:30px;
font-weight:600;
}

.rating{
color:#FFD54F;
font-size:18px;
margin-top:6px;
}

/* BUTTON ROW */

.buttons{
position:absolute;
bottom:25px;
width:100%;
display:flex;
justify-content:space-evenly;
z-index:5;
}

.action{

font-size:28px;
color:white;

backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);

text-shadow:
0 0 6px rgba(0,0,0,0.7),
0 0 20px rgba(0,0,0,0.5);

cursor:pointer;

}

/* FAVORITES */

#favoritesPage{
display:none;
width:90%;
max-width:400px;
}

.favorite-item{
background:#222;
padding:16px;
margin:10px 0;
border-radius:12px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="start">

<h2>Hva vil du utforske?</h2>

<div class="category" onclick="loadCategory('restaurant')">Restaurant</div>
<div class="category" onclick="loadCategory('wine')">Vinbar</div>
<div class="category" onclick="loadCategory('cocktail')">Cocktailbar</div>

</div>

<div id="card">

<div class="topbar">

<div class="glass" onclick="back()">⬅</div>
<div class="glass" onclick="openFavorites()">⭐</div>

</div>

<img id="photo">

<div class="overlay">

<div class="name" id="name"></div>
<div class="rating" id="rating"></div>

</div>

<div class="buttons">

<div class="action" onclick="next()">✖</div>
<div class="action" onclick="maps()">📍</div>
<div class="action" onclick="maps()">📅</div>
<div class="action" onclick="like()">❤</div>

</div>

</div>

<div id="favoritesPage">

<h2>Favoritter</h2>
<div id="favoritesList"></div>

</div>

<script>

const restaurants=["Maaemo","Kontrast","Statholdergaarden","Hot Shop","Plah","Arakataka","Le Benjamin","Vaaghals","Katla","Kolonialen","Smalhans","Fyr Bistronomi","Ylajali","Dinner","Südøst","Louise Restaurant","Alex Sushi","Kverneriet"]

const wineBars=["Territoriet","Nektar Vinbar","Radegast","Andre til Høyre","Vintage Kitchen","Lasarett","Vin Vin","Skaal Matbar","Fuglen","Vinoteket"]

const cocktailBars=["Himkok","Bettola","Svanen","Torggata Botaniske","Fuglen","Aku Aku","Pier 42","Jaeger","Internasjonalen"]

let service
let places=[]
let index=0
let photos=[]
let photoIndex=0
let favorites=[]

function initMap(){

const map=new google.maps.Map(
document.getElementById("map"),
{center:{lat:59.91,lng:10.75},zoom:13}
)

service=new google.maps.places.PlacesService(map)

}

/* LOAD CATEGORY */

function loadCategory(type){

let list=[]

if(type==="restaurant") list=restaurants
if(type==="wine") list=wineBars
if(type==="cocktail") list=cocktailBars

places=[]
index=0

let loaded=0

list.forEach(name=>{

service.findPlaceFromQuery({

query:name+" oslo",
fields:["name","rating","photos"]

},(results,status)=>{

loaded++

if(status==="OK"){

places.push(results[0])

}

if(loaded===list.length){

document.getElementById("start").style.display="none"
document.getElementById("card").style.display="block"

show()

}

})

})

}

/* SHOW CARD */

function show(){

let p=places[index]

document.getElementById("name").innerText=p.name
document.getElementById("rating").innerText="⭐ "+(p.rating||"")

photos=[]

if(p.photos){

for(let i=0;i<3 && i<p.photos.length;i++){

photos.push(p.photos[i].getUrl({maxWidth:1200}))

}

}

photoIndex=0
document.getElementById("photo").src=photos[0]

}

/* IMAGE SWIPE */

let startX=0

document.getElementById("photo").addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.getElementById("photo").addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(endX-startX>50) prevPhoto()
if(startX-endX>50) nextPhoto()

})

function nextPhoto(){

photoIndex++
if(photoIndex>=photos.length) photoIndex=0
document.getElementById("photo").src=photos[photoIndex]

}

function prevPhoto(){

photoIndex--
if(photoIndex<0) photoIndex=photos.length-1
document.getElementById("photo").src=photos[photoIndex]

}

/* CARD SWIPE */

let card=document.getElementById("card")
let swipeStart=0

card.addEventListener("touchstart",e=>{
swipeStart=e.touches[0].clientX
})

card.addEventListener("touchend",e=>{

let swipeEnd=e.changedTouches[0].clientX

if(swipeEnd-swipeStart>120) like()
if(swipeStart-swipeEnd>120) next()

})

/* ACTIONS */

function next(){

index++
if(index>=places.length) index=0
show()

}

function like(){

favorites.push(index)
next()

}

function maps(){

let p=places[index]
window.open("https://maps.google.com/?q="+p.name)

}

/* FAVORITES */

function openFavorites(){

document.getElementById("card").style.display="none"
document.getElementById("favoritesPage").style.display="block"

const list=document.getElementById("favoritesList")
list.innerHTML=""

favorites.forEach(i=>{

let item=document.createElement("div")

item.className="favorite-item"
item.innerText=places[i].name

item.onclick=function(){

index=i

document.getElementById("favoritesPage").style.display="none"
document.getElementById("card").style.display="block"

show()

}

list.appendChild(item)

})

}

/* BACK */

function back(){

document.getElementById("card").style.display="none"
document.getElementById("favoritesPage").style.display="none"
document.getElementById("start").style.display="block"

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places&callback=initMap"></script>

</body>
</html>
