<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" href="icon-192.png">
  
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="apple-touch-icon" href="icon.png">

<title>Savorly</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
color:white;
font-family:-apple-system,BlinkMacSystemFont;
}

/* HOME */

#home{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
overflow-y:auto;
display:flex;
flex-direction:column;
align-items:center;
padding-top:70px;
z-index:20;
}

.logo{
width:170px;
margin-bottom:30px;
}

.cat{
width:85%;
max-width:420px;
padding:16px;
margin:8px;
border-radius:18px;
background:#111;
border:1px solid rgba(255,255,255,0.18);
text-align:center;
font-size:20px;
}

.favoriteItem{
padding:12px;
margin:6px 0;
border-radius:14px;
background:#111;
border:1px solid #333;
}

.hidden{display:none}

/* CARD STACK */

#deck{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:none;
justify-content:center;
align-items:center;
z-index:10;
pointer-events:none;
}

.card{
position:absolute;
width:95%;
height:92%;
border-radius:26px;
overflow:hidden;
background:black;
transition: transform .25s ease-out;
will-change: transform;
transform: translateZ(0);
}

.card.next{
transform:scale(.96) translateY(10px);
opacity:.6;
z-index:-1;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* GRADIENT BACK TEXT */

.card::before{
content:"";
position:absolute;
left:0;
right:0;
bottom:140px;
height:160px;
background:linear-gradient(
to bottom,
rgba(0,0,0,0),
rgba(0,0,0,0.45)
);
pointer-events:none;
}

/* GRADIENT BOTTOM */

.card::after{
content:"";
position:absolute;
left:0;
right:0;
bottom:0;
top:65%;
background:linear-gradient(
to bottom,
rgba(0,0,0,0),
rgba(0,0,0,0.4),
rgba(0,0,0,0.7),
rgba(0,0,0,0.95)
);
pointer-events:none;
}

/* DOTS */

.photoDots{
position:absolute;
top:16px;
left:0;
right:0;
text-align:center;
}

.dot{
display:inline-block;
width:26px;
height:4px;
margin:3px;
border-radius:10px;
background:rgba(255,255,255,.4);
}

.dot.active{background:white}

/* TOP BUTTONS */

.topLeft,.topRight{
position:absolute;
top:24px;
font-size:24px;
color:black;
background:rgba(255,255,255,.9);
border-radius:14px;
padding:10px 12px;
}

.topLeft{left:20px}
.topRight{right:20px}

/* INFO */

.info{
position:absolute;
bottom:180px;
left:24px;
}

.name{
font-family:'Playfair Display', serif;
font-size:34px;
text-shadow:0 2px 8px rgba(0,0,0,0.8);
}

.rating{
font-size:18px;
color:#E6C27A;
text-shadow:0 2px 6px rgba(0,0,0,0.8);
}

/* ACTION BAR */

.buttons{
position:absolute;
bottom:30px;
left:20px;
right:20px;
display:flex;
justify-content:space-around;
background:rgba(0,0,0,.55);
border-radius:26px;
padding:18px 10px;
}

.buttons div{
background:rgba(255,255,255,.9);
border-radius:16px;
padding:14px 18px;
font-size:28px;
color:black;
z-index:10;
position:relative;
touch-action: manipulation;
}
</style>
</head>

<body>

<div id="home">

<img src="logo.png" class="logo">

<div class="cat" onclick="openCategory('restaurants')">Restaurant</div>
<div class="cat" onclick="openCategory('winebars')">Vinbar</div>
<div class="cat" onclick="openCategory('cocktailbars')">Cocktailbar</div>

<div style="margin-top:20px;width:85%;max-width:420px">

<div class="cat" onclick="toggleFav('restaurants')">Favoritt restaurant</div>
<div id="fav-restaurants" class="hidden"></div>

<div class="cat" onclick="toggleFav('winebars')">Favoritt vinbar</div>
<div id="fav-winebars" class="hidden"></div>

<div class="cat" onclick="toggleFav('cocktailbars')">Favoritt cocktailbar</div>
<div id="fav-cocktailbars" class="hidden"></div>

</div>

</div>

<div id="deck"></div>
<div id="map" style="display:none"></div>

<script>

let data
let list=[]
let index=0
let history=[]
let currentType=""
let placesService
let imageCache={}

let favorites={
restaurants:JSON.parse(localStorage.getItem("fav-restaurants")||"[]"),
winebars:JSON.parse(localStorage.getItem("fav-winebars")||"[]"),
cocktailbars:JSON.parse(localStorage.getItem("fav-cocktailbars")||"[]")
}

const deck=document.getElementById("deck")

async function loadData(){
const res=await fetch("data/places.json")
data=await res.json()
renderFavorites()
}
loadData()

function initMap(){
const map=new google.maps.Map(document.getElementById("map"),{
center:{lat:59.91,lng:10.75},
zoom:13
})
placesService=new google.maps.places.PlacesService(map)
}

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5)
}

function openCategory(type){

currentType = type
list = (data[type] || []).filter(item => item && item.trim() !== "")

if(list.length === 0){
 alert("Ingen data")
 return
}

index = 0

document.getElementById("home").style.display="none"
deck.style.display="flex"
deck.style.pointerEvents="auto"

buildDeck()
}

function openFavorite(type,name){

currentType = type
list = (data[type] || []).filter(item => item && item.trim() !== "")

index = list.findIndex(item => item.toLowerCase() === name.toLowerCase())
if(index === -1) index = 0

document.getElementById("home").style.display="none"
deck.style.display="flex"
deck.style.pointerEvents="auto"

buildDeck()
}

function buildDeck(){

deck.innerHTML = ""

if(!list || list.length === 0) return

if(index >= list.length){
 shuffle(list)
 index = 0
}

if(!list[index]){
 index = 0
}

const current = list[index]
const nextItem = list[index + 1]

if(current){
 createCard(current, false)
}

if(nextItem){
 createCard(nextItem, true)
}

// stabil preload
for(let i = 1; i <= 2; i++){
 const next = list[index + i]
 if(next && !imageCache[next]){
 loadPlace(next)
 }
}

}

function createCard(name,isNext){

if(!name){
 name = "restaurant"
}

const card=document.createElement("div")
card.className="card"
if(isNext) card.classList.add("next")

card.innerHTML=`
<img id="photo" src="https://source.unsplash.com/featured/?restaurant">
<div class="photoDots">
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>
<div class="topLeft">←</div>
<div class="topRight">↺</div>
<div class="info">
<div class="name">${name}</div>
<div class="rating"></div>
</div>
<div class="buttons">
<div class="btn-dislike">✕</div>
<div class="btn-map">📍</div>
<div class="btn-book">📅</div>
<div class="btn-like">♥</div>
</div>
`

deck.appendChild(card)

card.querySelector(".topLeft").onclick=goHome

card.querySelector(".topRight").onclick=(e)=>{
e.stopPropagation()
undo()
}

card.querySelector(".buttons").addEventListener("click", e=>{
const btn=e.target.closest("div")
if(!btn) return

e.stopPropagation()

if(btn.classList.contains("btn-like")) likeFromButton()
if(btn.classList.contains("btn-dislike")) dislikeFromButton()
if(btn.classList.contains("btn-map")) navigate(name)
if(btn.classList.contains("btn-book")) book(name)
})

enableSwipe(card)

loadPlace(name).then(place=>{

if(!card.isConnected) return

let photos=place.photos
let photoIndex=0

const img=card.querySelector("#photo")
img.src=photos[0]

card.querySelector(".name").innerText=place.name
card.querySelector(".rating").innerText="⭐ "+place.rating

let tapStartX=0
let tapStartTime=0

card.addEventListener("touchstart", e=>{
tapStartX=e.touches[0].clientX
tapStartTime=Date.now()
})

card.addEventListener("touchend", e=>{

if(e.target.closest(".buttons")) return

let diffX=Math.abs(e.changedTouches[0].clientX-tapStartX)
let time=Date.now()-tapStartTime

if(diffX<15 && time<250){

const rect=card.getBoundingClientRect()
const x=e.changedTouches[0].clientX-rect.left

if(x>rect.width/2){
photoIndex=(photoIndex+1)%photos.length
}else{
photoIndex=(photoIndex-1+photos.length)%photos.length
}

img.src=photos[photoIndex]

const dots=card.querySelectorAll(".dot")
dots.forEach((d,i)=>d.classList.toggle("active",i===photoIndex))
}

})

})

}

/* FAVORITES */

function renderFavorites(){

["restaurants","winebars","cocktailbars"].forEach(type=>{

const box=document.getElementById("fav-"+type)
box.innerHTML=""

favorites[type].forEach(name=>{

const el=document.createElement("div")
el.className="favoriteItem"
el.innerText=name

el.onclick=()=>openFavorite(type,name)

enableFavSwipe(el,type,name)

box.appendChild(el)

})

})

}

function toggleFav(type){
document.getElementById("fav-"+type).classList.toggle("hidden")
}

function enableFavSwipe(el,type,name){

let startX

el.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

el.addEventListener("touchend",e=>{

let diff=e.changedTouches[0].clientX-startX

if(Math.abs(diff)>100){

favorites[type]=favorites[type].filter(x=>x!==name)

localStorage.setItem("fav-"+type,JSON.stringify(favorites[type]))

renderFavorites()

}

})

}

/* BUTTON SWIPE */

function likeFromButton(){

const card=document.querySelector(".card")

card.style.transform="translateX(120vw) rotate(25deg)"

setTimeout(()=>like(),300)

}

function dislikeFromButton(){

const card=document.querySelector(".card")

card.style.transform="translateX(-120vw) rotate(-25deg)"

setTimeout(()=>dislike(),300)

}

/* SWIPE */

function enableSwipe(card){

let startX
let currentX=0

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.addEventListener("touchmove",e=>{
currentX=e.touches[0].clientX
const diff=currentX-startX
card.style.transition="transform 0s"
card.style.transform="translateX("+diff+"px) rotate("+(diff/12)+"deg)"
})

card.addEventListener("touchend",(e)=>{

if(e.changedTouches && Math.abs(e.changedTouches[0].clientX - startX) < 10){
  return
}

const diff=currentX-startX

card.style.transition="transform .35s ease"

if(diff>120){
card.style.transform="translateX(120vw) rotate(25deg)"
setTimeout(like,250)
}
else if(diff<-120){
card.style.transform="translateX(-120vw) rotate(-25deg)"
setTimeout(dislike,250)
}
else{
card.style.transform="translateX(0)"
}

})

}

/* LOGIC */

/* LOGIC */

function like(){

let name = list[index]

if(!favorites[currentType].includes(name)){
favorites[currentType].push(name)
localStorage.setItem("fav-"+currentType,JSON.stringify(favorites[currentType]))
renderFavorites()
}

next()

}

function dislike(){
next()
}

function next(){

history.push(index)

index++

if(index >= list.length){
  shuffle(list)
  index = 0
}

buildDeck()

}

function undo(){

if(history.length === 0) return

index = history.pop()
buildDeck()

}


function goHome(){
deck.innerHTML=""
deck.style.display="none"
deck.style.pointerEvents="none"
document.getElementById("home").style.display="flex"
}

function buildDeck(){

deck.innerHTML = ""

if(!list || list.length === 0) return

if(index >= list.length){
  shuffle(list)
  index = 0
}

if(!list[index]){
  index = 0
}

const current = list[index]
const nextItem = list[index + 1]

if(current){
  createCard(current, false)
}

if(nextItem){
  createCard(nextItem, true)
}


for(let i = 1; i <= 2; i++){
  const next = list[index + i]
  if(next && !imageCache[next]){
    loadPlace(next)
  }
}

}

function navigate(name){
window.open("https://maps.google.com/?q="+encodeURIComponent(name+" Oslo"))
}

function book(name){
window.open("https://www.google.com/search?q="+encodeURIComponent(name+" booking"))
}

function preloadNext(){
for(let i=1;i<=5;i++){
const next=list[index+i]
if(next && !imageCache[next]){
loadPlace(next)
}
}
}

function loadPlace(name){

return new Promise(resolve=>{

if(!name){
  resolve(fallback("restaurant"))
  return
}

// failsafe timeout (hindrer freeze)
let resolved = false

function safeResolve(data){
  if(!resolved){
    resolved = true
    resolve(data)
  }
}

let timeout = setTimeout(()=>{
  safeResolve(fallback(name))
},1500)

if(imageCache[name]){
  clearTimeout(timeout)
  resolve(imageCache[name])
  return
}

if(!placesService){
  setTimeout(()=>{
    loadPlace(name).then(resolve)
  },300)
  return
}

placesService.findPlaceFromQuery({
query: name + " Oslo",
fields: ["place_id"]
}, (results, status) => {

if(status !== google.maps.places.PlacesServiceStatus.OK || !results || !results[0]){
  clearTimeout(timeout)
  resolve(fallback(name))
  return
}

placesService.getDetails({
placeId: results[0].place_id,
fields: ["name","rating","photos"]
}, (place, status) => {

clearTimeout(timeout)

let photos = []

if(status === google.maps.places.PlacesServiceStatus.OK && place && place.photos){
  for(let i=0;i<Math.min(3,place.photos.length);i++){
    photos.push(place.photos[i].getUrl({maxWidth:1200}))
  }
}

// fallback bilder hvis Google feiler
while(photos.length < 3){
  photos.push("https://source.unsplash.com/featured/?restaurant")
}

let result = {
name: (place && place.name) || name,
rating: (place && place.rating) || "",
photos: photos
}

imageCache[name] = result

safeResolve(result)

})

})

})
}

function fallback(name){
return{
name:name,
rating:"",
photos:[
"https://source.unsplash.com/featured/?restaurant",
"https://source.unsplash.com/featured/?food",
"https://source.unsplash.com/featured/?wine"
]
}
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js")
      .then(() => console.log("SW registered"))
      .catch(err => console.log("SW error", err))
  })
}

</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places&callback=initMap">
</script>

</body>
</html>
