<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Savorly</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
color:white;
font-family:-apple-system,BlinkMacSystemFont;
}

/* HOME */

#home{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
overflow-y:auto;
display:flex;
flex-direction:column;
align-items:center;
padding-top:70px;
}

.logo{
width:170px;
margin-bottom:30px;
}

.cat{
width:85%;
max-width:420px;
padding:16px;
margin:8px;
border-radius:18px;
background:#111;
border:1px solid rgba(255,255,255,0.18);
text-align:center;
font-size:20px;
}

.favoriteItem{
padding:12px;
margin:6px 0;
border-radius:14px;
background:#111;
border:1px solid #333;
}

.hidden{display:none}

/* CARD STACK */

#deck{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:none;
justify-content:center;
align-items:center;
}

.card{
position:absolute;
width:95%;
height:92%;
border-radius:26px;
overflow:hidden;
background:black;
transition:transform .35s ease;
}

.card.next{
transform:scale(.96) translateY(10px);
opacity:.6;
z-index:-1;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT GRADIENT */

.card::before{
content:"";
position:absolute;
left:0;
right:0;
bottom:140px;
height:160px;

background:linear-gradient(
to bottom,
rgba(0,0,0,0),
rgba(0,0,0,0.45)
);
}

/* BOTTOM GRADIENT */

.card::after{
content:"";
position:absolute;
left:0;
right:0;
bottom:0;
top:65%;

background:linear-gradient(
to bottom,
rgba(0,0,0,0),
rgba(0,0,0,0.4),
rgba(0,0,0,0.7),
rgba(0,0,0,0.95)
);
}

.photoDots{
position:absolute;
top:16px;
left:0;
right:0;
text-align:center;
}

.dot{
display:inline-block;
width:26px;
height:4px;
margin:3px;
border-radius:10px;
background:rgba(255,255,255,.4);
}

.dot.active{background:white}

/* TOP BUTTONS */

.topLeft,.topRight{
position:absolute;
top:24px;
font-size:24px;
color:black;
background:rgba(255,255,255,.9);
border-radius:14px;
padding:10px 12px;
}

.topLeft{left:20px}
.topRight{right:20px}

/* INFO */

.info{
position:absolute;
bottom:180px;
left:24px;
}

.name{
font-family:'Playfair Display', serif;
font-size:34px;
text-shadow:0 2px 8px rgba(0,0,0,0.8);
}

.rating{
font-size:18px;
color:#E6C27A;
text-shadow:0 2px 6px rgba(0,0,0,0.8);
}

/* ACTION BAR */

.buttons{
position:absolute;
bottom:30px;
left:20px;
right:20px;
display:flex;
justify-content:space-around;
background:rgba(0,0,0,.55);
border-radius:26px;
padding:18px 10px;
}

.buttons div{
background:rgba(255,255,255,.9);
border-radius:16px;
padding:14px 18px;
font-size:28px;
color:black;
}

</style>
</head>

<body>

<div id="home">

<img src="logo.png" class="logo">

<div class="cat" onclick="openCategory('restaurants')">Restaurant</div>
<div class="cat" onclick="openCategory('winebars')">Vinbar</div>
<div class="cat" onclick="openCategory('cocktailbars')">Cocktailbar</div>

<div style="margin-top:20px;width:85%;max-width:420px">

<div class="cat" onclick="toggleFav('restaurants')">Favoritt restaurant</div>
<div id="fav-restaurants" class="hidden"></div>

<div class="cat" onclick="toggleFav('winebars')">Favoritt vinbar</div>
<div id="fav-winebars" class="hidden"></div>

<div class="cat" onclick="toggleFav('cocktailbars')">Favoritt cocktailbar</div>
<div id="fav-cocktailbars" class="hidden"></div>

</div>

</div>

<div id="deck"></div>

<div id="map" style="display:none"></div>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places"></script>

<script>

/* STATE */

let data
let list=[]
let index=0
let history=[]
let currentType=""
let placesService
let imageCache={}

/* FAVORITES */

let favorites={
restaurants:JSON.parse(localStorage.getItem("fav-restaurants")||"[]"),
winebars:JSON.parse(localStorage.getItem("fav-winebars")||"[]"),
cocktailbars:JSON.parse(localStorage.getItem("fav-cocktailbars")||"[]")
}

const deck=document.getElementById("deck")

/* INIT MAP */

function initMap(){
const map=new google.maps.Map(document.getElementById("map"),{
center:{lat:59.91,lng:10.75},
zoom:13
})
placesService=new google.maps.places.PlacesService(map)
}

initMap()

/* LOAD DATA */

async function loadData(){
const res=await fetch("data/places.json")
data=await res.json()
renderFavorites()
}

loadData()

/* SHUFFLE */

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5)
}

/* OPEN CATEGORY */

function openCategory(type){

if(!data) return

currentType=type
list=[...data[type]]

shuffle(list)

index=0

document.getElementById("home").style.display="none"
deck.style.display="flex"

buildDeck()

}

/* BUILD STACK */

function buildDeck(){

deck.innerHTML=""

if(index>=list.length){
shuffle(list)
index=0
}

createCard(list[index],false)

if(list[index+1]){
createCard(list[index+1],true)
}

}

/* CREATE CARD */

function createCard(name,isNext){

const card=document.createElement("div")
card.className="card"
if(isNext) card.classList.add("next")

card.innerHTML=`

<img id="photo">

<div class="photoDots">
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

<div class="topLeft">←</div>
<div class="topRight">↺</div>

<div class="info">
<div class="name">${name}</div>
<div class="rating">⭐</div>
</div>

<div class="buttons">
<div onclick="dislikeFromButton()">✕</div>
<div onclick="navigate('${name}')">📍</div>
<div onclick="book('${name}')">📅</div>
<div onclick="likeFromButton()">♥</div>
</div>
`

deck.appendChild(card)

card.querySelector(".topLeft").onclick=goHome
card.querySelector(".topRight").onclick=undo

enableSwipe(card)

loadPlace(name).then(place=>{

let photos=place.photos
let photoIndex=0
const img=card.querySelector("#photo")

img.src=photos[0]

card.querySelector(".name").innerText=place.name
card.querySelector(".rating").innerText="⭐ "+(place.rating||"")+" · Google"

card.addEventListener("click",e=>{

const rect=card.getBoundingClientRect()
const x=e.clientX-rect.left

if(x<rect.width/2){
photoIndex=(photoIndex-1+photos.length)%photos.length
}else{
photoIndex=(photoIndex+1)%photos.length
}

img.src=photos[photoIndex]

})

})

}

/* SWIPE */

function enableSwipe(card){

let startX
let currentX=0

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.addEventListener("touchmove",e=>{
currentX=e.touches[0].clientX
const diff=currentX-startX
card.style.transform="translateX("+diff+"px) rotate("+(diff/12)+"deg)"
})

card.addEventListener("touchend",()=>{

const diff=currentX-startX

if(diff>120){
card.style.transform="translateX(120vw)"
setTimeout(like,200)
}
else if(diff<-120){
card.style.transform="translateX(-120vw)"
setTimeout(dislike,200)
}
else{
card.style.transform="translateX(0)"
}

})

}

/* BUTTON SWIPE */

function likeFromButton(){
const card=document.querySelector(".card")
card.style.transform="translateX(120vw)"
setTimeout(like,200)
}

function dislikeFromButton(){
const card=document.querySelector(".card")
card.style.transform="translateX(-120vw)"
setTimeout(dislike,200)
}

/* LOGIC */

function like(){

let name=list[index]

if(!favorites[currentType].includes(name)){

favorites[currentType].push(name)

localStorage.setItem("fav-"+currentType,JSON.stringify(favorites[currentType]))

renderFavorites()

}

next()

}

function dislike(){next()}

function next(){
history.push(index)
index++
buildDeck()
}

function undo(){

if(history.length===0) return

index=history.pop()

buildDeck()

}

/* HOME */

function goHome(){

deck.style.display="none"
document.getElementById("home").style.display="flex"

}

/* FAVORITES */

function toggleFav(type){
document.getElementById("fav-"+type).classList.toggle("hidden")
}

function renderFavorites(){

["restaurants","winebars","cocktailbars"].forEach(type=>{

const box=document.getElementById("fav-"+type)
box.innerHTML=""

favorites[type].forEach(name=>{

const el=document.createElement("div")
el.className="favoriteItem"
el.innerText=name

el.onclick=()=>openFavorite(type,name)

box.appendChild(el)

})

})

}

function openFavorite(type,name){

currentType=type
list=[...data[type]]

index=list.indexOf(name)

document.getElementById("home").style.display="none"
deck.style.display="flex"

buildDeck()

}

/* NAVIGATION */

function navigate(name){

if(/iPhone|iPad|iPod/i.test(navigator.userAgent)){

window.location.href =
"maps://?q=" + encodeURIComponent(name + " Oslo")

}else{

window.location.href =
"https://maps.google.com/?q=" + encodeURIComponent(name + " Oslo")

}

}

function book(name){

window.location.href =
"https://www.google.com/search?q=" + encodeURIComponent(name + " booking")

}

/* PLACES */

function loadPlace(name){

return new Promise(resolve=>{

if(imageCache[name]){
resolve(imageCache[name])
return
}

placesService.findPlaceFromQuery({
query:name+" Oslo",
fields:["place_id"]
},(results,status)=>{

if(status!==google.maps.places.PlacesServiceStatus.OK){
resolve(fallback(name))
return
}

placesService.getDetails({
placeId:results[0].place_id,
fields:["name","rating","photos"]
},(place,status)=>{

let photos=[]

if(place.photos){
for(let i=0;i<Math.min(3,place.photos.length);i++){
photos.push(place.photos[i].getUrl({maxWidth:1200}))
}
}

while(photos.length<3){
photos.push("https://source.unsplash.com/featured/?restaurant")
}

let result={
name:place?.name||name,
rating:place?.rating||"",
photos:photos
}

imageCache[name]=result

resolve(result)

})

})

})

}

/* FALLBACK */

function fallback(name){
return{
name:name,
rating:"",
photos:[
"https://source.unsplash.com/featured/?restaurant",
"https://source.unsplash.com/featured/?food",
"https://source.unsplash.com/featured/?wine"
]
}
}

</script>

</body>
</html>
