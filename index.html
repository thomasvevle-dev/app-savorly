<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

/* START */

#start-screen{
margin-top:120px;
text-align:center;
}

.category{
background:#222;
padding:12px 20px;
border-radius:20px;
margin:10px;
cursor:pointer;
display:inline-block;
}

.category.active{
background:#4CAF50;
}

.start-btn{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:20px;
background:#4CAF50;
color:white;
}

/* CARD */

#card-stack{
position:relative;
width:360px;
height:560px;
margin-top:20px;
}

.card{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
overflow:hidden;
background:black;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT */

.overlay{
position:absolute;
bottom:100px;
left:20px;
}

.title-row{
display:flex;
gap:10px;
align-items:center;
}

.place-name{
font-size:24px;
font-weight:bold;
}

.rating{
color:#FFD700;
}

.distance{
font-size:14px;
opacity:0.8;
}

/* ICON ROW */

.icon-row{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:space-evenly;
}

.icon-btn{
width:50px;
height:50px;
border-radius:50%;
border:none;
font-size:20px;
background:#333;
color:white;
}

</style>

</head>

<body>

<div id="start-screen">

<h2>Hva vil du utforske?</h2>

<div class="category" data-type="restaurant">Restaurant</div>
<div class="category" data-type="bar">Vinbar</div>
<div class="category" data-type="night_club">Cocktailbar</div>

<br>

<button class="start-btn" onclick="start()">Start</button>

</div>

<div id="card-stack" style="display:none"></div>

<script>

let selectedType=null
let userLocation=null
let places=[]
let index=0
let service

/* CATEGORY */

document.querySelectorAll(".category").forEach(el=>{

el.onclick=()=>{

document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"))

el.classList.add("active")

selectedType=el.dataset.type

}

})

/* START */

function start(){

if(!selectedType){
alert("Velg kategori")
return
}

userLocation = JSON.parse(localStorage.getItem("userLocation"))

if(userLocation){
initPlaces()
}
else{
getLocation()
}

}

/* GET GPS */

function getLocation(){

navigator.geolocation.getCurrentPosition(

pos=>{

userLocation={
lat:pos.coords.latitude,
lng:pos.coords.longitude
}

localStorage.setItem("userLocation",JSON.stringify(userLocation))

initPlaces()

},

err=>{
alert("Kunne ikke hente GPS")
console.log(err)
}

)

}

/* INIT GOOGLE */

function initPlaces(){

const map=new google.maps.Map(document.createElement("div"))

service=new google.maps.places.PlacesService(map)

searchPlaces()

}

/* SEARCH */

function searchPlaces(){

const request={
location:new google.maps.LatLng(userLocation.lat,userLocation.lng),
radius:3000,
type:selectedType
}

service.nearbySearch(request,(results,status)=>{

if(status!==google.maps.places.PlacesServiceStatus.OK){
alert("Fant ingen steder")
return
}

places=results

document.getElementById("start-screen").style.display="none"
document.getElementById("card-stack").style.display="block"

renderCards()

})

}

/* STARS */

function stars(r){

let full=Math.floor(r)
let empty=5-full

return "⭐".repeat(full)+"✩".repeat(empty)

}

/* DISTANCE */

function distance(lat1,lon1,lat2,lon2){

const R=6371

const dLat=(lat2-lat1)*Math.PI/180
const dLon=(lon2-lon1)*Math.PI/180

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2

return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))*1000)

}

/* RENDER */

function renderCards(){

const stack=document.getElementById("card-stack")

stack.innerHTML=""

places.slice(index,index+3).forEach(place=>{

let photo=""

if(place.photos){
photo=place.photos[0].getUrl({maxWidth:800})
}

let d=distance(
userLocation.lat,
userLocation.lng,
place.geometry.location.lat(),
place.geometry.location.lng()
)

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${photo}">

<div class="overlay">

<div class="title-row">

<div class="place-name">${place.name}</div>
<div class="rating">${stars(place.rating)} ${place.rating}</div>

</div>

<div class="distance">📍 ${d} m unna</div>

</div>

<div class="icon-row">

<button class="icon-btn" onclick="next()">❌</button>

<button class="icon-btn" onclick="window.open('https://maps.google.com/?q=${place.name}')">📍</button>

<button class="icon-btn" onclick="window.open('https://maps.google.com/?q=${place.name}')">📅</button>

<button class="icon-btn" onclick="next()">❤️</button>

</div>

`

stack.appendChild(card)

})

}

/* NEXT */

function next(){

index++

if(index>=places.length){
index=0
}

renderCards()

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=DIN_GOOGLE_API_KEY&libraries=places"></script>

</body>
</html>
