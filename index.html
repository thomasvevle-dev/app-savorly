<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

#map{width:1px;height:1px;opacity:0}

/* START SCREEN */

#start{
margin-top:80px;
text-align:center;
width:90%;
max-width:380px;
}

.category{
background:#222;
padding:18px 26px;
border-radius:22px;
margin:10px;
cursor:pointer;
font-size:18px;
}

.fav-list{
display:none;
margin-bottom:10px;
}

.fav-item{
background:#333;
padding:12px;
margin-top:4px;
border-radius:10px;
cursor:pointer;
}

/* CARD STACK */

#cardStack{
position:relative;
width:360px;
height:580px;
display:none;
}

.card{
position:absolute;
width:100%;
height:100%;
border-radius:26px;
overflow:hidden;
background:#000;
transition:transform .3s ease;
}

.card.next{
transform:scale(.95) translateY(12px);
z-index:0;
}

.card.active{
z-index:2;
}

/* IMAGE */

.photo{
width:100%;
height:100%;
object-fit:cover;
}

/* ICONS */

.back{
position:absolute;
top:18px;
left:20px;
font-size:24px;
text-shadow:0 0 12px black;
cursor:pointer;
z-index:10;
}

.favorite{
position:absolute;
top:18px;
right:30px;
font-size:24px;
text-shadow:0 0 12px black;
cursor:pointer;
z-index:10;
}

/* TEXT */

.overlay{
position:absolute;
bottom:110px;
left:22px;
z-index:10;
}

.name{
font-size:30px;
font-weight:600;
}

.rating{
color:#FFD54F;
font-size:18px;
margin-top:6px;
}

/* PHOTO INDICATOR */

.photo-indicator{
position:absolute;
top:12px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
z-index:10;
}

.photo-bar{
width:30px;
height:4px;
border-radius:3px;
background:rgba(255,255,255,.3);
}

.photo-bar.active{
background:white;
}

/* BUTTONS */

.buttons{
position:absolute;
bottom:25px;
width:100%;
display:flex;
justify-content:space-evenly;
z-index:10;
}

.action{
font-size:28px;
text-shadow:0 0 12px black;
cursor:pointer;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="start">

<h2>Savorly</h2>

<div class="category" onclick="openCategory('restaurant')">Restaurant</div>
<div class="category" onclick="openCategory('wine')">Vinbar</div>
<div class="category" onclick="openCategory('cocktail')">Cocktailbar</div>

<div class="category" onclick="toggleFav('restaurant')">Favoritt restaurant</div>
<div class="fav-list" id="fav-restaurant"></div>

<div class="category" onclick="toggleFav('wine')">Favoritt vinbar</div>
<div class="fav-list" id="fav-wine"></div>

<div class="category" onclick="toggleFav('cocktail')">Favoritt cocktailbar</div>
<div class="fav-list" id="fav-cocktail"></div>

</div>

<div id="cardStack">

<div class="card active" id="activeCard"></div>
<div class="card next" id="nextCard"></div>

</div>

<script>

let service
let places=[]
let index=0
let photos=[]
let photoIndex=0
let currentCategory=""

/* FAVORITES */

let favorites=JSON.parse(localStorage.getItem("savorlyFavorites"))||{
restaurant:[],
wine:[],
cocktail:[]
}

function saveFavorites(){
localStorage.setItem("savorlyFavorites",JSON.stringify(favorites))
}

/* CACHE */

let placesCache=JSON.parse(localStorage.getItem("savorlyPlacesCache"))||{}
let cacheVersion=localStorage.getItem("savorlyPlacesVersion")||""

/* MAP */

function initMap(){

const map=new google.maps.Map(
document.getElementById("map"),
{center:{lat:59.91,lng:10.75},zoom:13}
)

service=new google.maps.places.PlacesService(map)

updateFavorites()

}

/* CATEGORY */

async function openCategory(type){

currentCategory=type

let res=await fetch("data/places.json")
let text=await res.text()

let version=text.length

if(version!==cacheVersion){

placesCache={}
localStorage.setItem("savorlyPlacesCache","{}")
localStorage.setItem("savorlyPlacesVersion",version)

}

let data=JSON.parse(text)

let list=[]

if(type==="restaurant") list=data.restaurants
if(type==="wine") list=data.winebars
if(type==="cocktail") list=data.cocktailbars

if(placesCache[type]){

places=placesCache[type]

}else{

const requests=list.map(name=>{

return new Promise(resolve=>{

service.findPlaceFromQuery({
query:name+" oslo",
fields:["place_id"]
},(results,status)=>{

if(status==="OK"){

service.getDetails({
placeId:results[0].place_id,
fields:["rating","photos"]
},(place)=>{

resolve({
name:name,
rating:place.rating,
photos:place.photos
})

})

}else resolve({name:name})

})

})

})

places=(await Promise.all(requests)).filter(p=>p)

placesCache[type]=places
localStorage.setItem("savorlyPlacesCache",JSON.stringify(placesCache))

}

index=0

start.style.display="none"
cardStack.style.display="block"

renderCards()

}

/* RENDER */

function renderCards(){

renderCard(activeCard,places[index])
renderCard(nextCard,places[index+1])

}

/* CARD */

function renderCard(card,data){

if(!data)return

let imgs=[]

if(data.photos){

for(let i=0;i<Math.min(3,data.photos.length);i++){
imgs.push(data.photos[i].getUrl({maxWidth:1200}))
}

}

if(imgs.length===0){
imgs=["https://images.unsplash.com/photo-1414235077428-338989a2e8c0"]
}

photos=imgs
photoIndex=0

card.innerHTML=`

<div class="back" onclick="back()">⬅</div>
<div class="favorite" onclick="favoriteSwipe()">⭐</div>

<div class="photo-indicator" id="indicator"></div>

<img class="photo" id="photo" src="${imgs[0]}">

<div class="overlay">

<div class="name">${data.name}</div>
<div class="rating">${data.rating?"⭐ "+data.rating:""}</div>

</div>

<div class="buttons">

<div class="action" onclick="skip()">❌</div>
<div class="action" onclick="maps()">📍</div>
<div class="action" onclick="maps()">📅</div>
<div class="action" onclick="like()">❤️</div>

</div>
`

renderIndicator()

document.getElementById("photo").onclick=nextPhoto

enableSwipe()

}

/* PHOTO SWITCH */

function nextPhoto(){

if(photos.length<2)return

photoIndex++

if(photoIndex>=photos.length)photoIndex=0

document.getElementById("photo").src=photos[photoIndex]

renderIndicator()

}

function renderIndicator(){

let container=document.getElementById("indicator")
if(!container)return

container.innerHTML=""

photos.forEach((p,i)=>{

let bar=document.createElement("div")
bar.className="photo-bar"

if(i===photoIndex)bar.classList.add("active")

container.appendChild(bar)

})

}

/* SWIPE */

function swipe(dir){

activeCard.style.transform=
dir==="right"
?"translateX(500px) rotate(20deg)"
:"translateX(-500px) rotate(-20deg)"

setTimeout(()=>{

index++

if(index>=places.length)index=0

activeCard.style.transform=""

renderCards()

},250)

}

function like(){swipe("right")}
function skip(){swipe("left")}

/* TOUCH DRAG */

function enableSwipe(){

let startX=0
let currentX=0
let dragging=false

activeCard.onpointerdown=e=>{
dragging=true
startX=e.clientX
}

window.onpointermove=e=>{
if(!dragging)return

currentX=e.clientX-startX
activeCard.style.transform=`translateX(${currentX}px) rotate(${currentX/10}deg)`
}

window.onpointerup=()=>{

if(!dragging)return

dragging=false

if(currentX>120) swipe("right")
else if(currentX<-120) swipe("left")
else activeCard.style.transform=""

currentX=0

}

}

/* FAVORITES */

function favoriteSwipe(){

let place=places[index]

let exists=favorites[currentCategory].some(p=>p.name===place.name)

if(!exists){
favorites[currentCategory].push(place)
saveFavorites()
updateFavorites()
}

swipe("right")

}

/* FAVORITE LIST */

function updateFavorites(){

["restaurant","wine","cocktail"].forEach(type=>{

let container=document.getElementById("fav-"+type)

container.innerHTML=""

favorites[type].forEach(place=>{

let div=document.createElement("div")
div.className="fav-item"
div.innerText=place.name

div.onclick=function(){

places=[place]
index=0

start.style.display="none"
cardStack.style.display="block"

renderCards()

}

container.appendChild(div)

})

})

}

function toggleFav(type){

let list=document.getElementById("fav-"+type)

list.style.display=list.style.display==="block"?"none":"block"

}

/* MAP */

function maps(){

let p=places[index]

window.open("https://maps.google.com/?q="+p.name)

}

/* BACK */

function back(){

cardStack.style.display="none"
start.style.display="block"

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places&callback=initMap"></script>

</body>
</html>
