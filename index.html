<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:"DIN Round",Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

/* START SCREEN */

#start-screen{
margin-top:120px;
text-align:center;
}

.category{
background:#222;
padding:12px 20px;
border-radius:20px;
margin:10px;
display:inline-block;
cursor:pointer;
}

.category.active{
background:#4CAF50;
}

.start-btn{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:20px;
background:#4CAF50;
color:white;
cursor:pointer;
}

/* CARD STACK */

#card-stack{
position:relative;
width:360px;
height:540px;
margin-top:20px;
}

.card{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
overflow:hidden;
background:#000;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* TOP BUTTONS */

.back-btn{
position:absolute;
left:15px;
top:15px;
font-size:22px;
background:none;
border:none;
color:white;
cursor:pointer;
}

.fav-btn{
position:absolute;
right:15px;
top:15px;
font-size:20px;
background:none;
border:none;
color:white;
cursor:pointer;
}

/* TEXT */

.overlay{
position:absolute;
bottom:80px;
left:20px;
}

.place-name{
font-size:24px;
font-weight:bold;
}

.rating{
color:#FFD700;
}

/* ICON ROW */

.icon-row{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:space-evenly;
}

.icon-btn{
width:50px;
height:50px;
border-radius:50%;
border:none;
font-size:20px;
background:#333;
color:white;
cursor:pointer;
}

/* FAVORITES */

#favorites-page{
display:none;
width:360px;
margin-top:40px;
}

.favorite-item{
background:#222;
padding:14px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="start-screen">

<h2>Hva vil du utforske?</h2>

<div class="category" data-type="restaurant">Restaurant</div>
<div class="category" data-type="wine">Vinbar</div>
<div class="category" data-type="cocktail">Cocktailbar</div>

<br>

<button class="start-btn" onclick="start()">Start</button>

</div>

<div id="favorites-page"></div>

<div id="card-stack" style="display:none"></div>

<script>

/* DATA */

const restaurants=[
"Libertine","Skaal Matbar","Arakataka","Le Benjamin","Hyde","Kverneriet","Kolonialen"
]

const wineBars=[
"Territoriet","Nektar Vinbar","Radegast","Vinoteket","Andre til Høyre"
]

const cocktailBars=[
"Himkok","Bettola","Svanen","Torggata Botaniske","Fuglen"
]

let places=[]
let favorites=[]
let index=0
let selectedType=null

/* CATEGORY SELECT */

document.querySelectorAll(".category").forEach(el=>{

el.onclick=()=>{

document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"))

el.classList.add("active")

selectedType=el.dataset.type

}

})

/* START */

function start(){

if(!selectedType){
alert("Velg kategori")
return
}

if(selectedType==="restaurant") places=[...restaurants]
if(selectedType==="wine") places=[...wineBars]
if(selectedType==="cocktail") places=[...cocktailBars]

document.getElementById("start-screen").style.display="none"
document.getElementById("card-stack").style.display="block"

renderCards()

}

/* RENDER */

function renderCards(){

const stack=document.getElementById("card-stack")

stack.innerHTML=""

places.slice(index,index+3).forEach((name,i)=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="https://source.unsplash.com/600x800/?restaurant">

<button class="back-btn">⬅</button>
<button class="fav-btn">⭐</button>

<div class="overlay">

<div class="place-name">${name}</div>
<div class="rating">⭐ 4.2</div>

</div>

<div class="icon-row">

<button class="icon-btn skip">❌</button>
<button class="icon-btn nav">📍</button>
<button class="icon-btn book">📅</button>
<button class="icon-btn like">❤️</button>

</div>

`

card.querySelector(".back-btn").onclick=goBack
card.querySelector(".fav-btn").onclick=showFavorites

card.querySelector(".skip").onclick=next

card.querySelector(".like").onclick=()=>{
favorites.push(name)
updateFavorites()
next()
}

card.querySelector(".nav").onclick=()=>{
window.open("https://maps.google.com/search/"+name)
}

card.querySelector(".book").onclick=()=>{
window.open("https://maps.google.com/search/"+name)
}

addSwipe(card,name)

stack.appendChild(card)

})

}

/* SWIPE */

function addSwipe(card,name){

let startX=null

card.addEventListener("pointerdown",e=>{
startX=e.clientX
})

card.addEventListener("pointerup",e=>{

if(startX===null) return

let diff=e.clientX-startX

if(diff>120){
favorites.push(name)
updateFavorites()
next()
}

if(diff<-120){
next()
}

startX=null

})

}

/* NEXT */

function next(){

index++

if(index>=places.length){
index=0
}

renderCards()

}

/* FAVORITES */

function updateFavorites(){

const list=document.getElementById("favorites-page")

list.innerHTML=""

favorites.forEach(place=>{

let div=document.createElement("div")

div.className="favorite-item"

div.innerText=place

div.onclick=()=>{

index=places.indexOf(place)

document.getElementById("favorites-page").style.display="none"
document.getElementById("card-stack").style.display="block"

renderCards()

}

list.appendChild(div)

})

}

function showFavorites(){

document.getElementById("favorites-page").style.display="block"
document.getElementById("card-stack").style.display="none"

}

/* BACK */

function goBack(){

document.getElementById("card-stack").style.display="none"
document.getElementById("start-screen").style.display="block"

}

</script>

</body>
</html>
