<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

/* START */

#start-screen{
margin-top:120px;
text-align:center;
}

.category{
background:#222;
padding:12px 20px;
border-radius:20px;
margin:10px;
cursor:pointer;
display:inline-block;
}

.category.active{
background:#4CAF50;
}

.start-btn{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:20px;
background:#4CAF50;
color:white;
}

/* CARD */

#card-stack{
position:relative;
width:360px;
height:560px;
margin-top:20px;
}

.card{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
overflow:hidden;
background:black;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT */

.overlay{
position:absolute;
bottom:100px;
left:20px;
}

.title-row{
display:flex;
gap:10px;
align-items:center;
}

.place-name{
font-size:24px;
font-weight:bold;
}

.rating{
color:#FFD700;
}

/* ICON ROW */

.icon-row{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:space-evenly;
}

.icon-btn{
width:50px;
height:50px;
border-radius:50%;
border:none;
font-size:20px;
background:#333;
color:white;
}

</style>

</head>

<body>

<div id="start-screen">

<h2>Hva vil du utforske?</h2>

<div class="category" data-type="restaurant">Restaurant</div>
<div class="category" data-type="wine">Vinbar</div>
<div class="category" data-type="cocktail">Cocktailbar</div>

<br>

<button class="start-btn" onclick="start()">Start</button>

</div>

<div id="card-stack" style="display:none"></div>

<script>

/* LISTENE FRA FILEN DIN */

const restaurants=[
"Libertine",
"Skaal Matbar",
"Arakataka",
"Le Benjamin",
"Hyde",
"Kverneriet",
"Kolonialen"
]

const wineBars=[
"Territoriet",
"Nektar Vinbar",
"Radegast",
"Vinoteket",
"Andre til Høyre"
]

const cocktailBars=[
"Himkok",
"Bettola",
"Svanen",
"Torggata Botaniske",
"Fuglen"
]

let selectedType=null
let places=[]
let index=0

/* CATEGORY */

document.querySelectorAll(".category").forEach(el=>{

el.onclick=()=>{

document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"))

el.classList.add("active")

selectedType=el.dataset.type

}

})

/* START */

function start(){

if(!selectedType){
alert("Velg kategori")
return
}

if(selectedType==="restaurant") places=[...restaurants]

if(selectedType==="wine") places=[...wineBars]

if(selectedType==="cocktail") places=[...cocktailBars]

document.getElementById("start-screen").style.display="none"

document.getElementById("card-stack").style.display="block"

renderCards()

}

/* STARS */

function stars(r){

let full=Math.floor(r)

let empty=5-full

return "⭐".repeat(full)+"✩".repeat(empty)

}

/* RENDER */

function renderCards(){

const stack=document.getElementById("card-stack")

stack.innerHTML=""

places.slice(index,index+3).forEach(name=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="https://source.unsplash.com/600x800/?restaurant">

<div class="overlay">

<div class="title-row">

<div class="place-name">${name}</div>

<div class="rating">⭐⭐⭐⭐☆ 4.2</div>

</div>

</div>

<div class="icon-row">

<button class="icon-btn" onclick="next()">❌</button>

<button class="icon-btn" onclick="window.open('https://maps.google.com/?q=${name}')">📍</button>

<button class="icon-btn" onclick="window.open('https://maps.google.com/?q=${name}')">📅</button>

<button class="icon-btn" onclick="next()">❤️</button>

</div>

`

stack.appendChild(card)

})

}

/* NEXT */

function next(){

index++

if(index>=places.length){
index=0
}

renderCards()

}

</script>

</body>
</html>
