<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
}

#card-stack{
position:relative;
width:340px;
height:470px;
margin-top:30px;
}

.card{
position:absolute;
width:100%;
height:100%;
background:#222;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.info{
padding:15px;
}

.place-name{
font-size:20px;
font-weight:bold;
}

.rating{
color:#FFD700;
margin:6px 0;
}

.buttons{
display:flex;
justify-content:space-between;
margin-top:10px;
}

button{
border:none;
border-radius:50%;
width:60px;
height:60px;
font-size:22px;
cursor:pointer;
}

.dislike{
background:#ff4d4d;
}

.like{
background:#4CAF50;
}

.map-btn{
margin-top:10px;
background:#2196F3;
padding:8px;
border-radius:8px;
border:none;
width:100%;
color:white;
}

#favorites{
margin:20px;
width:90%;
}

.favorite-item{
background:#222;
padding:10px;
margin:6px 0;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="card-stack"></div>

<div id="favorites">
<h3>Favoritter ❤️</h3>
<div id="fav-list"></div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places"></script>

<script>

let places=[]
let favorites=[]
let index=0

function initPlaces(){

const service = new google.maps.places.PlacesService(document.createElement("div"))

service.nearbySearch({

location:{lat:59.9139,lng:10.7522},
radius:3000,
type:"restaurant"

},(results,status)=>{

if(status===google.maps.places.PlacesServiceStatus.OK){

places=results.filter(p=>p.rating && p.rating>=4.2)

shufflePlaces()

renderCards()

}

})

}

function shufflePlaces(){
places.sort(()=>Math.random()-0.5)
}

function renderCards(){

const stack=document.getElementById("card-stack")

stack.innerHTML=""

places.slice(index,index+5).forEach((place,i)=>{

let photo=""

if(place.photos){
photo=place.photos[0].getUrl({maxWidth:400})
}

const card=document.createElement("div")

card.className="card"
card.style.zIndex=100-i

card.innerHTML=`

<img src="${photo}">

<div class="info">

<div class="place-name">${place.name}</div>

<div class="rating">⭐ ${place.rating}</div>

<button class="map-btn">📍 Naviger hit</button>

<div class="buttons">

<button class="dislike">❌</button>
<button class="like">❤️</button>

</div>

</div>
`

addEvents(card,place)

stack.appendChild(card)

})

}

function addEvents(card,place){

card.querySelector(".map-btn").onclick=()=>{

window.open(
`https://www.google.com/maps/search/?api=1&query=${place.name}`
)

}

card.querySelector(".like").onclick=()=>{
like(place)
card.remove()
next()
}

card.querySelector(".dislike").onclick=()=>{
card.remove()
next()
}

}

function like(place){

favorites.push(place)

updateFavorites()

}

function updateFavorites(){

let favList=document.getElementById("fav-list")

favList.innerHTML=""

favorites.forEach(f=>{

let div=document.createElement("div")

div.className="favorite-item"

div.innerText=f.name

div.onclick=()=>{

index=places.findIndex(p=>p.name===f.name)

renderCards()

}

favList.appendChild(div)

})

}

function next(){

index++

if(index>=places.length){

shufflePlaces()

index=0

}

renderCards()

}

initPlaces()

</script>

</body>
</html>
