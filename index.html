<style>

body{
margin:0;
background:#000;
color:white;
font-family:-apple-system,BlinkMacSystemFont;
}

/* HOME */

#home{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
overflow-y:auto;
display:flex;
flex-direction:column;
align-items:center;
padding-top:70px;
z-index:20;
}

.logo{
width:170px;
margin-bottom:30px;
}

.cat{
width:85%;
max-width:420px;
padding:16px;
margin:8px;
border-radius:18px;
background:#111;
border:1px solid rgba(255,255,255,0.18);
text-align:center;
font-size:20px;
}

.favoriteItem{
padding:12px;
margin:6px 0;
border-radius:14px;
background:#111;
border:1px solid #333;
}

/* CARD STACK */

#deck{
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:10;
  pointer-events:auto;  
}

.card{
overflow:visible;
position:absolute;
z-index:1;
width:95%;
height:92%;
border-radius:26px;
overflow:hidden;
background:black;
transition: transform .25s ease-out;
will-change: transform;
pointer-events:auto;
}

.card.next{
transform:scale(.96) translateY(10px);
opacity:.6;
z-index:-1;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* GRADIENT BACK TEXT */

.card::before{
content:"";
position:absolute;
left:0;
right:0;
bottom:140px;
height:160px;
background:linear-gradient(
to bottom,
rgba(0,0,0,0),
rgba(0,0,0,0.45)
);
pointer-events:none;
}

/* GRADIENT BOTTOM */

.card::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:35%;
  background:linear-gradient(
  background:rgba(0,0,0,0.8);  
    to bottom,
    rgba(0,0,0,0),
    rgba(0,0,0,0.4),
    rgba(0,0,0,0.7),
    rgba(0,0,0,0.95)
  );
  pointer-events:none;
  z-index:1;
}
.card.dimmed{
  filter:brightness(0.6);
}
  
/* DOTS */

.photoDots{
position:absolute;
top:16px;
left:0;
right:0;
text-align:center;
}

.dot{
display:inline-block;
width:26px;
height:4px;
margin:3px;
border-radius:10px;
background:rgba(255,255,255,.4);
}

.dot.active{background:white}

/* TOP BUTTONS */

.topLeft,.topRight{
position:absolute;
top:24px;
font-size:24px;
color:black;
background:rgba(255,255,255,.9);
border-radius:14px;
padding:10px 12px;
}

.topLeft{left:20px}
.topRight{right:20px}

/* INFO */

.info{
  position:absolute;
  bottom:200px;
  left:24px;
  right:24px;
  z-index:10;
}

.name{
font-family:'Playfair Display', serif;
font-size:34px;
text-shadow:0 2px 8px rgba(0,0,0,0.8);
}

.vibe{
  pointer-events:auto;
  margin-top:8px;
  display:block;
  position:relative;
  z-index:5;
  font-size:13px;
  color:#ddd;
  opacity:.9;
  margin-top:6px;
  letter-spacing:.5px;
  text-transform:capitalize;
  text-shadow:0 2px 6px rgba(0,0,0,0.8);
}

.chip{
  display:inline-block;
  padding:6px 12px;
  margin:4px 6px 0 0;
  font-size:12px;
  border-radius:999px;
  background:rgba(255,255,255,0.2);
  color:white;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.3);
  font-weight:500;
}

.chip.active{
  background:white;
  color:black;
  border:1px solid white;
}
  
/* ACTION BAR */

.buttons{
  position:absolute;
  bottom:20px;
  left:20px;
  right:20px;
  display:flex;
  justify-content:space-around;
  background:rgba(0,0,0,.55);
  border-radius:26px;
  padding:18px 10px;
  z-index:999;  
}

.buttons div{
background:rgba(255,255,255,.9);
border-radius:16px;
padding:14px 18px;
font-size:28px;
color:black;
z-index:10;
position:relative;
touch-action: manipulation;
}

.friends{
  font-size:14px;
  margin-top:6px;
  color:#7dd3fc;
  text-shadow:0 2px 6px rgba(0,0,0,0.8);
}

.modal{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:100;
}

.modalContent{
  background:#111;
  padding:20px;
  border-radius:20px;
  width:85%;
  max-width:400px;
}

.modalItem{
  padding:12px;
  border-bottom:1px solid #333;
  font-size:16px;
}

.hidden{
{display:none !important;}
}

.sheet{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:flex-end;
  z-index:9999;
  pointer-events:auto;
}
  
.sheet.hidden{
  display:none !important;
  pointer-events:none;
}
 
.sheetContent{
  width:100%;
  max-width:500px;
  background:#111;
  border-top-left-radius:24px;
  border-top-right-radius:24px;
  padding:20px;
  animation:slideUp .25s ease;
}

@keyframes slideUp{
  from{transform:translateY(100%)}
  to{transform:translateY(0)}
}

.sheetItem{
  padding:14px;
  border-bottom:1px solid #222;
  font-size:16px;
}

.sheetHandle{
  width:40px;
  height:4px;
  background:#555;
  border-radius:10px;
  margin:0 auto 12px;
} 

.reviewBox{
  touch-action: pan-y;
  margin-bottom:8px;

  background:rgba(0,0,0,0.65);
  backdrop-filter: blur(10px);

  padding:10px 12px;
  border-radius:12px;

  font-size:13px;

  opacity:0;
  transform:scale(0.9);          
  transition: all .25s cubic-bezier(.2,.8,.2,1);
}
.reviewBox .name{
  font-size:16px;
  font-weight:600;
  margin-bottom:6px;
}

.reviewBox .rating{
  font-size:12px;
  margin-bottom:6px;
  opacity:.7;
}

.reviewBox .text{
  margin-top:4px;
  font-size:14px;
  line-height:1.4;
}

.reviewBox.hidden{
  display:none;
}
.reviewBox:not(.hidden){
  opacity:1;
  transform:scale(1);            
}
.reviewBox{
  animation:fadeIn .2s ease;
}

.reviewHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
}

.dots{
  display:flex;
  gap:5px;
}

.dots .dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:rgba(255,255,255,0.4);
}

.dots .dot.active{
  background:white;
}  

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translate(-50%, -40%);
  }
  to{
    opacity:1;
    transform:translate(-50%, -50%);
  }
}  
  
</style>
</head>

function ensureMinReviews(){

  const allPlaces = [
    ...data.restaurants,
    ...data.winebars,
    ...data.cocktailbars
  ]

  allPlaces.forEach(place => {

    const name = place.name

    const reviewers = friends.filter(f =>
      f.reviews && f.reviews[name]
    )

    if(reviewers.length < 3){

      const missing = 3 - reviewers.length

      for(let i = 0; i < missing; i++){

        const randomFriend =
          friends[Math.floor(Math.random() * friends.length)]

        if(!randomFriend.reviews) randomFriend.reviews = {}

        randomFriend.reviews[name] = {
          rating: 3 + Math.floor(Math.random()*3),
          text: "Bra sted med god stemning. Kunne definitivt dratt tilbake."
        }

      }

    }

  })

}
ensureMinReviews()

}

function getFriendsWhoLike(placeName){
  return friends.filter(friend =>
    friend.reviews && friend.reviews[placeName]
  )
}
  
function openCategory(type){

  currentType = type
  activeVibe = null

  list = (data[type] || [])

  index = 0

  document.getElementById("home").style.display = "none"
  deck.style.display = "flex"
  deck.style.pointerEvents = "auto"   // 🔥 VIKTIG

  buildDeck()
}

function openFavorite(type,name){

currentType = type
list = (data[type] || []).filter(item => item && item.name)

index = list.findIndex(item => item.name === name)
if(index === -1) index = 0

document.getElementById("home").style.display="none"
deck.style.display="flex"
deck.style.pointerEvents="auto"

buildDeck()
}

function buildDeck(){
deck.style.pointerEvents = "auto"
  
  deck.innerHTML = ""

  if(!list || list.length === 0) return

  if(index >= list.length){
    index = 0
  }

  if(!list[index]){
    index = 0
  }

  const current = list[index]
  const nextItem = list[index + 1]

  if(current){
    createCard(current, false)
  }

  if(nextItem){
    createCard(nextItem, true)
  }

  for(let i = 1; i <= 2; i++){
    const next = list[index + i]
  if(next && next.name && !imageCache[next.name]){
loadPlace(next.name)
}
  }

}

function createCard(item,isNext){

  if(!item || !item.name) return
  let name = item.name

  const card = document.createElement("div")
  card.className = "card"
  if(isNext) card.classList.add("next")

  card.innerHTML = `
    <img id="photo" src="https://source.unsplash.com/featured/?restaurant">

    <div class="photoDots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div class="topLeft">←</div>
    <div class="topRight">↺</div>

    <div class="info">
      <div class="reviewBox hidden"></div> 
      <div class="name">${name}</div>
      <div class="rating"></div>
      <div class="vibe"></div>
      <div class="friends"></div>
    </div>

    <div class="buttons">
      <div class="btn-dislike">✕</div>
      <div class="btn-map">📍</div>
      <div class="btn-book">📅</div>
      <div class="btn-like">♥</div>
    </div>
  `

  deck.appendChild(card)

  // NAV
  card.querySelector(".topLeft").onclick = goHome

  card.querySelector(".topRight").onclick = (e)=>{
    e.stopPropagation()
    undo()
  }

  // BUTTONS
  card.querySelector(".buttons").addEventListener("click", e=>{
    const btn = e.target.closest("div")
    if(!btn) return

    e.stopPropagation()

    if(btn.classList.contains("btn-like")) likeFromButton()
    if(btn.classList.contains("btn-dislike")) dislikeFromButton()
    if(btn.classList.contains("btn-map")) navigate(name)
    if(btn.classList.contains("btn-book")) book(item)
  })

  enableSwipe(card)

  let tapStartX = 0
  let tapStartTime = 0

  card.addEventListener("touchstart", e=>{
    tapStartX = e.touches[0].clientX
    tapStartTime = Date.now()

    if(!e.target.closest(".friends")){
      closeFriendsSheet()
    }
  })

  loadPlace(name).then(place=>{

    if(!card.isConnected) return

    let photos = place.photos
    let photoIndex = 0

    const img = card.querySelector("#photo")
    img.src = photos[0]

    card.querySelector(".name").innerText = place.name
    card.querySelector(".rating").innerText = "⭐ " + place.rating

    // TAP (BILDE)
    card.addEventListener("touchend", e=>{

      if(
        e.target.closest(".buttons") ||
        e.target.closest(".chip") ||
        e.target.closest(".friends") ||
        e.target.closest(".reviewBox")
      ) return

      let diffX = Math.abs(e.changedTouches[0].clientX - tapStartX)
      let time = Date.now() - tapStartTime

      if(diffX < 15 && time < 250){

        const rect = card.getBoundingClientRect()
        const x = e.changedTouches[0].clientX - rect.left

        if(x > rect.width / 2){
          photoIndex = (photoIndex + 1) % photos.length
        } else {
          photoIndex = (photoIndex - 1 + photos.length) % photos.length
        }

        img.src = photos[photoIndex]

        const dots = card.querySelectorAll(".dot")
        dots.forEach((d,i)=>d.classList.toggle("active", i === photoIndex))
      }
    })

    // VIBE
    const vibeEl = card.querySelector(".vibe")
    vibeEl.innerHTML = ""

    if(item.vibe){
      item.vibe.forEach(v => {
        const chip = document.createElement("span")
        chip.className = "chip"
        chip.innerText = v

        if(activeVibe === v){
          chip.classList.add("active")
        }

        chip.onclick = (e)=>{
          e.stopPropagation()

          if(activeVibe === v){
            activeVibe = null
            list = data[currentType]
          } else {
            setVibe(v)
            return
          }

          index = 0
          buildDeck()
        }

        vibeEl.appendChild(chip)
      })
    }

    // FRIENDS
    const friendsEl = card.querySelector(".friends")
    const matchedFriends = getFriendsWhoLike(name)

    if(matchedFriends.length > 0){
      friendsEl.innerText =
        "❤️ " + matchedFriends.length + " venner liker dette"

      friendsEl.style.cursor = "pointer"

      friendsEl.onclick = (e)=>{
        e.stopPropagation()
        showReview(card, matchedFriends, name)
      }
    }

  })
}

function enableFavSwipe(el,type,name){

let startX

el.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

el.addEventListener("touchend",e=>{

let diff=e.changedTouches[0].clientX-startX

if(Math.abs(diff)>100){

favorites[type]=favorites[type].filter(x=>x!==name)

}

})

/* SWIPE */

function enableSwipe(card){

let startX
let currentX=0

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.addEventListener("touchmove",e=>{
currentX=e.touches[0].clientX
const diff=currentX-startX
card.style.transition="transform 0s"
card.style.transform="translateX("+diff+"px) rotate("+(diff/12)+"deg)"
})

card.addEventListener("touchend",(e)=>{

if(e.changedTouches && Math.abs(e.changedTouches[0].clientX - startX) < 10){
  return
}

const diff=currentX-startX

card.style.transition="transform .35s ease"

if(diff>120){
card.style.transform="translateX(120vw) rotate(25deg)"
setTimeout(like,250)
}
else if(diff<-120){
card.style.transform="translateX(-120vw) rotate(-25deg)"
setTimeout(dislike,250)
}
else{
card.style.transform="translateX(0)"
}

})

}

function loadPlace(name){

return new Promise(resolve=>{

if(!name){
  resolve(fallback("restaurant"))
  return
}

// failsafe timeout (hindrer freeze)
let resolved = false

function safeResolve(data){
  if(!resolved){
    resolved = true
    resolve(data)
  }
}

let timeout = setTimeout(()=>{
  safeResolve(fallback(name))
},1500)

if(imageCache[name]){
  clearTimeout(timeout)
  resolve(imageCache[name])
  return
}

if(!placesService){
  setTimeout(()=>{
    loadPlace(name).then(resolve)
  },300)
  return
}

placesService.findPlaceFromQuery({
query: name + " Oslo",
fields: ["place_id"]
}, (results, status) => {

if(status !== google.maps.places.PlacesServiceStatus.OK || !results || !results[0]){
  clearTimeout(timeout)
  resolve(fallback(name))
  return
}

placesService.getDetails({
placeId: results[0].place_id,
fields: ["name","rating","photos"]
}, (place, status) => {

clearTimeout(timeout)

let photos = []

if(status === google.maps.places.PlacesServiceStatus.OK && place && place.photos){
  for(let i=0;i<Math.min(3,place.photos.length);i++){
    photos.push(place.photos[i].getUrl({maxWidth:1200}))
  }
}

// fallback bilder hvis Google feiler
while(photos.length < 3){
  photos.push("https://source.unsplash.com/featured/?restaurant")
}

let result = {
name: (place && place.name) || name,
rating: (place && place.rating) || "",
photos: photos
}

imageCache[name] = result

safeResolve(result)

})

})

})
}

function fallback(name){
return{
name:name,
rating:"",
photos:[
"https://source.unsplash.com/featured/?restaurant",
"https://source.unsplash.com/featured/?food",
"https://source.unsplash.com/featured/?wine"
]
}
}

function showReview(card, friendsList, placeName){

  let box = card.querySelector(".reviewBox")
  if(!box) return

  // reset events
  box.replaceWith(box.cloneNode(true))
  box = card.querySelector(".reviewBox")

  const validFriends = friendsList.filter(f => 
    f.reviews && f.reviews[placeName]
  )

  if(validFriends.length === 0) return

  let currentIndex = 0

  function render(){
    const f = validFriends[currentIndex]
    const review = f.reviews[placeName]

    box.innerHTML = `
      <div class="reviewHeader">
        <div class="name">${f.name}</div>
        <div class="dots">
          ${validFriends.map((_,i)=>
            `<span class="dot ${i===currentIndex?"active":""}"></span>`
          ).join("")}
        </div>
      </div>

      <div class="rating">Rating: ${review.rating}</div>
      <div class="text">${review.text}</div>
    `
  }

  // toggle
  if(!box.classList.contains("hidden")){
    box.classList.add("hidden")
    card.classList.remove("dimmed")
    return
  }

  render()

  box.classList.remove("hidden")
  card.classList.add("dimmed")

  // 🔥 TAP = neste review
  box.onclick = (e)=>{
    e.stopPropagation()

    currentIndex = (currentIndex + 1) % validFriends.length
    render()
  }

}
