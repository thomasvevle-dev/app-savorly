<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
display:flex;
flex-direction:column;
align-items:center;
color:white;
}

/* FAVORITTER BUTTON */

.fav-button{
margin-top:10px;
background:#222;
border:none;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
}

/* FAVORITTER SIDE */

#favorites-page{
display:none;
width:360px;
}

.favorite-item{
background:#222;
padding:14px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}

/* CARD */

#card-stack{
position:relative;
width:360px;
height:520px;
margin-top:10px;
}

.card{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
overflow:hidden;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* OVERLAY */

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:20px;
background:linear-gradient(transparent,rgba(0,0,0,0.8));
}

.place-name{
font-size:24px;
font-weight:bold;
}

.rating{
color:#FFD700;
margin-top:4px;
}

/* NAV / BOOK */

.bottom-buttons{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.small-btn{
background:#2196F3;
border:none;
padding:6px 12px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* SWIPE BUTTONS */

.x-btn{
position:absolute;
left:15px;
bottom:80px;
width:60px;
height:60px;
border-radius:50%;
border:none;
font-size:22px;
background:#ff4d4d;
cursor:pointer;
}

.like-btn{
position:absolute;
right:15px;
bottom:80px;
width:60px;
height:60px;
border-radius:50%;
border:none;
font-size:22px;
background:#4CAF50;
cursor:pointer;
}

</style>

</head>

<body>

<button class="fav-button" onclick="showFavorites()">⭐ Favoritter</button>

<div id="favorites-page"></div>

<div id="card-stack"></div>

<script>

const curatedPlaces=[
"Libertine",
"Territoriet",
"Skaal Matbar",
"F6 Cocktailbar",
"Bettola",
"Himkok",
"Svanen",
"Torggata Botaniske",
"Andre til Høyre",
"Nektar Vinbar",
"Radegast",
"Vinoteket",
"Fuglen",
"Arakataka",
"Le Benjamin",
"Hyde",
"Brasserie France"
]

let places=[]
let favorites=[]
let index=0

function initMap(){

const map=new google.maps.Map(document.createElement("div"))

const service=new google.maps.places.PlacesService(map)

curatedPlaces.forEach(name=>{

service.findPlaceFromQuery({

query:name+" oslo",
fields:["place_id"]

},(results,status)=>{

if(status!=="OK") return

service.getDetails({

placeId:results[0].place_id,
fields:["name","rating","photos"]

},(place,status)=>{

if(status!=="OK") return

if(!place.rating || place.rating<4) return

places.push(place)

renderCards()

})

})

})

}

function renderCards(){

const stack=document.getElementById("card-stack")

stack.innerHTML=""

places.slice(index,index+3).forEach((place,i)=>{

let photo="https://via.placeholder.com/400"

if(place.photos){
photo=place.photos[0].getUrl({maxWidth:600})
}

const card=document.createElement("div")

card.className="card"
card.style.zIndex=100-i

card.innerHTML=`

<img src="${photo}">

<div class="overlay">

<div class="place-name">${place.name}</div>
<div class="rating">⭐ ${place.rating}</div>

<div class="bottom-buttons">

<button class="small-btn nav">Naviger</button>
<button class="small-btn book">Book</button>

</div>

</div>

<button class="x-btn">❌</button>
<button class="like-btn">❤️</button>

`

card.querySelector(".nav").onclick=()=>{

window.open(\`https://www.google.com/maps/search/?api=1&query=\${place.name}\`)

}

card.querySelector(".book").onclick=()=>{

window.open(\`https://www.google.com/maps/search/?api=1&query=\${place.name}\`)

}

card.querySelector(".like-btn").onclick=()=>{

favorites.push(place)

updateFavorites()

card.remove()

next()

}

card.querySelector(".x-btn").onclick=()=>{

card.remove()

next()

}

stack.appendChild(card)

})

}

function next(){

index++

if(index>=places.length){
index=0
}

renderCards()

}

function updateFavorites(){

const list=document.getElementById("favorites-page")

list.innerHTML=""

favorites.forEach((place,i)=>{

let div=document.createElement("div")

div.className="favorite-item"

div.innerText=place.name

div.onclick=()=>{

index=i

document.getElementById("favorites-page").style.display="none"
document.getElementById("card-stack").style.display="block"

renderCards()

}

list.appendChild(div)

})

}

function showFavorites(){

document.getElementById("favorites-page").style.display="block"
document.getElementById("card-stack").style.display="none"

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places&callback=initMap"></script>

</body>
</html>
