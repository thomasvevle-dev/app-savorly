<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Savorly</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
font-family:-apple-system,BlinkMacSystemFont;
color:white;
}

/* HOME */

#home{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
overflow-y:auto;
display:flex;
flex-direction:column;
align-items:center;
padding-top:100px;
}

.logo{
width:200px;
margin-bottom:40px;
}

.cat{
width:80%;
max-width:420px;
padding:18px;
margin:10px;
border-radius:18px;
background:#111;
border:1px solid #333;
text-align:center;
font-size:22px;
}

.favoriteItem{
padding:14px;
margin:6px 0;
border-radius:14px;
background:#111;
border:1px solid #333;
}

.hidden{display:none}

/* DECK */

#deck{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:none;
justify-content:center;
align-items:center;
}

.card{
position:absolute;
width:94%;
height:92%;
border-radius:28px;
overflow:hidden;
background:black;
touch-action:none;
transition:transform .35s ease;
}

.card.next{
transform:scale(.96) translateY(12px);
opacity:.6;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.gradient{
position:absolute;
left:0;
right:0;
bottom:0;
height:35%;
background:linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.3),rgba(0,0,0,0));
}

.info{
position:absolute;
bottom:150px;
left:24px;
}

.name{
font-family:'Playfair Display';
font-size:34px;
}

.rating{
color:#E6C27A;
}

/* BUTTONS */

.buttons{
position:absolute;
bottom:30px;
left:20px;
right:20px;
display:flex;
justify-content:space-around;
background:rgba(255,255,255,.15);
border-radius:24px;
padding:16px 10px;
}

.buttons div{
background:white;
border-radius:14px;
padding:12px 16px;
font-size:26px;
color:black;
}

.topLeft,.topRight{
position:absolute;
top:20px;
font-size:24px;
background:white;
color:black;
padding:10px 12px;
border-radius:12px;
}

.topLeft{ left:20px }
.topRight{ right:20px }

</style>

</head>

<body>

<div id="home">

<img src="logo.png" class="logo">

<div class="cat" onclick="openCategory('restaurants')">Restaurant</div>
<div class="cat" onclick="openCategory('winebars')">Vinbar</div>
<div class="cat" onclick="openCategory('cocktailbars')">Cocktailbar</div>

<div style="margin-top:40px;width:80%;max-width:420px">

<div class="cat" onclick="toggleFav('restaurants')">Favoritt restaurant</div>
<div id="fav-restaurants" class="hidden"></div>

<div class="cat" onclick="toggleFav('winebars')">Favoritt vinbar</div>
<div id="fav-winebars" class="hidden"></div>

<div class="cat" onclick="toggleFav('cocktailbars')">Favoritt cocktailbar</div>
<div id="fav-cocktailbars" class="hidden"></div>

</div>

</div>

<div id="deck"></div>

<script>

/* SAMPLE DATA */

const data={
restaurants:[
{
name:"Stallen",
rating:"4.6",
photos:[
"https://source.unsplash.com/featured/?restaurant",
"https://source.unsplash.com/featured/?fine-dining",
"https://source.unsplash.com/featured/?food"
]
}
],
winebars:[
{
name:"Territoriet",
rating:"4.6",
photos:[
"https://source.unsplash.com/featured/?winebar",
"https://source.unsplash.com/featured/?wine",
"https://source.unsplash.com/featured/?bar"
]
}
],
cocktailbars:[
{
name:"Himkok",
rating:"4.7",
photos:[
"https://source.unsplash.com/featured/?cocktail",
"https://source.unsplash.com/featured/?cocktail-bar",
"https://source.unsplash.com/featured/?mixology"
]
}
]
}

let list=[]
let index=0
let history=[]
let currentType=""

let favorites={
restaurants:[],
winebars:[],
cocktailbars:[]
}

const deck=document.getElementById("deck")

/* CATEGORY */

function openCategory(type){

currentType=type
list=[...data[type]]

index=0

document.getElementById("home").style.display="none"
deck.style.display="flex"

renderDeck()

}

/* DECK */

function renderDeck(){

deck.innerHTML=""

createCard(list[index],false)

if(list[index+1]){
createCard(list[index+1],true)
}

}

/* CARD */

function createCard(place,isNext){

const card=document.createElement("div")
card.className="card"

if(isNext) card.classList.add("next")

card.innerHTML=`

<img src="${place.photos[0]}">

<div class="gradient"></div>

<div class="topLeft">←</div>
<div class="topRight">↺</div>

<div class="info">
<div class="name">${place.name}</div>
<div class="rating">⭐ ${place.rating}</div>
</div>

<div class="buttons">
<div onclick="dislike(event)">✕</div>
<div onclick="navigate('${place.name}',event)">📍</div>
<div onclick="book('${place.name}',event)">📅</div>
<div onclick="like(event)">♥</div>
</div>

`

deck.appendChild(card)

card.dataset.photos=JSON.stringify(place.photos)
card.dataset.index=0

enableSwipe(card)
enablePhotoNav(card)

card.querySelector(".topLeft").onclick=goHome
card.querySelector(".topRight").onclick=undo

}

/* PHOTO NAV */

function enablePhotoNav(card){

card.addEventListener("click",e=>{

if(e.target.closest(".buttons")) return

const rect=card.getBoundingClientRect()

const x=e.clientX-rect.left

const photos=JSON.parse(card.dataset.photos)

let i=parseInt(card.dataset.index)

if(x<rect.width/2){
i=(i-1+photos.length)%photos.length
}else{
i=(i+1)%photos.length
}

card.dataset.index=i
card.querySelector("img").src=photos[i]

})

}

/* SWIPE */

function enableSwipe(card){

let startX=0
let currentX=0
let dragging=false

card.addEventListener("pointerdown",e=>{
if(e.target.closest(".buttons")) return
dragging=true
startX=e.clientX
})

card.addEventListener("pointermove",e=>{

if(!dragging) return

currentX=e.clientX

const diff=currentX-startX

card.style.transition="none"
card.style.transform=`translateX(${diff}px) rotate(${diff/12}deg)`

})

card.addEventListener("pointerup",()=>{

if(!dragging) return
dragging=false

const diff=currentX-startX

card.style.transition="transform .35s ease"

if(diff>120){
card.style.transform="translateX(120vw)"
setTimeout(nextLike,200)
return
}

if(diff<-120){
card.style.transform="translateX(-120vw)"
setTimeout(nextDislike,200)
return
}

card.style.transform="translateX(0)"

})

}

/* ACTIONS */

function like(e){
if(e) e.stopPropagation()

let place=list[index]

if(!favorites[currentType].includes(place)){
favorites[currentType].push(place)
renderFavorites()
}

document.querySelector(".card").style.transform="translateX(120vw)"

setTimeout(nextLike,200)

}

function dislike(e){
if(e) e.stopPropagation()

document.querySelector(".card").style.transform="translateX(-120vw)"

setTimeout(nextDislike,200)

}

function nextLike(){
history.push(index)
index++
renderDeck()
}

function nextDislike(){
history.push(index)
index++
renderDeck()
}

function undo(){

if(history.length===0) return

index=history.pop()

renderDeck()

}

/* NAV */

function navigate(name,e){
e.stopPropagation()
window.open("https://maps.google.com/?q="+encodeURIComponent(name))
}

function book(name,e){
e.stopPropagation()
window.open("https://google.com/search?q="+encodeURIComponent(name+" booking"))
}

/* HOME */

function goHome(){
deck.style.display="none"
document.getElementById("home").style.display="flex"
}

/* FAVORITES */

function toggleFav(type){
document.getElementById("fav-"+type).classList.toggle("hidden")
}

function renderFavorites(){

["restaurants","winebars","cocktailbars"].forEach(type=>{

const box=document.getElementById("fav-"+type)
box.innerHTML=""

favorites[type].forEach(place=>{

const el=document.createElement("div")
el.className="favoriteItem"
el.innerText=place.name

enableFavSwipe(el,type,place)

box.appendChild(el)

})

})

}

function enableFavSwipe(el,type,place){

let startX

el.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

el.addEventListener("touchend",e=>{

let diff=e.changedTouches[0].clientX-startX

if(diff<-100){

favorites[type]=favorites[type].filter(x=>x!==place)

renderFavorites()

}

})

}

</script>

</body>
</html>
