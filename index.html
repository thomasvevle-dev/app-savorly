<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savorly</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

/* hidden map */
#map{
width:1px;
height:1px;
opacity:0;
}

/* start */

#start{
margin-top:120px;
text-align:center;
}

.category{
background:#333;
padding:18px 26px;
border-radius:20px;
margin:10px;
cursor:pointer;
font-size:18px;
}

.category:hover{
background:#4CAF50;
}

/* card */

#card{
width:360px;
height:560px;
border-radius:20px;
overflow:hidden;
position:relative;
display:none;
}

#card img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:100px;
left:20px;
}

.name{
font-size:26px;
font-weight:bold;
}

.rating{
color:#FFD700;
}

/* buttons */

.buttons{
position:absolute;
bottom:20px;
width:100%;
display:flex;
justify-content:space-evenly;
}

button{
width:55px;
height:55px;
border-radius:50%;
border:none;
font-size:20px;
background:#333;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="start">

<h2>Hva vil du utforske?</h2>

<div class="category" onclick="loadCategory('restaurant')">Restaurant</div>
<div class="category" onclick="loadCategory('wine')">Vinbar</div>
<div class="category" onclick="loadCategory('cocktail')">Cocktailbar</div>

</div>

<div id="card">

<img id="photo">

<div class="overlay">

<div class="name" id="name"></div>
<div class="rating" id="rating"></div>

</div>

<div class="buttons">

<button onclick="next()">❌</button>
<button onclick="maps()">📍</button>
<button onclick="maps()">📅</button>
<button onclick="next()">❤️</button>

</div>

</div>

<script>

const restaurants=[
"Libertine",
"Skaal Matbar",
"Arakataka",
"Le Benjamin",
"Kolonialen"
]

const wineBars=[
"Territoriet",
"Nektar Vinbar",
"Radegast"
]

const cocktailBars=[
"Himkok",
"Bettola",
"Svanen"
]

let service
let places=[]
let index=0
let photos=[]
let photoIndex=0

function initMap(){

const map=new google.maps.Map(
document.getElementById("map"),
{center:{lat:59.91,lng:10.75},zoom:13}
)

service=new google.maps.places.PlacesService(map)

}

function loadCategory(type){

let list=[]

if(type==="restaurant") list=restaurants
if(type==="wine") list=wineBars
if(type==="cocktail") list=cocktailBars

places=[]
index=0

let loaded=0

list.forEach(name=>{

service.findPlaceFromQuery({

query:name+" oslo",
fields:["name","rating","photos"]

},(results,status)=>{

loaded++

if(status==="OK"){

places.push(results[0])

}

if(loaded===list.length){

document.getElementById("start").style.display="none"
document.getElementById("card").style.display="block"

show()

}

})

})

}

function show(){

let p=places[index]

document.getElementById("name").innerText=p.name
document.getElementById("rating").innerText="⭐ "+(p.rating||"")

photos=[]

if(p.photos){

for(let i=0;i<3 && i<p.photos.length;i++){

photos.push(p.photos[i].getUrl({maxWidth:800}))

}

}

photoIndex=0

document.getElementById("photo").src=photos[0]

}

document.getElementById("photo").onclick=function(){

photoIndex++

if(photoIndex>=photos.length) photoIndex=0

document.getElementById("photo").src=photos[photoIndex]

}

function next(){

index++

if(index>=places.length) index=0

show()

}

function maps(){

let p=places[index]

window.open("https://maps.google.com/?q="+p.name)

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places&callback=initMap"></script>

</body>
</html>
