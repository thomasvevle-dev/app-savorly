<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Savorly</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#000;
color:white;
}

#home{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
overflow-y:auto;
padding-top:100px;
display:flex;
flex-direction:column;
align-items:center;
}

.logo{
width:220px;
margin-bottom:30px;
}

.cat{
width:80%;
max-width:420px;
padding:18px;
margin:10px;
border-radius:20px;
background:#111;
border:1px solid #333;
text-align:center;
font-size:22px;
cursor:pointer;
opacity:.5;
}

.cat.active{
opacity:1;
}

.favoriteItem{
padding:14px;
margin:6px 0;
border-radius:14px;
background:#111;
border:1px solid #333;
}

.hidden{display:none}

#deck{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:none;
justify-content:center;
align-items:center;
}

.card{
position:absolute;
width:95%;
height:92%;
border-radius:26px;
overflow:hidden;
background:black;
transition:transform .35s ease;
z-index:2;
}

.card.next{
transform:scale(.96) translateY(10px);
opacity:.55;
z-index:1;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.card::after{
content:"";
position:absolute;
left:0;
right:0;
bottom:0;
top:65%;

background:linear-gradient(
to bottom,
rgba(0,0,0,0) 0%,
rgba(0,0,0,0.35) 40%,
rgba(0,0,0,0.65) 70%,
rgba(0,0,0,0.9) 100%
);

pointer-events:none;
}

.photoDots{
position:absolute;
top:16px;
left:0;
right:0;
text-align:center;
}

.dot{
display:inline-block;
width:26px;
height:4px;
margin:3px;
border-radius:10px;
background:rgba(255,255,255,.4);
}

.dot.active{
background:white;
}

.topLeft,
.topRight{
position:absolute;
top:24px;
font-size:24px;
color:black;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(12px);
border-radius:14px;
padding:10px 12px;
}

.topLeft{ left:20px; }
.topRight{ right:20px; }

.info{
position:absolute;
bottom:180px;
left:24px;
}

.name{
font-family:'Playfair Display', serif;
font-size:36px;
font-weight:500;
}

.rating{
font-size:18px;
color:#E6C27A;
}

.buttons{
position:absolute;
bottom:30px;
left:20px;
right:20px;

display:flex;
justify-content:space-around;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);

border-radius:26px;
padding:18px 10px;

border:1px solid rgba(255,255,255,0.25);
}

.buttons div{
background:rgba(255,255,255,0.85);
border-radius:16px;
padding:14px 18px;
font-size:28px;
color:black;
cursor:pointer;
}

</style>
</head>

<body>

<div id="home">

<img src="logo.png" class="logo">

<div class="cat" id="cat-restaurants">Restaurant</div>
<div class="cat" id="cat-winebars">Vinbar</div>
<div class="cat" id="cat-cocktailbars">Cocktailbar</div>

<div style="margin-top:40px;width:80%;max-width:420px">

<div class="cat" onclick="toggleFav('restaurants')">Favoritt restaurant</div>
<div id="fav-restaurants" class="hidden"></div>

<div class="cat" onclick="toggleFav('winebars')">Favoritt vinbar</div>
<div id="fav-winebars" class="hidden"></div>

<div class="cat" onclick="toggleFav('cocktailbars')">Favoritt cocktailbar</div>
<div id="fav-cocktailbars" class="hidden"></div>

</div>

</div>

<div id="deck"></div>
<div id="map" style="display:none"></div>

<script>

let data
let list=[]
let index=0
let history=[]
let currentType=""
let placesService
let imageCache={}

const deck=document.getElementById("deck")

let favorites={
restaurants:JSON.parse(localStorage.getItem("fav-restaurants")||"[]"),
winebars:JSON.parse(localStorage.getItem("fav-winebars")||"[]"),
cocktailbars:JSON.parse(localStorage.getItem("fav-cocktailbars")||"[]")
}

async function loadData(){

const res=await fetch("data/places.json")
data=await res.json()

activateCategories()

renderFavorites()

}

loadData()

function activateCategories(){

document.querySelectorAll(".cat").forEach(el=>{
el.classList.add("active")
})

document.getElementById("cat-restaurants").onclick=()=>openCategory("restaurants")
document.getElementById("cat-winebars").onclick=()=>openCategory("winebars")
document.getElementById("cat-cocktailbars").onclick=()=>openCategory("cocktailbars")

}

function initMap(){
const map=new google.maps.Map(document.getElementById("map"),{
center:{lat:59.91,lng:10.75},
zoom:13
})
placesService=new google.maps.places.PlacesService(map)
}

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5)
}

function openCategory(type){

if(!data) return

currentType=type
list=[...data[type]]

shuffle(list)

index=0

document.getElementById("home").style.display="none"
deck.style.display="flex"

preloadNext()
buildDeck()

}

function buildDeck(){

deck.innerHTML=""

if(index>=list.length){
shuffle(list)
index=0
}

createCard(list[index],false)

if(list[index+1]){
createCard(list[index+1],true)
}

}

function createCard(name,isNext){

const card=document.createElement("div")
card.className="card"

if(isNext) card.classList.add("next")

card.innerHTML=`

<img id="photo" src="https://source.unsplash.com/featured/?restaurant">

<div class="photoDots">
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

<div class="topLeft">←</div>
<div class="topRight">↺</div>

<div class="info">
<div class="name">${name}</div>
<div class="rating">⭐</div>
</div>

<div class="buttons">
<div onclick="dislike()">✕</div>
<div onclick="navigate('${name}')">📍</div>
<div onclick="book('${name}')">📅</div>
<div onclick="like()">♥</div>
</div>

`

deck.appendChild(card)

card.querySelector(".topLeft").onclick=goHome
card.querySelector(".topRight").onclick=undo

enableSwipe(card)

loadPlace(name).then(place=>{

let photos=place.photos
let photoIndex=0

const img=card.querySelector("#photo")

img.src=photos[0]

card.querySelector(".name").innerText=place.name
card.querySelector(".rating").innerText="⭐ "+(place.rating||"")+" · Google"

card.addEventListener("click",e=>{

if(e.target.classList.contains("topLeft")||e.target.classList.contains("topRight")) return

photoIndex=(photoIndex+1)%photos.length
img.src=photos[photoIndex]

const dots=card.querySelectorAll(".dot")
dots.forEach((d,i)=>d.classList.toggle("active",i===photoIndex))

})

})

}

function preloadNext(){

for(let i=1;i<=5;i++){

const next=list[index+i]

if(next && !imageCache[next]){
loadPlace(next)
}

}

}

function enableSwipe(card){

let startX
let currentX=0

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.addEventListener("touchmove",e=>{

currentX=e.touches[0].clientX
const diff=currentX-startX

card.style.transition="none"
card.style.transform="translateX("+diff+"px) rotate("+(diff/12)+"deg)"

})

card.addEventListener("touchend",()=>{

const diff=currentX-startX

card.style.transition="transform .35s ease"

if(diff>120){

card.style.transform="translateX(120vw) rotate(25deg)"
setTimeout(like,250)

}

else if(diff<-120){

card.style.transform="translateX(-120vw) rotate(-25deg)"
setTimeout(dislike,250)

}

else{

card.style.transform="translateX(0px) rotate(0deg)"

}

})

}

function loadPlace(name){

return new Promise(resolve=>{

if(imageCache[name]){
resolve(imageCache[name])
return
}

placesService.findPlaceFromQuery({
query:name+" Oslo",
fields:["place_id"]
},(results,status)=>{

if(status!==google.maps.places.PlacesServiceStatus.OK){
resolve(fallback(name))
return
}

placesService.getDetails({
placeId:results[0].place_id,
fields:["name","rating","photos"]
},(place,status)=>{

let photos=[]

if(status===google.maps.places.PlacesServiceStatus.OK && place.photos){

for(let i=0;i<Math.min(3,place.photos.length);i++){
photos.push(place.photos[i].getUrl({maxWidth:1200}))
}

}

while(photos.length<3){
photos.push("https://source.unsplash.com/featured/?restaurant")
}

let result={
name:place?.name||name,
rating:place?.rating||"",
photos:photos
}

imageCache[name]=result

resolve(result)

})

})

})

}

function like(){

let name=list[index]

if(!favorites[currentType].includes(name)){

favorites[currentType].push(name)
localStorage.setItem("fav-"+currentType,JSON.stringify(favorites[currentType]))

renderFavorites()

}

next()

}

function dislike(){next()}

function next(){

history.push(index)

index++

buildDeck()

}

function undo(){

if(history.length===0)return

index=history.pop()
buildDeck()

}

function goHome(){

deck.style.display="none"
document.getElementById("home").style.display="flex"

}

function toggleFav(type){
document.getElementById("fav-"+type).classList.toggle("hidden")
}

function renderFavorites(){

["restaurants","winebars","cocktailbars"].forEach(type=>{

const box=document.getElementById("fav-"+type)
box.innerHTML=""

favorites[type].forEach(name=>{

const el=document.createElement("div")
el.className="favoriteItem"
el.innerText=name

el.onclick=()=>openFavorite(type,name)

enableFavSwipe(el,type,name)

box.appendChild(el)

})

})

}

function openFavorite(type,name){

currentType=type
list=[...data[type]]

index=list.indexOf(name)

document.getElementById("home").style.display="none"
deck.style.display="flex"

buildDeck()

}

function enableFavSwipe(el,type,name){

let startX

el.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

el.addEventListener("touchend",e=>{

let diff=e.changedTouches[0].clientX-startX

if(Math.abs(diff)>100){

favorites[type]=favorites[type].filter(x=>x!==name)
localStorage.setItem("fav-"+type,JSON.stringify(favorites[type]))

renderFavorites()

}

})

}

function navigate(name){
window.open("https://maps.google.com/?q="+encodeURIComponent(name+" Oslo"))
}

function book(name){
window.open("https://www.google.com/search?q="+encodeURIComponent(name+" booking"))
}

function fallback(name){
return{
name:name,
rating:"",
photos:[
"https://source.unsplash.com/featured/?restaurant",
"https://source.unsplash.com/featured/?food",
"https://source.unsplash.com/featured/?wine"
]
}
}

</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places&callback=initMap">
</script>

</body>
</html>
