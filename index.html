<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" href="icon-192.png">
  
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<meta name="apple-mobile-web-app-status-bar-style" content="black">

<title>Savorly</title>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:-apple-system,BlinkMacSystemFont;
}

/* HOME */

#home{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
overflow-y:auto;
display:flex;
flex-direction:column;
align-items:center;
padding-top:70px;
z-index:20;
}

.logo{
width:170px;
margin-bottom:30px;
}

.cat{
width:85%;
max-width:420px;
padding:16px;
margin:8px;
border-radius:18px;
background:#111;
border:1px solid rgba(255,255,255,0.18);
text-align:center;
font-size:20px;
}

.favoriteItem{
padding:12px;
margin:6px 0;
border-radius:14px;
background:#111;
border:1px solid #333;
}

.hidden{display:none}

/* CARD STACK */

#deck{
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:10;
  pointer-events:none;  
}

.card{
overflow:visible;
position:absolute;
z-index:1;
width:95%;
height:92%;
border-radius:26px;
overflow:hidden;
background:black;
transition: transform .25s ease-out;
will-change: transform;
transform: translateZ(0);
}

.card.next{
transform:scale(.96) translateY(10px);
opacity:.6;
z-index:-1;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

/* GRADIENT BACK TEXT */

.card::before{
content:"";
position:absolute;
left:0;
right:0;
bottom:140px;
height:160px;
background:linear-gradient(
to bottom,
rgba(0,0,0,0),
rgba(0,0,0,0.45)
);
pointer-events:none;
}

/* GRADIENT BOTTOM */

.card::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:35%;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0),
    rgba(0,0,0,0.4),
    rgba(0,0,0,0.7),
    rgba(0,0,0,0.95)
  );
  pointer-events:none;
  z-index:1;
}

/* DOTS */

.photoDots{
position:absolute;
top:16px;
left:0;
right:0;
text-align:center;
}

.dot{
display:inline-block;
width:26px;
height:4px;
margin:3px;
border-radius:10px;
background:rgba(255,255,255,.4);
}

.dot.active{background:white}

/* TOP BUTTONS */

.topLeft,.topRight{
position:absolute;
top:24px;
font-size:24px;
color:black;
background:rgba(255,255,255,.9);
border-radius:14px;
padding:10px 12px;
}

.topLeft{left:20px}
.topRight{right:20px}

/* INFO */

.info{
  position:absolute;
  bottom:200px;
  left:24px;
  right:24px;
  z-index:10;
}

.name{
font-family:'Playfair Display', serif;
font-size:34px;
text-shadow:0 2px 8px rgba(0,0,0,0.8);
}

.vibe{
  pointer-events:auto;
  margin-top:8px;
  display:block;
  position:relative;
  z-index:5;
  font-size:13px;
  color:#ddd;
  opacity:.9;
  margin-top:6px;
  letter-spacing:.5px;
  text-transform:capitalize;
  text-shadow:0 2px 6px rgba(0,0,0,0.8);
}

.chip{
  display:inline-block;
  padding:6px 12px;
  margin:4px 6px 0 0;
  font-size:12px;
  border-radius:999px;
  background:rgba(255,255,255,0.2);
  color:white;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.3);
  font-weight:500;
}

.chip.active{
  background:white;
  color:black;
  border:1px solid white;
}
  
/* ACTION BAR */

.buttons{
  position:absolute;
  bottom:20px;
  left:20px;
  right:20px;
  display:flex;
  justify-content:space-around;
  background:rgba(0,0,0,.55);
  border-radius:26px;
  padding:18px 10px;
  z-index:999;  
}

.buttons div{
background:rgba(255,255,255,.9);
border-radius:16px;
padding:14px 18px;
font-size:28px;
color:black;
z-index:10;
position:relative;
touch-action: manipulation;
}

.friends{
  font-size:14px;
  margin-top:6px;
  color:#7dd3fc;
  text-shadow:0 2px 6px rgba(0,0,0,0.8);

.modal{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:100;
}

.modalContent{
  background:#111;
  padding:20px;
  border-radius:20px;
  width:85%;
  max-width:400px;
}

.modalItem{
  padding:12px;
  border-bottom:1px solid #333;
  font-size:16px;
}

.hidden{
  display:none;
}

 .sheet{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:flex;
  justify-content:center;
  align-items:flex-end;
  z-index:100;
}

.sheetContent{
  width:100%;
  max-width:500px;
  background:#111;
  border-top-left-radius:24px;
  border-top-right-radius:24px;
  padding:20px;
  animation:slideUp .25s ease;
}

@keyframes slideUp{
  from{transform:translateY(100%)}
  to{transform:translateY(0)}
}

.sheetItem{
  padding:14px;
  border-bottom:1px solid #222;
  font-size:16px;
}

.sheetHandle{
  width:40px;
  height:4px;
  background:#555;
  border-radius:10px;
  margin:0 auto 12px;
} 


</style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="cat" onclick="openCategory('restaurants')">Restaurant</div>
<div class="cat" onclick="openCategory('winebars')">Vinbar</div>

</div>

</div>

<div id="deck"></div>
<div id="map" style="display:none"></div>

<script>

let data
let list=[]
let index=0
let history=[]
let currentType=""
let placesService
let imageCache={}

const friends = [

  {

  },

  },

  {

  },

  {
    name: "Thomas Gundersen",
    likes: ["Himkok","Bettola","Svanen","Torggata Botaniske","Chair"]
  },

  {

  },

  {

  },

  // 🔥 NYE VENNER FOR DEKNING

  {
    name: "Andreas Haugen",
    likes: ["Alex Sushi","Nodee","Ling Ling","Südøst","Savage"]
  },

  {
    name: "Camilla Strand",
    likes: ["Kolonihagen","Le Benjamin","Vintage Kitchen","Territoriet"]
  },

  {
    name: "Daniel Sørensen",
    likes: ["Himkok","F6","Chair","Posthallen Drinkhub","Bettola"]
  },

  {
    name: "Helene Berg",
    likes: ["Maaemo","Kontrast","Smia Galleri","Stallen"]
  },

  {
    name: "Magnus Lie",
    likes: ["Kverneriet","Tilt Bar","Angst Bar","Fuglen","Pier 42"]
  }

]
let activeVibe = null

function setVibe(v){
  activeVibe = v

  list = data[currentType].filter(item =>
    item.vibe && item.vibe.includes(v)
  )

  index = 0
  buildDeck()
}

let favorites={
restaurants:JSON.parse(localStorage.getItem("fav-restaurants")||"[]"),
winebars:JSON.parse(localStorage.getItem("fav-winebars")||"[]"),
cocktailbars:JSON.parse(localStorage.getItem("fav-cocktailbars")||"[]")
}

const deck=document.getElementById("deck")

async function loadData(){
const res=await fetch("data/places.json")
data=await res.json()
renderFavorites()
}
loadData()

function initMap(){
const map=new google.maps.Map(document.getElementById("map"),{
center:{lat:59.91,lng:10.75},
zoom:13
})
placesService=new google.maps.places.PlacesService(map)
}

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5)
}

function getFriendsWhoLike(placeName){
  return friends.filter(f => f.likes.includes(placeName))
}
  
function openCategory(type){

  currentType = type
  activeVibe = null

  list = (data[type] || [])

  index = 0

  document.getElementById("home").style.display="none"

  deck.style.display="flex"
  deck.style.pointerEvents="auto"

  buildDeck()
}

function openFavorite(type,name){

currentType = type
list = (data[type] || []).filter(item => item && item.name)

index = list.findIndex(item => item.name === name)
if(index === -1) index = 0

document.getElementById("home").style.display="none"
deck.style.display="flex"
deck.style.pointerEvents="auto"

buildDeck()
}

function buildDeck(){

  deck.innerHTML = ""

  if(!list || list.length === 0) return

  if(index >= list.length){
    index = 0
  }

  if(!list[index]){
    index = 0
  }

  const current = list[index]
  const nextItem = list[index + 1]

  if(current){
    createCard(current, false)
  }

  if(nextItem){
    createCard(nextItem, true)
  }

  for(let i = 1; i <= 2; i++){
    const next = list[index + i]
  if(next && next.name && !imageCache[next.name]){
loadPlace(next.name)
}
  }

}

function createCard(item,isNext){

  if(!item || !item.name) return
  let name = item.name

  const card = document.createElement("div")
  card.className = "card"
  if(isNext) card.classList.add("next")

  card.innerHTML = `
    <img id="photo" src="https://source.unsplash.com/featured/?restaurant">

    <div class="photoDots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div class="topLeft">←</div>
    <div class="topRight">↺</div>

    <div class="info">
      <div class="name">${name}</div>
      <div class="rating"></div>
      <div class="vibe"></div>
      <div class="friends"></div>
    </div>

    <div class="buttons">
      <div class="btn-dislike">✕</div>
      <div class="btn-map">📍</div>
      <div class="btn-book">📅</div>
      <div class="btn-like">♥</div>
    </div>
  `

  deck.appendChild(card)

  // NAV
  card.querySelector(".topLeft").onclick = goHome

  card.querySelector(".topRight").onclick = (e)=>{
    e.stopPropagation()
    undo()
  }

  // BUTTONS
  card.querySelector(".buttons").addEventListener("click", e=>{
    const btn = e.target.closest("div")
    if(!btn) return

    e.stopPropagation()

    if(btn.classList.contains("btn-like")) likeFromButton()
    if(btn.classList.contains("btn-dislike")) dislikeFromButton()
    if(btn.classList.contains("btn-map")) navigate(name)
    if(btn.classList.contains("btn-book")) book(item)
  })

  enableSwipe(card)

  loadPlace(name).then(place=>{

    if(!card.isConnected) return

    let photos = place.photos
    let photoIndex = 0

    const img = card.querySelector("#photo")
    img.src = photos[0]

    card.querySelector(".name").innerText = place.name
    card.querySelector(".rating").innerText = "⭐ " + place.rating

    // FRIENDS (REN)
   const friendsEl = card.querySelector(".friends")

const matchedFriends = getFriendsWhoLike(place.name || name)

if(matchedFriends.length > 0){

  friendsEl.innerText =
    "❤️ " + matchedFriends.length + " venner liker dette"

  friendsEl.style.cursor = "pointer"

  friendsEl.onclick = (e)=>{
    e.stopPropagation()
    openFriendsSheet(matchedFriends)
  }

}

    // VIBE (CHIPS)
    const vibeEl = card.querySelector(".vibe")
    vibeEl.innerHTML = ""

    if(item.vibe){
      item.vibe.forEach(v => {
        const chip = document.createElement("span")
        chip.className = "chip"
        chip.innerText = v

        if(activeVibe === v){
          chip.classList.add("active")
        }

        chip.onclick = (e)=>{
          e.stopPropagation()
          setVibe(v)
        }

        vibeEl.appendChild(chip)
      })
    }

    // TAP
    let tapStartX = 0
    let tapStartTime = 0

    card.addEventListener("touchstart", e=>{
      tapStartX = e.touches[0].clientX
      tapStartTime = Date.now()
    })

    card.addEventListener("touchend", e=>{

      if(e.target.closest(".buttons") || e.target.closest(".chip")) return

      let diffX = Math.abs(e.changedTouches[0].clientX - tapStartX)
      let time = Date.now() - tapStartTime

      if(diffX < 15 && time < 250){

        const rect = card.getBoundingClientRect()
        const x = e.changedTouches[0].clientX - rect.left

        if(x > rect.width / 2){
          photoIndex = (photoIndex + 1) % photos.length
        } else {
          photoIndex = (photoIndex - 1 + photos.length) % photos.length
        }

        img.src = photos[photoIndex]

        const dots = card.querySelectorAll(".dot")
        dots.forEach((d,i)=>d.classList.toggle("active", i === photoIndex))
      }

    })

  })

}

function openFriendsModal(friends){
  const modal = document.getElementById("friendsModal")
  const content = document.getElementById("modalContent")

  content.innerHTML = ""

  friends.forEach(f => {
    const div = document.createElement("div")
    div.className = "modalItem"
    div.innerText = f.name
    content.appendChild(div)
  })

  modal.classList.remove("hidden")

  modal.onclick = () => {
    modal.classList.add("hidden")
  }
}

function openFriendsSheet(friends){

  const sheet = document.getElementById("friendsSheet")
  const content = document.getElementById("sheetContent")

  content.innerHTML = ""

  // handle (den lille streken)
  const handle = document.createElement("div")
  handle.className = "sheetHandle"
  content.appendChild(handle)

  friends.forEach(f => {
    const div = document.createElement("div")
    div.className = "sheetItem"
    div.innerText = f.name
    content.appendChild(div)
  })

  sheet.classList.remove("hidden")

  // lukke ved trykk utenfor
  sheet.onclick = () => {
    sheet.classList.add("hidden")
  }

  // ikke lukke når du trykker inni
  content.onclick = (e)=>{
    e.stopPropagation()
  }
}  
  
/* FAVORITES */

function renderFavorites(){

["restaurants","winebars","cocktailbars"].forEach(type=>{

const box=document.getElementById("fav-"+type)
box.innerHTML=""

favorites[type].forEach(name=>{

const el=document.createElement("div")
el.className="favoriteItem"
el.innerText=name

el.onclick=()=>openFavorite(type,name)

enableFavSwipe(el,type,name)

box.appendChild(el)

})

})

}


/* FAVORITES */

function toggleFav(type){
document.getElementById("fav-"+type).classList.toggle("hidden")
}

function enableFavSwipe(el,type,name){

let startX

el.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

el.addEventListener("touchend",e=>{

let diff=e.changedTouches[0].clientX-startX

if(Math.abs(diff)>100){

favorites[type]=favorites[type].filter(x=>x!==name)

localStorage.setItem("fav-"+type,JSON.stringify(favorites[type]))

renderFavorites()

}

})

}

/* BUTTON SWIPE */

function likeFromButton(){

const card=document.querySelector(".card")

card.style.transform="translateX(120vw) rotate(25deg)"

setTimeout(()=>like(),300)

}

function dislikeFromButton(){

const card=document.querySelector(".card")

card.style.transform="translateX(-120vw) rotate(-25deg)"

setTimeout(()=>dislike(),300)

}

/* SWIPE */

function enableSwipe(card){

let startX
let currentX=0

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.addEventListener("touchmove",e=>{
currentX=e.touches[0].clientX
const diff=currentX-startX
card.style.transition="transform 0s"
card.style.transform="translateX("+diff+"px) rotate("+(diff/12)+"deg)"
})

card.addEventListener("touchend",(e)=>{

if(e.changedTouches && Math.abs(e.changedTouches[0].clientX - startX) < 10){
  return
}

const diff=currentX-startX

card.style.transition="transform .35s ease"

if(diff>120){
card.style.transform="translateX(120vw) rotate(25deg)"
setTimeout(like,250)
}
else if(diff<-120){
card.style.transform="translateX(-120vw) rotate(-25deg)"
setTimeout(dislike,250)
}
else{
card.style.transform="translateX(0)"
}

})

}

/* LOGIC */

/* LOGIC */

function like(){

let name = list[index].name

console.log("LIKE:", list[index]?.name)  

if(!favorites[currentType].includes(name)){
favorites[currentType].push(name)
localStorage.setItem("fav-"+currentType,JSON.stringify(favorites[currentType]))
renderFavorites()
}

next()

}

function dislike(){
next()
}

function next(){

history.push(index)

index++

if(index >= list.length){
  shuffle(list)
  index = 0
}

buildDeck()

}

function undo(){

if(history.length === 0) return

index = history.pop()
buildDeck()

}


function goHome(){

  deck.innerHTML = ""
  deck.style.display = "none"

  deck.style.pointerEvents = "none"

  document.getElementById("home").style.display = "flex"
}

function navigate(name){

const query = encodeURIComponent(name + " Oslo")
const url = "https://maps.google.com/?q=" + query

const a = document.createElement("a")
a.href = url
a.target = "_blank"
a.rel = "noopener noreferrer"

document.body.appendChild(a)
a.click()
document.body.removeChild(a)

}

function book(item){

  let url

  // 1. Har egen booking-link
  if(item.booking){
    url = item.booking
  } 
  // 2. Fallback → Google
  else {
    const query = encodeURIComponent(item.name + " Oslo booking")
    url = "https://www.google.com/search?q=" + query
  }
  
  console.log("BOOK:", item.name)
  
  // 🔥 beholder din mobile-safe open
  const a = document.createElement("a")
  a.href = url
  a.target = "_blank"
  a.rel = "noopener noreferrer"

  document.body.appendChild(a)
  a.click()
  document.body.removeChild(a)
}

function loadPlace(name){

return new Promise(resolve=>{

if(!name){
  resolve(fallback("restaurant"))
  return
}

// failsafe timeout (hindrer freeze)
let resolved = false

function safeResolve(data){
  if(!resolved){
    resolved = true
    resolve(data)
  }
}

let timeout = setTimeout(()=>{
  safeResolve(fallback(name))
},1500)

if(imageCache[name]){
  clearTimeout(timeout)
  resolve(imageCache[name])
  return
}

if(!placesService){
  setTimeout(()=>{
    loadPlace(name).then(resolve)
  },300)
  return
}

placesService.findPlaceFromQuery({
query: name + " Oslo",
fields: ["place_id"]
}, (results, status) => {

if(status !== google.maps.places.PlacesServiceStatus.OK || !results || !results[0]){
  clearTimeout(timeout)
  resolve(fallback(name))
  return
}

placesService.getDetails({
placeId: results[0].place_id,
fields: ["name","rating","photos"]
}, (place, status) => {

clearTimeout(timeout)

let photos = []

if(status === google.maps.places.PlacesServiceStatus.OK && place && place.photos){
  for(let i=0;i<Math.min(3,place.photos.length);i++){
    photos.push(place.photos[i].getUrl({maxWidth:1200}))
  }
}

// fallback bilder hvis Google feiler
while(photos.length < 3){
  photos.push("https://source.unsplash.com/featured/?restaurant")
}

let result = {
name: (place && place.name) || name,
rating: (place && place.rating) || "",
photos: photos
}

imageCache[name] = result

safeResolve(result)

})

})

})
}

function fallback(name){
return{
name:name,
