<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Savorly</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

#map{width:1px;height:1px;opacity:0}

/* START */

#start{
margin-top:80px;
text-align:center;
width:90%;
max-width:380px;
}

.category{
background:#222;
padding:18px 26px;
border-radius:22px;
margin:10px;
cursor:pointer;
font-size:18px;
}

.fav-list{display:none}

.fav-item{
background:#333;
padding:14px;
margin:6px;
border-radius:10px;
cursor:pointer;
touch-action:none;
}

/* CARD STACK */

#cardStack{
position:relative;
width:360px;
height:580px;
display:none;
}

.card{
position:absolute;
width:100%;
height:100%;
border-radius:26px;
overflow:hidden;
background:#000;
transition:transform .3s ease;
}

.card.next{
transform:scale(.95) translateY(12px);
z-index:1;
}

.card.third{
transform:scale(.9) translateY(24px);
z-index:0;
}

.card.active{
z-index:2;
}

/* IMAGE */

.photo{
width:100%;
height:100%;
object-fit:cover;
}

/* ICONS */

.back{
position:absolute;
top:18px;
left:20px;
font-size:24px;
cursor:pointer;
z-index:10;
}

.prev{
position:absolute;
top:18px;
right:20px;
font-size:24px;
cursor:pointer;
z-index:10;
}

/* TEXT */

.overlay{
position:absolute;
bottom:110px;
left:22px;
z-index:10;
}

.name{font-size:30px;font-weight:600}

.rating{color:#FFD54F;font-size:18px}

/* PHOTO BAR */

.photo-indicator{
position:absolute;
top:12px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
z-index:10;
}

.photo-bar{
width:30px;
height:4px;
border-radius:3px;
background:rgba(255,255,255,.3);
}

.photo-bar.active{background:white}

/* BUTTONS */

.buttons{
position:absolute;
bottom:25px;
width:100%;
display:flex;
justify-content:space-evenly;
z-index:10;
}

.action{
font-size:28px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="start">

<h2>Savorly</h2>

<div class="category" onclick="openCategory('restaurant')">Restaurant</div>
<div class="category" onclick="openCategory('wine')">Vinbar</div>
<div class="category" onclick="openCategory('cocktail')">Cocktailbar</div>

<div class="category" onclick="toggleFav('restaurant')">Favoritt restaurant</div>
<div class="fav-list" id="fav-restaurant"></div>

<div class="category" onclick="toggleFav('wine')">Favoritt vinbar</div>
<div class="fav-list" id="fav-wine"></div>

<div class="category" onclick="toggleFav('cocktail')">Favoritt cocktailbar</div>
<div class="fav-list" id="fav-cocktail"></div>

</div>

<div id="cardStack">

<div class="card active" id="card1"></div>
<div class="card next" id="card2"></div>
<div class="card third" id="card3"></div>

</div>

<script>

let service
let places=[]
let index=0
let currentCategory=""
let historyStack=[]

let favorites=JSON.parse(localStorage.getItem("savorlyFavorites"))||{
restaurant:[],
wine:[],
cocktail:[]
}

function saveFavorites(){
localStorage.setItem("savorlyFavorites",JSON.stringify(favorites))
}

/* MAP */

function initMap(){

const map=new google.maps.Map(
document.getElementById("map"),
{center:{lat:59.91,lng:10.75},zoom:13}
)

service=new google.maps.places.PlacesService(map)

updateFavorites()

}

/* CATEGORY */

async function openCategory(type){

currentCategory=type

let data=await fetch("data/places.json").then(r=>r.json())

let list=[]

if(type==="restaurant")list=data.restaurants
if(type==="wine")list=data.winebars
if(type==="cocktail")list=data.cocktailbars

const requests=list.map(name=>{

return new Promise(resolve=>{

service.findPlaceFromQuery({
query:name+" oslo",
fields:["place_id"]
},(results,status)=>{

if(status==="OK"){

service.getDetails({
placeId:results[0].place_id,
fields:["rating","photos"]
},(place)=>{

resolve({
name:name,
rating:place.rating,
photos:place.photos
})

})

}else resolve({name:name})

})

})

})

places=(await Promise.all(requests)).filter(p=>p)

index=0

start.style.display="none"
cardStack.style.display="block"

renderStack()

}

/* RENDER STACK */

function renderStack(){

renderCard(card1,places[index])
renderCard(card2,places[index+1])
renderCard(card3,places[index+2])

}

/* CARD */

function renderCard(card,data){

if(!data)return

let imgs=[]

if(data.photos){

for(let i=0;i<Math.min(3,data.photos.length);i++){
imgs.push(data.photos[i].getUrl({maxWidth:1200}))
}

}

if(imgs.length===0){
imgs=["https://images.unsplash.com/photo-1414235077428-338989a2e8c0"]
}

let photoIndex=0

card.innerHTML=`

<div class="back" onclick="back()">⬅</div>
<div class="prev" onclick="goBack()">↩</div>

<div class="photo-indicator"></div>

<img class="photo">

<div class="overlay">

<div class="name">${data.name}</div>
<div class="rating">${data.rating?"⭐ "+data.rating:""}</div>

</div>

<div class="buttons">

<div class="action" onclick="skip()">❌</div>
<div class="action" onclick="maps()">📍</div>
<div class="action" onclick="maps()">📅</div>
<div class="action" onclick="like()">❤️</div>

</div>
`

let img=card.querySelector(".photo")
let indicator=card.querySelector(".photo-indicator")

function renderIndicator(){

indicator.innerHTML=""

imgs.forEach((p,i)=>{

let bar=document.createElement("div")
bar.className="photo-bar"

if(i===photoIndex)bar.classList.add("active")

indicator.appendChild(bar)

})

}

renderIndicator()

img.src=imgs[0]

img.onclick=()=>{

photoIndex++
if(photoIndex>=imgs.length)photoIndex=0

img.src=imgs[photoIndex]
renderIndicator()

}

enableSwipe()

}

/* SWIPE */

function swipe(dir){

historyStack.push(index)

if(dir==="right")addFavorite()

card1.style.transform=
dir==="right"
?"translateX(500px) rotate(20deg)"
:"translateX(-500px) rotate(-20deg)"

setTimeout(()=>{

index++

card1.style.transform=""

renderStack()

},250)

}

function like(){swipe("right")}
function skip(){swipe("left")}

/* FAVORITE */

function addFavorite(){

let place=places[index]

let exists=favorites[currentCategory].some(p=>p.name===place.name)

if(!exists){

favorites[currentCategory].push({
name:place.name,
index:index
})

saveFavorites()
updateFavorites()

}

}

/* FAVORITE LIST */

function updateFavorites(){

["restaurant","wine","cocktail"].forEach(type=>{

let container=document.getElementById("fav-"+type)

container.innerHTML=""

favorites[type].forEach((place,i)=>{

let div=document.createElement("div")

div.className="fav-item"
div.innerText=place.name

/* open card */

div.onclick=function(){

index=place.index

start.style.display="none"
cardStack.style.display="block"

renderStack()

}

/* swipe delete */

let startX=0

div.onpointerdown=e=>{
startX=e.clientX
}

div.onpointerup=e=>{

let diff=e.clientX-startX

if(Math.abs(diff)>80){

favorites[type].splice(i,1)

saveFavorites()
updateFavorites()

}

}

container.appendChild(div)

})

})

}

function toggleFav(type){

let list=document.getElementById("fav-"+type)

list.style.display=list.style.display==="block"?"none":"block"

}

/* MAP */

function maps(){

let p=places[index]

window.open("https://maps.google.com/?q="+p.name)

}

/* BACK */

function back(){

cardStack.style.display="none"
start.style.display="block"

}

/* PREVIOUS */

function goBack(){

if(historyStack.length===0)return

index=historyStack.pop()

renderStack()

}

/* DRAG SWIPE */

function enableSwipe(){

let startX=0
let currentX=0
let dragging=false

card1.onpointerdown=e=>{
dragging=true
startX=e.clientX
}

window.onpointermove=e=>{

if(!dragging)return

currentX=e.clientX-startX

card1.style.transform=
`translateX(${currentX}px) rotate(${currentX/10}deg)`

}

window.onpointerup=()=>{

if(!dragging)return

dragging=false

if(currentX>120)swipe("right")
else if(currentX<-120)swipe("left")
else card1.style.transform=""

currentX=0

}

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAy4OMXPl7a5ySsEVM9-iQuTb1JPlMcLhQ&libraries=places&callback=initMap"></script>

</body>
</html>
